<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Primary Colours Game</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;font-family:Arial, sans-serif}
body{background:#fff}

.screen{
  width:100vw;height:100vh;display:none;position:relative;overflow:hidden;
}
.active{display:flex}

#logoScreen{
  background:white;align-items:center;justify-content:center;
}
#logoScreen img{max-width:55vw;max-height:45vh}

#gameScreen,#endScreen{
  flex-direction:column;
  background:#f7eadc;
}
#gameScreen::before,#endScreen::before{
  content:"";position:absolute;inset:0;z-index:0;
  background:
  radial-gradient(circle at 20% 20%,rgba(255,70,70,.35),transparent 22%),
  radial-gradient(circle at 75% 35%,rgba(255,190,30,.35),transparent 24%),
  radial-gradient(circle at 45% 10%,rgba(60,100,220,.25),transparent 20%);
}
.curve{
  position:absolute;border:10px solid;border-radius:50%;opacity:.8;z-index:0;
}
.c1{width:240px;height:90px;border-color:#ef4b3f;left:-70px;top:35px;transform:rotate(-25deg)}
.c2{width:260px;height:110px;border-color:#4b5fad;right:-80px;top:20px;transform:rotate(20deg)}
.c3{width:230px;height:100px;border-color:#f5b737;right:-30px;bottom:80px;transform:rotate(-30deg)}
.c4{width:250px;height:100px;border-color:#c56bb7;left:-100px;bottom:130px;transform:rotate(15deg)}

.header{
  z-index:2;text-align:center;padding:8px;font-size:clamp(18px,4vw,30px);
  font-weight:bold;color:#333;
}
.instruction{
  z-index:2;text-align:center;font-size:clamp(13px,3vw,18px);color:#444;margin-bottom:4px;
}

.objects{
  z-index:2;height:48vh;width:100%;display:grid;
  grid-template-columns:repeat(5,1fr);gap:6px;padding:8px 12px;
  align-items:center;justify-items:center;
}
.obj{
  width:min(15vw,78px);height:min(15vw,78px);
  object-fit:contain;background:white;border-radius:18px;padding:7px;
  box-shadow:0 5px 10px rgba(0,0,0,.15);
  cursor:pointer;animation:jump 1.4s infinite ease-in-out;
  border:3px solid transparent;
}
.obj.selected{border:4px solid #222;transform:scale(1.12)}
.obj.done{visibility:hidden}
@keyframes jump{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-9px)}
}

.baskets{
  z-index:2;height:36vh;width:100%;display:grid;
  grid-template-columns:repeat(3,1fr);gap:8px;padding:8px 10px 14px;
}
.basketBox{
  display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
  border-radius:22px;background:rgba(255,255,255,.55);padding:6px;
}
.basket{
  width:90%;height:78%;border-radius:0 0 35px 35px;
  border:6px solid #333;cursor:pointer;position:relative;
}
.basket::before{
  content:"";position:absolute;left:12%;right:12%;top:-22px;height:35px;
  border:6px solid #333;border-bottom:none;border-radius:50px 50px 0 0;
}
.red{background:#ef3b32}
.blue{background:#2f6df6}
.yellow{background:#ffd12f}
.label{
  margin-top:5px;font-weight:bold;font-size:clamp(15px,3.5vw,22px);color:#222;
}

#message{
  position:absolute;z-index:5;top:45%;left:50%;transform:translate(-50%,-50%);
  background:white;padding:14px 22px;border-radius:20px;
  font-size:clamp(18px,5vw,32px);font-weight:bold;display:none;
  box-shadow:0 8px 20px rgba(0,0,0,.25);
}

#endScreen{
  align-items:center;justify-content:center;text-align:center;
}
#endScreen h1{
  z-index:2;background:white;padding:22px;border-radius:25px;
  font-size:clamp(28px,7vw,52px);color:#333;
}
button{
  z-index:2;margin-top:18px;padding:12px 24px;font-size:20px;border:none;
  border-radius:18px;background:#333;color:white;
}
.confetti{
  position:absolute;width:10px;height:14px;top:-20px;animation:fall 3s linear infinite;
}
@keyframes fall{
  to{transform:translateY(110vh) rotate(360deg)}
}

@media(max-height:600px){
  .objects{height:46vh}
  .baskets{height:37vh}
  .obj{width:min(13vw,62px);height:min(13vw,62px)}
}
</style>
</head>

<body>

<audio id="correctSound" src="assets/correct.mp3" preload="auto"></audio>
<audio id="wrongSound" src="assets/wrong.mp3" preload="auto"></audio>
<audio id="clapSound" src="assets/freesound_community-claps-44774.mp3" preload="auto"></audio>

<div id="logoScreen" class="screen active">
  <img src="assets/innovine-logo.png" alt="Logo">
</div>

<div id="gameScreen" class="screen">
  <div class="curve c1"></div><div class="curve c2"></div><div class="curve c3"></div><div class="curve c4"></div>

  <div class="header">Primary Colours</div>
  <div class="instruction">Tap an object. Then tap the matching colour basket.</div>

  <div class="objects" id="objects"></div>

  <div class="baskets">
    <div class="basketBox">
      <div class="basket red" data-colour="red"></div>
      <div class="label">Red</div>
    </div>
    <div class="basketBox">
      <div class="basket blue" data-colour="blue"></div>
      <div class="label">Blue</div>
    </div>
    <div class="basketBox">
      <div class="basket yellow" data-colour="yellow"></div>
      <div class="label">Yellow</div>
    </div>
  </div>

  <div id="message"></div>
</div>

<div id="endScreen" class="screen">
  <div class="curve c1"></div><div class="curve c2"></div><div class="curve c3"></div><div class="curve c4"></div>
  <h1>Great Job! 🎉</h1>
  <button onclick="location.reload()">Play Again</button>
</div>

<script>
const correctSound = document.getElementById("correctSound");
const wrongSound = document.getElementById("wrongSound");
const clapSound = document.getElementById("clapSound");

const items = [
  {file:"apple.png", colour:"red"},
  {file:"balloon.png", colour:"red"},
  {file:"car.png", colour:"red"},
  {file:"socks.png", colour:"red"},

  {file:"banana.jpg", colour:"yellow"},
  {file:"pineapple.png", colour:"yellow"},
  {file:"star.jpg", colour:"yellow"},
  {file:"crayon.png", colour:"yellow"},

  {file:"blueberry.png", colour:"blue"},
  {file:"cap.png", colour:"blue"},
  {file:"whale.png", colour:"blue"},
  {file:"butterfly.png", colour:"blue"}
];

let selected = null;
let completed = 0;

setTimeout(() => {
  document.getElementById("logoScreen").classList.remove("active");
  document.getElementById("gameScreen").classList.add("active");
}, 2000);

function playSound(sound){
  sound.currentTime = 0;
  sound.play().catch(() => {});
}

function shuffle(arr){
  return arr.sort(() => Math.random() - 0.5);
}

function loadObjects(){
  const box = document.getElementById("objects");
  shuffle(items).forEach((item, index) => {
    const img = document.createElement("img");
    img.src = "assets/" + item.file;
    img.className = "obj";
    img.dataset.colour = item.colour;
    img.alt = item.colour + " object";
    img.onclick = () => selectObject(img);
    img.style.animationDelay = (index * 0.12) + "s";
    box.appendChild(img);
  });
}

function selectObject(img){
  if(img.classList.contains("done")) return;
  document.querySelectorAll(".obj").forEach(o => o.classList.remove("selected"));
  img.classList.add("selected");
  selected = img;
}

document.querySelectorAll(".basket").forEach(basket => {
  basket.onclick = () => {
    if(!selected){
      showMsg("Pick an object first!");
      return;
    }

    if(selected.dataset.colour === basket.dataset.colour){
      playSound(correctSound);
      moveToBasket(selected, basket);
    } else {
      playSound(wrongSound);
      showMsg("Try again!");
      if(navigator.vibrate) navigator.vibrate(120);
    }
  };
});

function moveToBasket(obj, basket){
  const o = obj.getBoundingClientRect();
  const b = basket.getBoundingClientRect();

  const clone = obj.cloneNode(true);
  clone.style.position = "fixed";
  clone.style.left = o.left + "px";
  clone.style.top = o.top + "px";
  clone.style.width = o.width + "px";
  clone.style.height = o.height + "px";
  clone.style.zIndex = 10;
  clone.style.transition = "all .6s ease";
  document.body.appendChild(clone);

  obj.classList.add("done");
  obj.classList.remove("selected");
  selected = null;

  setTimeout(() => {
    clone.style.left = (b.left + b.width/2 - o.width/2) + "px";
    clone.style.top = (b.top + b.height/2 - o.height/2) + "px";
    clone.style.transform = "scale(.7)";
  }, 30);

  setTimeout(() => {
    clone.remove();
    completed++;
    showMsg("Good job!");

    if(completed === items.length){
      setTimeout(showEnd, 900);
    }
  }, 650);
}

function showMsg(text){
  const m = document.getElementById("message");
  m.textContent = text;
  m.style.display = "block";
  setTimeout(() => m.style.display = "none", 700);
}

function showEnd(){
  document.getElementById("gameScreen").classList.remove("active");
  document.getElementById("endScreen").classList.add("active");
  playSound(clapSound);
  makeConfetti();
}

function makeConfetti(){
  const colours = ["#ef3b32","#2f6df6","#ffd12f","#7bd66f","#c56bb7"];
  for(let i=0;i<70;i++){
    const c = document.createElement("div");
    c.className = "confetti";
    c.style.left = Math.random()*100 + "vw";
    c.style.background = colours[Math.floor(Math.random()*colours.length)];
    c.style.animationDelay = Math.random()*2 + "s";
    c.style.animationDuration = (2 + Math.random()*2) + "s";
    document.getElementById("endScreen").appendChild(c);
  }
}

loadObjects();
</script>

</body>
</html>
