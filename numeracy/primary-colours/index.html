<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>My Healthy Plate</title>

<style>
* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: Arial, sans-serif;
  background:
    linear-gradient(rgba(255,255,255,0.82), rgba(255,255,255,0.82)),
    repeating-linear-gradient(
      0deg,
      #d7f4f2 0px,
      #d7f4f2 26px,
      #ffffff 26px,
      #ffffff 52px
    );
}

.game {
  width: 100vw;
  height: 100vh;
  padding: 1.5vh 2vw;
  display: flex;
  flex-direction: column;
  gap: 1vh;
}

.header {
  height: 10vh;
  min-height: 54px;
  background: #ffffffd9;
  border-radius: 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 3vw;
  box-shadow: 0 3px 8px rgba(0,0,0,0.08);
}

.header h1 {
  margin: 0;
  font-size: clamp(18px, 4vw, 30px);
  color: #3b7c72;
}

.score {
  font-size: clamp(16px, 3.5vw, 26px);
  font-weight: bold;
  color: #f49b2f;
}

.instruction {
  text-align: center;
  font-size: clamp(13px, 2.6vw, 20px);
  color: #555;
  font-weight: bold;
}

.stage {
  flex: 1;
  display: grid;
  grid-template-columns: 58% 40%;
  gap: 2%;
  min-height: 0;
}

.plate-area {
  background: #ffffffcc;
  border-radius: 22px;
  padding: 1.5vh 1vw;
  display: flex;
  align-items: center;
  justify-content: center;
}

.plate {
  width: min(54vw, 72vh);
  height: min(54vw, 72vh);
  max-width: 100%;
  max-height: 100%;
  border-radius: 50%;
  background: #ffd9ea;
  border: 8px solid #f6a8ca;
  position: relative;
  box-shadow: inset 0 0 0 6px #fff2f7, 0 5px 12px rgba(0,0,0,0.12);
  overflow: hidden;
}

.zone {
  position: absolute;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  font-weight: bold;
  color: #333;
  border: 2px dashed rgba(255,255,255,0.9);
  font-size: clamp(11px, 2.2vw, 17px);
  padding: 4px;
  cursor: pointer;
}

.zone span {
  background: rgba(255,255,255,0.85);
  border-radius: 12px;
  padding: 5px 8px;
}

.zone.fruits {
  left: 8%;
  top: 10%;
  width: 40%;
  height: 38%;
  background: #ffe3e3;
  border-radius: 100% 0 0 0;
}

.zone.vegetables {
  right: 8%;
  top: 10%;
  width: 40%;
  height: 38%;
  background: #dcf7d7;
  border-radius: 0 100% 0 0;
}

.zone.grains {
  left: 8%;
  bottom: 12%;
  width: 40%;
  height: 35%;
  background: #fff0c9;
  border-radius: 0 0 0 100%;
}

.zone.protein {
  right: 8%;
  bottom: 12%;
  width: 40%;
  height: 35%;
  background: #eadcff;
  border-radius: 0 0 100% 0;
}

.zone.dairy {
  left: 34%;
  top: 40%;
  width: 32%;
  height: 22%;
  background: #dff4ff;
  border-radius: 50%;
  z-index: 2;
}

.zone.correct-flash {
  outline: 4px solid #54c36a;
}

.food-area {
  background: #ffffffcc;
  border-radius: 22px;
  padding: 1.5vh 1vw;
  display: flex;
  flex-direction: column;
  min-height: 0;
}

.food-title {
  text-align: center;
  font-weight: bold;
  color: #3b7c72;
  font-size: clamp(14px, 2.8vw, 20px);
  margin-bottom: 1vh;
}

.food-grid {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0.8vh 0.8vw;
  min-height: 0;
}

.food {
  border: none;
  border-radius: 16px;
  background: #fff8e8;
  box-shadow: 0 3px 7px rgba(0,0,0,0.12);
  font-size: clamp(22px, 4.5vw, 40px);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.food.selected {
  outline: 4px solid #ffb33e;
  transform: scale(1.05);
}

.food.done {
  opacity: 0.25;
  pointer-events: none;
}

.message {
  height: 5vh;
  min-height: 28px;
  text-align: center;
  font-size: clamp(14px, 3vw, 22px);
  font-weight: bold;
  color: #2f8f5b;
}

.end-screen {
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.94);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 10;
}

.end-card {
  background: white;
  border-radius: 24px;
  padding: 28px;
  text-align: center;
  box-shadow: 0 6px 18px rgba(0,0,0,0.18);
}

.end-card h2 {
  color: #3b7c72;
  font-size: 32px;
}

.end-card button {
  border: none;
  background: #f6a8ca;
  color: white;
  padding: 14px 24px;
  border-radius: 18px;
  font-size: 18px;
  font-weight: bold;
}

@media (max-width: 700px) {
  .stage {
    grid-template-columns: 1fr;
    grid-template-rows: 58% 40%;
  }

  .plate {
    width: min(86vw, 48vh);
    height: min(86vw, 48vh);
  }

  .food-grid {
    grid-template-columns: repeat(5, 1fr);
  }

  .food {
    font-size: clamp(20px, 7vw, 34px);
  }
}
</style>
</head>

<body>
<div class="game">

  <div class="header">
    <h1>My Healthy Plate</h1>
    <div class="score">⭐ <span id="score">0</span>/15</div>
  </div>

  <div class="instruction">
    Tap a food item. Then tap the correct section on the plate.
  </div>

  <div class="stage">
    <div class="plate-area">
      <div class="plate">
        <div class="zone fruits" data-group="fruits"><span>Fruits</span></div>
        <div class="zone vegetables" data-group="vegetables"><span>Vegetables</span></div>
        <div class="zone grains" data-group="grains"><span>Grains</span></div>
        <div class="zone protein" data-group="protein"><span>Protein</span></div>
        <div class="zone dairy" data-group="dairy"><span>Dairy</span></div>
      </div>
    </div>

    <div class="food-area">
      <div class="food-title">Choose and place the food</div>
      <div class="food-grid" id="foodGrid"></div>
    </div>
  </div>

  <div class="message" id="message"></div>
</div>

<div class="end-screen" id="endScreen">
  <div class="end-card">
    <h2>🎉 Amazing!</h2>
    <p>You made a healthy plate!</p>
    <button onclick="location.reload()">Play Again</button>
  </div>
</div>

<script>
const foods = [
  { icon: "🍎", group: "fruits", name: "Apple" },
  { icon: "🍌", group: "fruits", name: "Banana" },
  { icon: "🍇", group: "fruits", name: "Grapes" },

  { icon: "🥕", group: "vegetables", name: "Carrot" },
  { icon: "🥦", group: "vegetables", name: "Broccoli" },
  { icon: "🍅", group: "vegetables", name: "Tomato" },

  { icon: "🍞", group: "grains", name: "Bread" },
  { icon: "🍚", group: "grains", name: "Rice" },
  { icon: "🌽", group: "grains", name: "Corn" },

  { icon: "🥚", group: "protein", name: "Egg" },
  { icon: "🐟", group: "protein", name: "Fish" },
  { icon: "🫘", group: "protein", name: "Beans" },

  { icon: "🥛", group: "dairy", name: "Milk" },
  { icon: "🧀", group: "dairy", name: "Cheese" },
  { icon: "🍦", group: "dairy", name: "Curd" }
];

let selectedFood = null;
let score = 0;
let attempts = {};

const foodGrid = document.getElementById("foodGrid");
const scoreEl = document.getElementById("score");
const message = document.getElementById("message");

foods.forEach((food, index) => {
  const btn = document.createElement("button");
  btn.className = "food";
  btn.textContent = food.icon;
  btn.dataset.group = food.group;
  btn.dataset.index = index;
  btn.title = food.name;

  btn.addEventListener("click", () => {
    document.querySelectorAll(".food").forEach(f => f.classList.remove("selected"));
    btn.classList.add("selected");
    selectedFood = btn;
    message.textContent = `Place ${food.name} on the plate.`;
  });

  foodGrid.appendChild(btn);
});

document.querySelectorAll(".zone").forEach(zone => {
  zone.addEventListener("click", () => {
    if (!selectedFood) {
      message.textContent = "First tap a food item.";
      return;
    }

    const foodIndex = selectedFood.dataset.index;
    const correctGroup = selectedFood.dataset.group;
    const chosenGroup = zone.dataset.group;

    attempts[foodIndex] = attempts[foodIndex] || 0;

    if (correctGroup === chosenGroup) {
      score++;
      scoreEl.textContent = score;
      selectedFood.classList.add("done");
      selectedFood.classList.remove("selected");
      selectedFood = null;

      zone.classList.add("correct-flash");
      setTimeout(() => zone.classList.remove("correct-flash"), 500);

      message.textContent = "Good job!";

      if (score === foods.length) {
        setTimeout(() => {
          document.getElementById("endScreen").style.display = "flex";
        }, 700);
      }
    } else {
      attempts[foodIndex]++;

      if (attempts[foodIndex] >= 2) {
        const correctZone = document.querySelector(`.zone.${correctGroup}`);
        message.textContent = `Correct answer: ${correctGroup.toUpperCase()}`;
        correctZone.classList.add("correct-flash");

        setTimeout(() => {
          correctZone.classList.remove("correct-flash");
          selectedFood.classList.remove("selected");
          selectedFood = null;
        }, 1200);
      } else {
        message.textContent = "Try once more.";
      }
    }
  });
});
</script>
</body>
</html>
