<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>My Healthy Plate</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
font-family:Arial, sans-serif;
background:#dff5f5;
}

/* BACKGROUND */

body{
background-image:
linear-gradient(rgba(255,255,255,0.78), rgba(255,255,255,0.78)),
url('assets/picnic-bg.jpg');

background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

/* MAIN GAME */

.game-container{
width:100vw;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:space-between;
padding:1vh 1vw;
overflow:hidden;
}

/* HEADER */

.top-bar{
width:100%;
display:flex;
justify-content:center;
align-items:center;
position:relative;
height:11vh;
min-height:60px;
}

.title{
font-size:clamp(28px,5vw,60px);
font-weight:bold;
color:#ff784e;
text-shadow:2px 2px 0px white;
}

.score-box{
position:absolute;
right:2vw;
top:1vh;
background:white;
padding:8px 14px;
border-radius:18px;
font-size:clamp(14px,2vw,24px);
font-weight:bold;
box-shadow:0 2px 8px rgba(0,0,0,0.15);
color:#ff8a00;
}

/* INSTRUCTION */

.instruction{
background:rgba(255,255,255,0.92);
padding:8px 18px;
border-radius:30px;
font-size:clamp(12px,1.6vw,22px);
font-weight:bold;
color:#6a4d43;
text-align:center;
margin-top:-0.5vh;
margin-bottom:0.5vh;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
max-width:70vw;
z-index:2;
}

/* PLATE AREA */

.middle-section{
flex:1;
width:100%;
display:flex;
justify-content:center;
align-items:center;
position:relative;
overflow:hidden;
}

/* PLATE */

.plate{
width:min(70vw,68vh);
height:min(70vw,68vh);
border-radius:50%;
background:#f6d7a6;
position:relative;
border:16px solid #efc98f;
box-shadow:
inset 0 0 0 10px #f9e6c4,
0 6px 15px rgba(0,0,0,0.15);
overflow:hidden;
}

/* PLATE SECTIONS */

.section{
position:absolute;
display:flex;
align-items:center;
justify-content:center;
font-size:clamp(16px,2vw,28px);
font-weight:bold;
color:#444;
text-align:center;
padding:8px;
}

.section span{
background:rgba(255,255,255,0.85);
padding:6px 12px;
border-radius:18px;
}

/* FRUITS */

.fruits{
width:50%;
height:50%;
left:0;
top:0;
background:#f3df83;
border-right:6px solid white;
border-bottom:6px solid white;
}

/* VEGETABLES */

.vegetables{
width:50%;
height:50%;
right:0;
top:0;
background:#b8e9bf;
border-left:6px solid white;
border-bottom:6px solid white;
}

/* GRAINS */

.grains{
width:50%;
height:50%;
left:0;
bottom:0;
background:#f4c983;
border-right:6px solid white;
border-top:6px solid white;
}

/* PROTEIN */

.protein{
width:50%;
height:50%;
right:0;
bottom:0;
background:#e59a9c;
border-left:6px solid white;
border-top:6px solid white;
}

/* DAIRY */

.dairy{
position:absolute;
width:28%;
height:28%;
background:#b8d8f5;
border-radius:50%;
left:50%;
top:50%;
transform:translate(-50%,-50%);
display:flex;
align-items:center;
justify-content:center;
font-size:clamp(16px,2vw,28px);
font-weight:bold;
border:8px solid white;
z-index:5;
}

.dairy span{
background:rgba(255,255,255,0.9);
padding:8px 14px;
border-radius:18px;
}

/* FOOD OPTIONS */

.food-options{
width:100%;
display:flex;
justify-content:center;
align-items:center;
gap:10px;
padding:0.8vh 1vw;
flex-wrap:nowrap;
overflow:hidden;
}

.food-item{
width:min(7vw,80px);
height:min(7vw,80px);
min-width:50px;
min-height:50px;
background:white;
border:3px solid #ffb347;
border-radius:18px;
display:flex;
align-items:center;
justify-content:center;
font-size:clamp(24px,3vw,42px);
cursor:pointer;
box-shadow:0 3px 8px rgba(0,0,0,0.15);
transition:0.2s;
}

.food-item:active{
transform:scale(0.92);
}

.selected{
outline:5px solid #ff7f50;
}

/* MESSAGE */

.message{
height:4vh;
font-size:clamp(14px,2vw,24px);
font-weight:bold;
color:#2d7d46;
display:flex;
align-items:center;
justify-content:center;
}

/* MOBILE */

@media(max-width:768px){

.title{
font-size:clamp(26px,8vw,42px);
}

.plate{
width:min(88vw,55vh);
height:min(88vw,55vh);
}

.food-item{
width:13vw;
height:13vw;
font-size:7vw;
min-width:48px;
min-height:48px;
}

.instruction{
max-width:92vw;
font-size:12px;
padding:7px 12px;
}

.score-box{
font-size:14px;
padding:7px 10px;
}

.section{
font-size:14px;
}

.dairy{
font-size:14px;
}
}

</style>
</head>

<body>

<div class="game-container">

<!-- HEADER -->

<div class="top-bar">

<div class="title">
🍽️ My Healthy Plate 🍎
</div>

<div class="score-box">
⭐ 0/15
</div>

</div>

<!-- INSTRUCTION -->

<div class="instruction">
Tap a food item and then tap the correct section on the healthy plate.
</div>

<!-- MIDDLE -->

<div class="middle-section">

<div class="plate">

<div class="section fruits">
<span>Fruits</span>
</div>

<div class="section vegetables">
<span>Vegetables</span>
</div>

<div class="section grains">
<span>Grains</span>
</div>

<div class="section protein">
<span>Protein</span>
</div>

<div class="dairy">
<span>Dairy</span>
</div>

</div>

</div>

<!-- FOOD OPTIONS -->

<div class="food-options">

<div class="food-item">🌾</div>
<div class="food-item">🫘</div>
<div class="food-item">🍎</div>
<div class="food-item">🍚</div>
<div class="food-item">🥤</div>
<div class="food-item">🥬</div>
<div class="food-item">🥕</div>
<div class="food-item">🥛</div>
<div class="food-item">🍊</div>
<div class="food-item">🍞</div>
<div class="food-item">🥚</div>
<div class="food-item">🍗</div>
<div class="food-item">🍌</div>
<div class="food-item">🫘</div>
<div class="food-item">🥦</div>

</div>

<!-- MESSAGE -->

<div class="message">
Let's make a healthy plate!
</div>

</div>

</body>
</html>
