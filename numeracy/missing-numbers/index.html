<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Match the Compartment</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:Arial,sans-serif;background:#fff}

.screen{width:100vw;height:100vh;display:none;position:relative;overflow:hidden}
.active{display:flex}

#logoScreen{background:white;align-items:center;justify-content:center}
#logoScreen img{width:55vw;max-width:320px}

/* BACKGROUND */
#gameScreen,#endScreen{
  flex-direction:column;
  background:linear-gradient(#8edcff 0%,#c9f3ff 38%,#92d676 39%,#5fbe58 100%);
}

.sun{
  position:absolute;right:6vw;top:6vh;width:75px;height:75px;
  background:#ffd44a;border-radius:50%;
  box-shadow:0 0 0 12px rgba(255,212,74,.25);
}
.cloud{
  position:absolute;background:white;width:110px;height:38px;border-radius:40px;opacity:.95;
}
.cloud:before,.cloud:after{content:"";position:absolute;background:white;border-radius:50%}
.cloud:before{width:48px;height:48px;left:14px;top:-18px}
.cloud:after{width:58px;height:58px;right:12px;top:-27px}
.c1{top:12vh;left:7vw}.c2{top:9vh;left:42vw}.c3{top:18vh;right:18vw}

.mountain{
  position:absolute;bottom:37vh;width:0;height:0;
  border-left:180px solid transparent;border-right:180px solid transparent;
  border-bottom:190px solid #78b7c8;opacity:.9;
}
.m1{left:5vw}.m2{right:4vw;border-bottom-color:#83c4b8}
.waterfall{
  position:absolute;bottom:37vh;left:22vw;width:38px;height:145px;
  background:linear-gradient(#dffaff,#73d7ff);border-radius:0 0 20px 20px;opacity:.9;
}
.river{
  position:absolute;bottom:22vh;right:0;width:45vw;height:8vh;
  background:linear-gradient(90deg,#72d7ff,#b9f4ff);
  border-radius:60% 0 0 60%;opacity:.8;
}
.tree{
  position:absolute;bottom:29vh;width:35px;height:80px;background:#8b5a2b;border-radius:8px;z-index:1;
}
.tree:before{
  content:"";position:absolute;left:-28px;top:-52px;width:90px;height:75px;
  background:#4caf50;border-radius:50%;
}
.t1{left:8vw}.t2{right:10vw}.t3{left:72vw}

/* TITLE */
.title{
  z-index:5;text-align:center;padding:10px 8px 0;
  font-family:Georgia,serif;font-style:italic;font-weight:bold;
  color:#263238;text-shadow:2px 2px #ffffff;
  font-size:clamp(22px,4.5vw,42px);
}
.instruction{
  z-index:5;text-align:center;font-size:clamp(14px,2.6vw,21px);
  color:#273238;margin-top:4px;font-weight:bold;
}

/* TRACK */
.track{
  position:absolute;bottom:18vh;left:0;width:100%;height:48px;z-index:2;
  background:repeating-linear-gradient(90deg,#8b5a2b 0 28px,#5b3518 28px 45px);
  border-top:8px solid #444;border-bottom:8px solid #444;
}
.track:before{
  content:"";position:absolute;top:12px;left:0;width:100%;height:7px;background:#222;
}

/* TRAIN */
.trainWrap{
  position:absolute;left:50%;bottom:23vh;transform:translateX(-50%);
  width:max-content;height:26vh;z-index:4;display:flex;align-items:flex-end;gap:8px;
  transition:transform 2.2s ease-in;
}
.trainWrap.leave{transform:translateX(120vw)}

.engine,.coach,.missingBox,.optionCoach{
  position:relative;width:105px;height:96px;border:5px solid #333;
  display:flex;align-items:center;justify-content:center;
  font-size:42px;font-weight:bold;color:white;text-shadow:2px 2px #333;
  box-shadow:0 6px 0 rgba(0,0,0,.25);
}
.engine{
  width:120px;background:#2e78bd;border-radius:45px 18px 15px 15px;
}
.engine:before{
  content:"";position:absolute;left:12px;top:-38px;width:38px;height:42px;
  background:#2e78bd;border:5px solid #333;border-radius:10px 10px 0 0;
}
.engine:after{
  content:"";position:absolute;left:18px;top:-22px;width:48px;height:38px;
  background:#ffd04a;border:4px solid #333;border-radius:22px 22px 5px 5px;
}
.engineWindow{
  position:absolute;right:16px;top:18px;width:35px;height:35px;
  background:#b8f3ff;border:4px solid #333;border-radius:10px;
}

.coach,.missingBox{
  border-radius:22px;
}
.coach:before,.missingBox:before,.optionCoach:before{
  content:"";position:absolute;top:13px;right:13px;width:28px;height:28px;
  background:#c8f6ff;border:4px solid #fff;border-radius:8px;
}
.missingBox{
  background:rgba(255,255,255,.85);color:#333;text-shadow:none;border:5px dashed #333;
}
.connector{
  position:absolute;left:-14px;top:48%;width:18px;height:8px;background:#333;
}
.wheel{
  position:absolute;bottom:-24px;width:32px;height:32px;background:#222;border-radius:50%;
  border:5px solid #666;
}
.w1{left:16px}.w2{right:16px}

.smoke{
  position:absolute;left:4px;top:-65px;width:25px;height:25px;border-radius:50%;
  background:white;opacity:0;
}
.trainWrap.run .smoke{animation:smoke 1s infinite}
@keyframes smoke{
  0%{opacity:.9;transform:translate(0,0) scale(.6)}
  100%{opacity:0;transform:translate(-35px,-50px) scale(1.8)}
}

/* OPTIONS */
.options{
  position:absolute;bottom:2vh;left:0;width:100%;z-index:6;
  display:flex;justify-content:center;gap:12px;flex-wrap:wrap;padding:8px;
}
.optionCoach{
  width:86px;height:64px;border-radius:18px;background:#ffd45a;
  color:white;font-size:30px;cursor:pointer;
}
.optionCoach:before{
  width:20px;height:20px;top:8px;right:8px;border-width:3px;
}
.optionCoach:active{transform:scale(.95)}

#message{
  position:absolute;z-index:10;top:45%;left:50%;transform:translate(-50%,-50%);
  background:white;padding:14px 24px;border-radius:22px;
  font-size:clamp(22px,5vw,38px);font-weight:bold;display:none;
  box-shadow:0 8px 20px rgba(0,0,0,.25);
}

/* END */
#endScreen{align-items:center;justify-content:center;text-align:center}
#endScreen h1{
  z-index:5;background:white;padding:25px;border-radius:25px;
  font-size:clamp(32px,7vw,60px);color:#333;
}
button{
  z-index:5;margin-top:18px;padding:13px 26px;border:none;border-radius:18px;
  background:#333;color:white;font-size:20px;
}
.confetti{
  position:absolute;width:12px;height:14px;top:-20px;animation:fall 3s linear infinite;
}
@keyframes fall{to{transform:translateY(110vh) rotate(360deg)}}

@media(max-width:750px){
  .trainWrap{gap:5px}
  .engine,.coach,.missingBox{width:72px;height:72px;font-size:30px;border-width:4px}
  .engine{width:82px}
  .engineWindow{width:24px;height:24px;right:8px;top:15px}
  .coach:before,.missingBox:before{width:18px;height:18px;top:8px;right:7px;border-width:3px}
  .wheel{width:23px;height:23px;bottom:-18px;border-width:4px}
  .optionCoach{width:62px;height:52px;font-size:25px}
}

@media(max-height:620px){
  .title{font-size:24px}
  .instruction{font-size:15px}
  .trainWrap{bottom:25vh}
  .track{bottom:19vh}
}
</style>
</head>

<body>

<audio id="correctSound" src="assets/correct.mp3" preload="auto"></audio>
<audio id="wrongSound" src="assets/wrong.mp3" preload="auto"></audio>
<audio id="clapSound" src="assets/freesound_community-claps-44774.mp3" preload="auto"></audio>

<div id="logoScreen" class="screen active">
  <img src="assets/innovine-logo.png" alt="Logo">
</div>

<div id="gameScreen" class="screen">
  <div class="sun"></div>
  <div class="cloud c1"></div><div class="cloud c2"></div><div class="cloud c3"></div>
  <div class="mountain m1"></div><div class="mountain m2"></div>
  <div class="waterfall"></div><div class="river"></div>
  <div class="tree t1"></div><div class="tree t2"></div><div class="tree t3"></div>

  <div class="title">Match the Compartment with the Correct Missing Number</div>
  <div class="instruction">Tap the correct number to complete the train.</div>

  <div class="track"></div>
  <div class="trainWrap" id="train"></div>
  <div class="options" id="options"></div>
  <div id="message"></div>
</div>

<div id="endScreen" class="screen">
  <div class="sun"></div>
  <div class="cloud c1"></div><div class="cloud c2"></div><div class="cloud c3"></div>
  <div class="mountain m1"></div><div class="mountain m2"></div>
  <div class="waterfall"></div><div class="river"></div>
  <h1>Great Job! 🎉</h1>
  <button onclick="location.reload()">Play Again</button>
</div>

<script>
const correctSound=document.getElementById("correctSound");
const wrongSound=document.getElementById("wrongSound");
const clapSound=document.getElementById("clapSound");

const questions=[
  {seq:[1,null,3,4], missing:[2], options:[2,5,8,10]},
  {seq:[5,6,null,8], missing:[7], options:[4,7,9,11]},
  {seq:[9,null,11,12], missing:[10], options:[6,10,13,15]},
  {seq:[13,14,null,16], missing:[15], options:[12,15,18,20]},
  {seq:[2,null,4,null], missing:[3,5], options:[3,5,8,9]},
  {seq:[6,null,8,null], missing:[7,9], options:[4,7,9,12]},
  {seq:[10,null,12,null], missing:[11,13], options:[11,13,15,17]},
  {seq:[14,null,16,null], missing:[15,17], options:[12,15,17,20]},
  {seq:[16,null,18,19], missing:[17], options:[14,17,20,12]},
  {seq:[17,18,null,20], missing:[19], options:[15,16,19,11]}
];

const coachColours=["#f5a6c8","#ffd45a","#91d46b","#79c7e8","#b996e8","#f3a65a"];
let qIndex=0;
let selectedMissing=0;

setTimeout(()=>{
  document.getElementById("logoScreen").classList.remove("active");
  document.getElementById("gameScreen").classList.add("active");
  loadQuestion();
},2000);

function playSound(sound){
  sound.currentTime=0;
  sound.play().catch(()=>{});
}

function showMessage(text){
  const m=document.getElementById("message");
  m.innerText=text;
  m.style.display="block";
  setTimeout(()=>m.style.display="none",700);
}

function loadQuestion(){
  selectedMissing=0;
  const q=questions[qIndex];
  const train=document.getElementById("train");
  const options=document.getElementById("options");

  train.className="trainWrap";
  train.innerHTML="";
  options.innerHTML="";

  const engine=document.createElement("div");
  engine.className="engine";
  engine.innerHTML="<div class='smoke'></div><div class='engineWindow'></div><div class='wheel w1'></div><div class='wheel w2'></div>";
  train.appendChild(engine);

  q.seq.forEach((num,i)=>{
    const div=document.createElement("div");

    if(num===null){
      div.className="missingBox";
      div.innerHTML="?<div class='connector'></div><div class='wheel w1'></div><div class='wheel w2'></div>";
    }else{
      div.className="coach";
      div.style.background=coachColours[(num+i)%coachColours.length];
      div.innerHTML=num+"<div class='connector'></div><div class='wheel w1'></div><div class='wheel w2'></div>";
    }

    train.appendChild(div);
  });

  shuffle([...q.options]).forEach((n,i)=>{
    const btn=document.createElement("button");
    btn.className="optionCoach";
    btn.style.background=coachColours[i%coachColours.length];
    btn.innerText=n;
    btn.onclick=()=>checkAnswer(n,btn);
    options.appendChild(btn);
  });
}

function checkAnswer(num,btn){
  const q=questions[qIndex];
  const needed=q.missing[selectedMissing];

  if(num===needed){
    playSound(correctSound);

    const empty=document.querySelector(".missingBox");
    empty.className="coach";
    empty.style.background=coachColours[num%coachColours.length];
    empty.innerHTML=num+"<div class='connector'></div><div class='wheel w1'></div><div class='wheel w2'></div>";

    btn.style.visibility="hidden";
    selectedMissing++;
    showMessage("Good job!");

    if(selectedMissing===q.missing.length){
      setTimeout(runTrain,800);
    }
  }else{
    playSound(wrongSound);
    showMessage("Try again!");
    if(navigator.vibrate) navigator.vibrate(120);
  }
}

function runTrain(){
  const train=document.getElementById("train");
  train.classList.add("run");
  playTrainSound();

  setTimeout(()=>train.classList.add("leave"),600);

  setTimeout(()=>{
    qIndex++;
    if(qIndex>=questions.length){
      showEnd();
    }else{
      loadQuestion();
    }
  },2900);
}

function playTrainSound(){
  try{
    const AudioContext=window.AudioContext||window.webkitAudioContext;
    const ctx=new AudioContext();
    let count=0;
    const timer=setInterval(()=>{
      const osc=ctx.createOscillator();
      const gain=ctx.createGain();
      osc.frequency.value=90;
      gain.gain.value=.12;
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime+.08);
      count++;
      if(count>14){
        clearInterval(timer);
        setTimeout(()=>ctx.close(),500);
      }
    },120);
  }catch(e){}
}

function showEnd(){
  document.getElementById("gameScreen").classList.remove("active");
  document.getElementById("endScreen").classList.add("active");
  playSound(clapSound);
  createConfetti();
}

function createConfetti(){
  const colours=["#f8362d","#356ae8","#f8cf2f","#6ed46e","#d27cc2"];
  for(let i=0;i<90;i++){
    const c=document.createElement("div");
    c.className="confetti";
    c.style.left=Math.random()*100+"vw";
    c.style.background=colours[Math.floor(Math.random()*colours.length)];
    c.style.animationDelay=Math.random()*2+"s";
    c.style.animationDuration=(2+Math.random()*2)+"s";
    document.getElementById("endScreen").appendChild(c);
  }
}

function shuffle(arr){
  return arr.sort(()=>Math.random()-.5);
}
</script>

</body>
</html>
