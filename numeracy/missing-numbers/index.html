<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Missing Numbers Train Game</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:Arial,sans-serif;background:#fff}

.screen{width:100vw;height:100vh;display:none;position:relative;overflow:hidden}
.active{display:flex}

#logoScreen{background:white;align-items:center;justify-content:center}
#logoScreen img{width:55vw;max-width:320px}

/* TROPICAL SIDE-SCROLLER BACKGROUND */
#gameScreen,#endScreen{
  flex-direction:column;
  background:linear-gradient(#8edcff 0%,#bdefff 43%,#7fc95f 44%,#4fad45 100%);
}

.sun{
  position:absolute;right:7vw;top:7vh;width:76px;height:76px;
  background:#ffd341;border-radius:50%;
  box-shadow:0 0 0 14px rgba(255,211,65,.28);
  z-index:1;
}

.cloud{
  position:absolute;background:white;width:120px;height:42px;border-radius:50px;z-index:1;
}
.cloud:before,.cloud:after{content:"";position:absolute;background:white;border-radius:50%}
.cloud:before{width:55px;height:55px;left:14px;top:-22px}
.cloud:after{width:65px;height:65px;right:10px;top:-30px}
.c1{left:7vw;top:11vh}.c2{left:40vw;top:8vh}.c3{right:18vw;top:16vh}

.hill{
  position:absolute;bottom:30vh;width:55vw;height:25vh;
  background:#67bd57;border-radius:55% 55% 0 0;z-index:0;
}
.h1{left:-8vw}.h2{right:-8vw;background:#73c764}

.backHill{
  position:absolute;bottom:35vh;width:60vw;height:24vh;
  background:#95d47a;border-radius:55% 55% 0 0;z-index:0;
}
.bh1{left:12vw}.bh2{right:8vw}

.palm{
  position:absolute;bottom:27vh;width:34px;height:130px;background:#9a6628;
  border-radius:18px;z-index:2;
}
.palm:before{
  content:"";position:absolute;left:-55px;top:-50px;width:145px;height:95px;
  background:radial-gradient(ellipse at center,#3fb94b 0%,#229c38 70%);
  clip-path:polygon(50% 50%,0 5%,30% 45%,8% 75%,43% 58%,50% 100%,57% 58%,92% 75%,70% 45%,100% 5%);
}
.p1{left:8vw}.p2{right:10vw}.p3{left:72vw;transform:scale(.85)}

.track{
  position:absolute;bottom:17vh;left:0;width:100%;height:50px;
  background:repeating-linear-gradient(90deg,#8a5727 0 28px,#5a3519 28px 45px);
  border-top:8px solid #3a3a3a;border-bottom:8px solid #3a3a3a;z-index:4;
}
.track:before{
  content:"";position:absolute;top:12px;left:0;width:100%;height:7px;background:#222;
}

/* HEADING */
.title{
  z-index:9;text-align:center;padding:10px 12px 0;
  font-family:Georgia,"Times New Roman",serif;
  font-style:italic;font-weight:900;
  color:#263238;text-shadow:2px 2px 0 white;
  font-size:clamp(22px,4.2vw,42px);
}
.instruction{
  z-index:9;text-align:center;margin-top:5px;
  font-size:clamp(14px,2.5vw,20px);
  color:#1f2e35;font-weight:bold;
}

/* TRAIN */
.trainWrap{
  position:absolute;left:50%;bottom:24vh;
  transform:translateX(-50%);
  display:flex;align-items:flex-end;gap:7px;
  width:max-content;z-index:7;
  transition:transform 2.4s ease-in;
}
.trainWrap.leave{transform:translateX(130vw)}

.engine{
  position:relative;width:130px;height:92px;background:#f3c63d;
  border:5px solid #303030;border-radius:50px 18px 18px 18px;
  box-shadow:0 6px 0 rgba(0,0,0,.25);
}
.engineFront{
  position:absolute;left:0;bottom:0;width:74px;height:70px;
  background:#e94b35;border-right:5px solid #303030;
  border-radius:18px 10px 12px 12px;
}
.engineCab{
  position:absolute;right:8px;bottom:18px;width:48px;height:48px;
  background:#0aa9bd;border:4px solid #303030;border-radius:8px;
}
.engineWindow{
  position:absolute;right:16px;bottom:27px;width:32px;height:30px;
  background:#eaffff;border:4px solid white;border-radius:6px;
}
.chimney{
  position:absolute;left:14px;top:-42px;width:34px;height:43px;
  background:#202020;border:4px solid #303030;border-radius:8px 8px 0 0;
}
.smoke{
  position:absolute;left:12px;top:-72px;width:24px;height:24px;background:white;
  border-radius:50%;opacity:0;
}
.trainWrap.run .smoke{animation:smoke 1s infinite}
@keyframes smoke{
  0%{opacity:.9;transform:translate(0,0) scale(.6)}
  100%{opacity:0;transform:translate(-35px,-55px) scale(1.8)}
}

.coach,.missingBox{
  position:relative;width:108px;height:88px;border:5px solid #303030;
  border-radius:18px;display:flex;align-items:center;justify-content:center;
  font-size:42px;font-weight:bold;color:white;text-shadow:2px 2px 0 #333;
  box-shadow:0 6px 0 rgba(0,0,0,.25);
}
.coach:before,.missingBox:before{
  content:"";position:absolute;top:-14px;left:10px;right:10px;height:18px;
  background:#f5d36b;border:4px solid #303030;border-bottom:none;
  border-radius:15px 15px 0 0;
}
.missingBox{
  background:rgba(255,255,255,.9);
  border:5px dashed #303030;color:#333;text-shadow:none;
}
.connector{
  position:absolute;left:-15px;top:48%;width:18px;height:8px;background:#303030;
}
.wheel{
  position:absolute;bottom:-24px;width:33px;height:33px;
  background:#202020;border:6px solid #666;border-radius:50%;
}
.w1{left:15px}.w2{right:15px}

/* OPTIONS */
.options{
  position:absolute;bottom:2vh;left:0;width:100%;z-index:9;
  display:flex;justify-content:center;gap:12px;flex-wrap:wrap;padding:8px;
}
.optionCoach{
  position:relative;width:92px;height:62px;border:5px solid #303030;
  border-radius:18px;font-size:31px;font-weight:bold;
  color:white;text-shadow:2px 2px 0 #333;
  box-shadow:0 6px 0 rgba(0,0,0,.25);
  cursor:pointer;
}
.optionCoach:before{
  content:"";position:absolute;top:-11px;left:8px;right:8px;height:14px;
  background:#f5d36b;border:3px solid #303030;border-bottom:none;
  border-radius:12px 12px 0 0;
}
.optionCoach:active{transform:scale(.95)}

#message{
  position:absolute;top:46%;left:50%;transform:translate(-50%,-50%);
  z-index:20;background:white;padding:14px 24px;border-radius:22px;
  font-size:clamp(22px,5vw,38px);font-weight:bold;display:none;
  box-shadow:0 8px 20px rgba(0,0,0,.25);
}

/* END */
#endScreen{align-items:center;justify-content:center;text-align:center}
#endScreen h1{
  z-index:10;background:white;padding:25px;border-radius:25px;
  font-size:clamp(32px,7vw,60px);color:#333;
}
button{
  z-index:10;margin-top:18px;padding:13px 26px;border:none;border-radius:18px;
  background:#333;color:white;font-size:20px;
}
.confetti{
  position:absolute;width:12px;height:14px;top:-20px;animation:fall 3s linear infinite;
}
@keyframes fall{to{transform:translateY(110vh) rotate(360deg)}}

@media(max-width:760px){
  .trainWrap{gap:5px}
  .engine{width:82px;height:70px}
  .engineFront{width:48px;height:54px}
  .engineCab{width:34px;height:34px;right:5px;bottom:15px}
  .engineWindow{width:24px;height:23px;right:10px;bottom:20px;border-width:3px}
  .chimney{width:24px;height:32px;top:-32px}

  .coach,.missingBox{
    width:72px;height:68px;font-size:30px;border-width:4px;
  }
  .coach:before,.missingBox:before{height:13px;top:-11px}

  .wheel{width:24px;height:24px;bottom:-18px;border-width:4px}

  .optionCoach{
    width:66px;height:50px;font-size:25px;border-width:4px;
  }
}
</style>
</head>

<body>

<audio id="correctSound" src="assets/correct.mp3" preload="auto"></audio>
<audio id="wrongSound" src="assets/wrong.mp3" preload="auto"></audio>
<audio id="clapSound" src="assets/freesound_community-claps-44774.mp3" preload="auto"></audio>

<div id="logoScreen" class="screen active">
  <img src="assets/innovine-logo.png" alt="Logo">
</div>

<div id="gameScreen" class="screen">
  <div class="sun"></div>
  <div class="cloud c1"></div>
  <div class="cloud c2"></div>
  <div class="cloud c3"></div>

  <div class="backHill bh1"></div>
  <div class="backHill bh2"></div>
  <div class="hill h1"></div>
  <div class="hill h2"></div>

  <div class="palm p1"></div>
  <div class="palm p2"></div>
  <div class="palm p3"></div>

  <div class="title">Match the Compartment with the Correct Missing Number</div>
  <div class="instruction">Tap the correct number to complete the train.</div>

  <div class="track"></div>
  <div class="trainWrap" id="train"></div>
  <div class="options" id="options"></div>
  <div id="message"></div>
</div>

<div id="endScreen" class="screen">
  <div class="sun"></div>
  <div class="cloud c1"></div>
  <div class="cloud c2"></div>
  <div class="cloud c3"></div>
  <div class="backHill bh1"></div>
  <div class="backHill bh2"></div>
  <div class="hill h1"></div>
  <div class="hill h2"></div>
  <h1>Great Job! 🎉</h1>
  <button onclick="location.reload()">Play Again</button>
</div>

<script>
const correctSound=document.getElementById("correctSound");
const wrongSound=document.getElementById("wrongSound");
const clapSound=document.getElementById("clapSound");

const questions=[
  {seq:[1,null,3,4],missing:[2],options:[2,5,8,10]},
  {seq:[5,6,null,8],missing:[7],options:[4,7,9,11]},
  {seq:[9,null,11,12],missing:[10],options:[6,10,13,15]},
  {seq:[13,14,null,16],missing:[15],options:[12,15,18,20]},
  {seq:[2,null,4,null],missing:[3,5],options:[3,5,8,9]},
  {seq:[6,null,8,null],missing:[7,9],options:[4,7,9,12]},
  {seq:[10,null,12,null],missing:[11,13],options:[11,13,15,17]},
  {seq:[14,null,16,null],missing:[15,17],options:[12,15,17,20]},
  {seq:[16,null,18,19],missing:[17],options:[14,17,20,12]},
  {seq:[17,18,null,20],missing:[19],options:[15,16,19,11]}
];

const coachColours=["#e94b35","#09a9bd","#f5cf4c","#87cc58","#d98ab7","#b97bd9","#f2a04a"];
let qIndex=0;
let selectedMissing=0;

setTimeout(()=>{
  document.getElementById("logoScreen").classList.remove("active");
  document.getElementById("gameScreen").classList.add("active");
  loadQuestion();
},2000);

function playSound(sound){
  sound.currentTime=0;
  sound.play().catch(()=>{});
}

function showMessage(text){
  const m=document.getElementById("message");
  m.innerText=text;
  m.style.display="block";
  setTimeout(()=>m.style.display="none",700);
}

function loadQuestion(){
  selectedMissing=0;
  const q=questions[qIndex];
  const train=document.getElementById("train");
  const options=document.getElementById("options");

  train.className="trainWrap";
  train.innerHTML="";
  options.innerHTML="";

  const engine=document.createElement("div");
  engine.className="engine";
  engine.innerHTML=`
    <div class="smoke"></div>
    <div class="chimney"></div>
    <div class="engineFront"></div>
    <div class="engineCab"></div>
    <div class="engineWindow"></div>
    <div class="wheel w1"></div>
    <div class="wheel w2"></div>
  `;
  train.appendChild(engine);

  q.seq.forEach((num,i)=>{
    const div=document.createElement("div");

    if(num===null){
      div.className="missingBox";
      div.innerHTML=`?<div class="connector"></div><div class="wheel w1"></div><div class="wheel w2"></div>`;
    }else{
      div.className="coach";
      div.style.background=coachColours[(num+i)%coachColours.length];
      div.innerHTML=`${num}<div class="connector"></div><div class="wheel w1"></div><div class="wheel w2"></div>`;
    }

    train.appendChild(div);
  });

  shuffle([...q.options]).forEach((n,i)=>{
    const btn=document.createElement("button");
    btn.className="optionCoach";
    btn.style.background=coachColours[i%coachColours.length];
    btn.innerText=n;
    btn.onclick=()=>checkAnswer(n,btn);
    options.appendChild(btn);
  });
}

function checkAnswer(num,btn){
  const q=questions[qIndex];
  const needed=q.missing[selectedMissing];

  if(num===needed){
    playSound(correctSound);

    const empty=document.querySelector(".missingBox");
    empty.className="coach";
    empty.style.background=coachColours[num%coachColours.length];
    empty.innerHTML=`${num}<div class="connector"></div><div class="wheel w1"></div><div class="wheel w2"></div>`;

    btn.style.visibility="hidden";
    selectedMissing++;
    showMessage("Good job!");

    if(selectedMissing===q.missing.length){
      setTimeout(runTrain,800);
    }
  }else{
    playSound(wrongSound);
    showMessage("Try again!");
    if(navigator.vibrate)navigator.vibrate(120);
  }
}

function runTrain(){
  const train=document.getElementById("train");
  train.classList.add("run");
  playTrainSound();

  setTimeout(()=>train.classList.add("leave"),600);

  setTimeout(()=>{
    qIndex++;
    if(qIndex>=questions.length){
      showEnd();
    }else{
      loadQuestion();
    }
  },3000);
}

function playTrainSound(){
  try{
    const AudioContext=window.AudioContext||window.webkitAudioContext;
    const ctx=new AudioContext();
    let count=0;
    const timer=setInterval(()=>{
      const osc=ctx.createOscillator();
      const gain=ctx.createGain();
      osc.frequency.value=95;
      gain.gain.value=.12;
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime+.08);
      count++;
      if(count>14){
        clearInterval(timer);
        setTimeout(()=>ctx.close(),500);
      }
    },120);
  }catch(e){}
}

function showEnd(){
  document.getElementById("gameScreen").classList.remove("active");
  document.getElementById("endScreen").classList.add("active");
  playSound(clapSound);
  createConfetti();
}

function createConfetti(){
  const colours=["#f8362d","#356ae8","#f8cf2f","#6ed46e","#d27cc2"];
  for(let i=0;i<90;i++){
    const c=document.createElement("div");
    c.className="confetti";
    c.style.left=Math.random()*100+"vw";
    c.style.background=colours[Math.floor(Math.random()*colours.length)];
    c.style.animationDelay=Math.random()*2+"s";
    c.style.animationDuration=(2+Math.random()*2)+"s";
    document.getElementById("endScreen").appendChild(c);
  }
}

function shuffle(arr){
  return arr.sort(()=>Math.random()-.5);
}
</script>

</body>
</html>
