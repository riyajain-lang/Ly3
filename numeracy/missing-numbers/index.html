<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Match the Compartment</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:Arial,sans-serif;background:#fff}

.screen{
  width:100vw;height:100vh;display:none;position:relative;overflow:hidden;
}
.active{display:flex}

#logoScreen{
  background:#fff;align-items:center;justify-content:center;
}
#logoScreen img{width:55vw;max-width:320px}

#gameScreen,#endScreen{
  flex-direction:column;
  background:linear-gradient(#9fe3ff 0%,#bdefff 45%,#7fcf70 46%,#5dbb57 100%);
}

.sun{
  position:absolute;right:5vw;top:4vh;width:70px;height:70px;
  background:#ffd54a;border-radius:50%;box-shadow:0 0 0 8px rgba(255,213,74,.25);
}
.cloud{
  position:absolute;background:white;border-radius:40px;width:100px;height:35px;opacity:.95;
}
.cloud:before,.cloud:after{
  content:"";position:absolute;background:white;border-radius:50%;
}
.cloud:before{width:45px;height:45px;left:15px;top:-18px}
.cloud:after{width:55px;height:55px;right:10px;top:-25px}
.c1{top:10vh;left:6vw}
.c2{top:17vh;right:20vw}
.c3{top:8vh;left:38vw}

.hill{
  position:absolute;bottom:24vh;width:42vw;height:22vh;background:#61b86c;
  border-radius:60% 60% 0 0;
}
.h1{left:-5vw}.h2{right:-5vw;background:#70c879}

.title{
  z-index:3;text-align:center;font-weight:bold;color:#263238;
  font-size:clamp(21px,4vw,38px);padding-top:10px;
}
.instruction{
  z-index:3;text-align:center;color:#333;font-size:clamp(13px,2.7vw,20px);
  margin-top:5px;padding:0 8px;
}

.track{
  position:absolute;bottom:14vh;left:0;width:100%;height:42px;
  background:repeating-linear-gradient(90deg,#8b5a2b 0 28px,#5d351a 28px 45px);
  border-top:7px solid #555;border-bottom:7px solid #555;z-index:2;
}
.track:before{
  content:"";position:absolute;top:10px;left:0;width:100%;height:6px;background:#333;
}

.trainWrap{
  position:absolute;left:3vw;bottom:20vh;width:94vw;height:26vh;
  z-index:4;display:flex;align-items:flex-end;gap:6px;
  transition:transform 2s ease-in;
}
.trainWrap.leave{transform:translateX(125vw)}

.engine,.coach,.missingBox{
  position:relative;height:105px;min-width:115px;border:5px solid #333;
  border-radius:18px 18px 12px 12px;display:flex;align-items:center;justify-content:center;
  font-size:48px;font-weight:bold;color:white;text-shadow:2px 2px #333;
  box-shadow:0 6px 0 rgba(0,0,0,.25);
}
.engine{
  min-width:125px;background:#2f75bd;border-radius:45px 20px 12px 12px;
}
.engine:before{
  content:"";position:absolute;left:12px;top:-35px;width:40px;height:38px;
  background:#224e82;border:5px solid #333;border-radius:10px 10px 0 0;
}
.engine:after{
  content:"";position:absolute;right:18px;top:-22px;width:38px;height:28px;
  background:#f4c542;border:4px solid #333;border-radius:20px 20px 6px 6px;
}
.coach{background:#ffd45a;color:#fff}
.missingBox{
  background:rgba(255,255,255,.8);border:5px dashed #333;color:#333;
}
.wheel{
  position:absolute;bottom:-24px;width:32px;height:32px;background:#222;border-radius:50%;
  border:5px solid #666;
}
.w1{left:18px}.w2{right:18px}

.smoke{
  position:absolute;left:10px;top:-55px;width:24px;height:24px;border-radius:50%;
  background:white;opacity:0;animation:none;
}
.trainWrap.run .smoke{animation:smoke 1s infinite}
@keyframes smoke{
  0%{opacity:.9;transform:translate(0,0) scale(.6)}
  100%{opacity:0;transform:translate(-30px,-45px) scale(1.6)}
}

.options{
  position:absolute;bottom:2vh;left:0;width:100%;z-index:5;
  display:flex;justify-content:center;gap:10px;flex-wrap:wrap;padding:8px;
}
.option{
  width:70px;height:58px;border-radius:18px;border:4px solid #333;background:#fff;
  font-size:30px;font-weight:bold;color:#333;box-shadow:0 5px 0 #999;
}
.option:active{transform:translateY(4px);box-shadow:0 1px 0 #999}

#message{
  position:absolute;z-index:10;top:43%;left:50%;transform:translate(-50%,-50%);
  background:#fff;padding:14px 24px;border-radius:22px;font-size:clamp(22px,5vw,38px);
  font-weight:bold;display:none;box-shadow:0 8px 20px rgba(0,0,0,.25);
}

#endScreen{align-items:center;justify-content:center;text-align:center}
#endScreen h1{
  z-index:3;background:white;padding:25px;border-radius:25px;
  font-size:clamp(30px,7vw,58px);color:#333;
}
button{
  z-index:3;margin-top:18px;padding:13px 26px;border:none;border-radius:18px;
  background:#333;color:white;font-size:20px;
}
.confetti{
  position:absolute;width:12px;height:14px;top:-20px;animation:fall 3s linear infinite;
}
@keyframes fall{to{transform:translateY(110vh) rotate(360deg)}}

@media(max-width:700px){
  .engine,.coach,.missingBox{min-width:72px;height:78px;font-size:34px;border-width:4px}
  .engine{min-width:82px}
  .engine:before{width:28px;height:28px;top:-28px}
  .engine:after{width:28px;height:22px;top:-18px}
  .wheel{width:24px;height:24px;bottom:-19px}
  .trainWrap{gap:4px;bottom:22vh}
  .option{width:58px;height:50px;font-size:25px}
}

@media(max-height:620px){
  .trainWrap{bottom:22vh}
  .engine,.coach,.missingBox{height:68px;min-width:68px;font-size:30px}
  .engine{min-width:78px}
}
</style>
</head>

<body>

<audio id="correctSound" src="assets/correct.mp3" preload="auto"></audio>
<audio id="wrongSound" src="assets/wrong.mp3" preload="auto"></audio>
<audio id="clapSound" src="assets/freesound_community-claps-44774.mp3" preload="auto"></audio>

<div id="logoScreen" class="screen active">
  <img src="assets/innovine-logo.png" alt="Logo">
</div>

<div id="gameScreen" class="screen">
  <div class="sun"></div>
  <div class="cloud c1"></div>
  <div class="cloud c2"></div>
  <div class="cloud c3"></div>
  <div class="hill h1"></div>
  <div class="hill h2"></div>

  <div class="title">Match the Compartment with the Correct Missing Number</div>
  <div class="instruction">Tap the correct number to complete the train.</div>

  <div class="track"></div>
  <div class="trainWrap" id="train"></div>
  <div class="options" id="options"></div>
  <div id="message"></div>
</div>

<div id="endScreen" class="screen">
  <div class="sun"></div>
  <div class="cloud c1"></div>
  <div class="cloud c2"></div>
  <div class="cloud c3"></div>
  <div class="hill h1"></div>
  <div class="hill h2"></div>
  <h1>Great Job! 🎉</h1>
  <button onclick="location.reload()">Play Again</button>
</div>

<script>
const correctSound=document.getElementById("correctSound");
const wrongSound=document.getElementById("wrongSound");
const clapSound=document.getElementById("clapSound");

const questions=[
  {seq:[1,null,3,4], missing:[2], options:[2,5,8,10]},
  {seq:[5,6,null,8], missing:[7], options:[4,7,9,11]},
  {seq:[9,null,11,12], missing:[10], options:[6,10,13,15]},
  {seq:[13,14,null,16], missing:[15], options:[12,15,18,20]},
  {seq:[2,null,4,null], missing:[3,5], options:[3,5,8,9]},
  {seq:[6,null,8,null], missing:[7,9], options:[4,7,9,12]},
  {seq:[10,null,12,null], missing:[11,13], options:[11,13,15,17]},
  {seq:[14,null,16,null], missing:[15,17], options:[12,15,17,20]},
  {seq:[16,null,18,19], missing:[17], options:[14,17,20,12]},
  {seq:[17,18,null,20], missing:[19], options:[15,16,19,11]}
];

const colours=["#ffd45a","#b996e8","#91d46b","#f5a6c8","#79c7e8"];
let qIndex=0;
let selectedMissing=0;

setTimeout(()=>{
  document.getElementById("logoScreen").classList.remove("active");
  document.getElementById("gameScreen").classList.add("active");
  loadQuestion();
},2000);

function playSound(sound){
  sound.currentTime=0;
  sound.play().catch(()=>{});
}

function showMessage(text){
  const m=document.getElementById("message");
  m.innerText=text;
  m.style.display="block";
  setTimeout(()=>m.style.display="none",700);
}

function loadQuestion(){
  selectedMissing=0;
  const q=questions[qIndex];
  const train=document.getElementById("train");
  const options=document.getElementById("options");

  train.className="trainWrap";
  train.innerHTML="";
  options.innerHTML="";

  const engine=document.createElement("div");
  engine.className="engine";
  engine.innerHTML=`<div class="smoke"></div><div class="wheel w1"></div><div class="wheel w2"></div>`;
  train.appendChild(engine);

  q.seq.forEach((num,i)=>{
    const div=document.createElement("div");
    if(num===null){
      div.className="missingBox";
      div.dataset.index=i;
      div.innerHTML="?<div class='wheel w1'></div><div class='wheel w2'></div>";
    }else{
      div.className="coach";
      div.style.background=colours[(num+i)%colours.length];
      div.innerHTML=`${num}<div class='wheel w1'></div><div class='wheel w2'></div>`;
    }
    train.appendChild(div);
  });

  shuffle([...q.options]).forEach(n=>{
    const btn=document.createElement("button");
    btn.className="option";
    btn.innerText=n;
    btn.onclick=()=>checkAnswer(n,btn);
    options.appendChild(btn);
  });
}

function checkAnswer(num,btn){
  const q=questions[qIndex];
  const needed=q.missing[selectedMissing];

  if(num===needed){
    playSound(correctSound);

    const empty=document.querySelector(".missingBox");
    empty.className="coach";
    empty.style.background=colours[num%colours.length];
    empty.innerHTML=`${num}<div class='wheel w1'></div><div class='wheel w2'></div>`;

    btn.style.visibility="hidden";
    selectedMissing++;
    showMessage("Good job!");

    if(selectedMissing===q.missing.length){
      setTimeout(runTrain,800);
    }
  }else{
    playSound(wrongSound);
    showMessage("Try again!");
    if(navigator.vibrate) navigator.vibrate(120);
  }
}

function runTrain(){
  const train=document.getElementById("train");
  train.classList.add("run");
  playTrainSound();

  setTimeout(()=>{
    train.classList.add("leave");
  },600);

  setTimeout(()=>{
    qIndex++;
    if(qIndex>=questions.length){
      showEnd();
    }else{
      loadQuestion();
    }
  },2800);
}

function playTrainSound(){
  try{
    const AudioContext=window.AudioContext||window.webkitAudioContext;
    const ctx=new AudioContext();
    let count=0;
    const timer=setInterval(()=>{
      const osc=ctx.createOscillator();
      const gain=ctx.createGain();
      osc.frequency.value=90;
      gain.gain.value=.12;
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime+.08);
      count++;
      if(count>12){
        clearInterval(timer);
        setTimeout(()=>ctx.close(),500);
      }
    },130);
  }catch(e){}
}

function showEnd(){
  document.getElementById("gameScreen").classList.remove("active");
  document.getElementById("endScreen").classList.add("active");
  playSound(clapSound);
  createConfetti();
}

function createConfetti(){
  const colours=["#f8362d","#356ae8","#f8cf2f","#6ed46e","#d27cc2"];
  for(let i=0;i<90;i++){
    const c=document.createElement("div");
    c.className="confetti";
    c.style.left=Math.random()*100+"vw";
    c.style.background=colours[Math.floor(Math.random()*colours.length)];
    c.style.animationDelay=Math.random()*2+"s";
    c.style.animationDuration=(2+Math.random()*2)+"s";
    document.getElementById("endScreen").appendChild(c);
  }
}

function shuffle(arr){
  return arr.sort(()=>Math.random()-.5);
}
</script>

</body>
</html>
