<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pattern Chain Adventure</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:Arial,sans-serif;
  touch-action:none;
  background:#fff;
}

:root{
  --vh:1vh;
}

.screen{
  width:100vw;
  height:calc(var(--vh)*100);
  display:none;
  position:relative;
  overflow:hidden;
}

.active{
  display:flex;
}

/* LOGO SCREEN */

#logoScreen{
  background:white;
  align-items:center;
  justify-content:center;
}

#logoScreen img{
  width:55vw;
  max-width:320px;
}

/* GAME BACKGROUND */

#gameScreen,
#endScreen{
  flex-direction:column;
  align-items:center;
  background:
    linear-gradient(rgba(255,255,255,.18),rgba(255,255,255,.08)),
    url("download (2)(2).jpg");

  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
}

#gameScreen::before,
#endScreen::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(255,255,255,.10);
  z-index:0;
}

/* TITLE */

.title{
  z-index:5;
  margin-top:8px;
  padding:8px 20px;
  max-width:92vw;
  background:rgba(255,255,255,.90);
  border-radius:24px;
  text-align:center;
  font-family:Georgia,serif;
  font-style:italic;
  font-weight:900;
  color:#173628;
  font-size:clamp(22px,5vw,40px);
  line-height:1.05;
  box-shadow:0 5px 0 rgba(0,0,0,.16);
}

.instruction{
  z-index:5;
  margin-top:7px;
  background:white;
  border-radius:20px;
  padding:8px 16px;
  font-weight:bold;
  color:#20332d;
  text-align:center;
  font-size:clamp(13px,3vw,18px);
  max-width:92vw;
  box-shadow:0 3px 0 rgba(0,0,0,.12);
}

.levelTag{
  z-index:5;
  margin-top:7px;
  background:#fff1a3;
  color:#473600;
  border-radius:20px;
  padding:7px 18px;
  font-weight:900;
  font-size:clamp(14px,3vw,18px);
  box-shadow:0 3px 0 rgba(0,0,0,.14);
}

/* PATTERN AREA */

.patternArea{
  z-index:5;
  width:96vw;
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:5px;
}

.chain{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  flex-wrap:nowrap;
  width:100%;
}

/* CARDS */

.card,
.blank{
  width:120px;
  height:120px;
  background:rgba(255,255,255,.96);
  border-radius:28px;
  border:5px solid white;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:
    0 10px 0 rgba(0,0,0,.18),
    0 0 20px rgba(255,255,255,.35);

  position:relative;
}

.card img,
.option img{
  max-width:94%;
  max-height:94%;
  object-fit:contain;
  pointer-events:none;
  user-select:none;
  filter:drop-shadow(0 6px 4px rgba(0,0,0,.25));
}

.blank{
  border:5px dashed #173b31;
  background:rgba(255,255,255,.75);
  color:#173b31;
  font-size:52px;
  font-weight:900;
}

.arrow{
  font-size:34px;
  font-weight:900;
  color:white;
  text-shadow:2px 2px 0 #4b3500;
}

/* OPTIONS */

.optionsBox{
  z-index:10;
  width:100%;
  min-height:135px;
  padding:12px 10px calc(env(safe-area-inset-bottom) + 12px);
  display:flex;
  justify-content:center;
  align-items:center;
  gap:18px;
  background:rgba(255,255,255,.62);
  backdrop-filter:blur(5px);
}

.option{
  width:120px;
  height:100px;
  background:white;
  border:4px solid #20362c;
  border-radius:26px;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 8px 0 rgba(0,0,0,.22);
  cursor:grab;
  touch-action:none;
}

.option:active{
  cursor:grabbing;
  transform:scale(.96);
}

/* MESSAGE */

#message{
  position:absolute;
  z-index:50;
  top:48%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:16px 28px;
  border-radius:26px;
  font-size:clamp(24px,6vw,46px);
  font-weight:900;
  color:#1e3b2b;
  display:none;
  box-shadow:0 8px 25px rgba(0,0,0,.25);
  text-align:center;
}

.dragging{
  position:fixed!important;
  z-index:1000!important;
  pointer-events:none;
  opacity:.95;
  transform:scale(1.08);
}

/* END SCREEN */

#endScreen{
  align-items:center;
  justify-content:center;
  flex-direction:column;
  text-align:center;
}

#endScreen h1{
  z-index:5;
  background:white;
  padding:26px 42px;
  border-radius:28px;
  font-size:clamp(36px,8vw,66px);
  color:#22422e;
  box-shadow:0 8px 0 rgba(0,0,0,.18);
}

#endScreen button{
  z-index:5;
  margin-top:22px;
  border:none;
  border-radius:18px;
  padding:14px 32px;
  background:#24382b;
  color:white;
  font-size:21px;
  font-weight:bold;
  box-shadow:0 6px 0 rgba(0,0,0,.18);
}

/* MOBILE */

@media(max-width:760px){

  .title{
    font-size:20px;
    margin-top:7px;
  }

  .instruction{
    font-size:13px;
    padding:6px 10px;
  }

  .levelTag{
    font-size:13px;
    margin-top:5px;
  }

  .patternArea{
    padding:2px;
  }

  .chain{
    gap:5px;
  }

  .card,
  .blank{
    width:64px;
    height:64px;
    border-radius:18px;
    border-width:3px;
  }

  .blank{
    border-width:4px;
    font-size:30px;
  }

  .arrow{
    font-size:18px;
  }

  .optionsBox{
    min-height:100px;
    gap:12px;
    padding-bottom:calc(env(safe-area-inset-bottom) + 8px);
  }

  .option{
    width:84px;
    height:74px;
    border-radius:20px;
    border-width:3px;
  }
}

@media(max-width:380px){

  .title{
    font-size:18px;
  }

  .instruction{
    font-size:12px;
  }

  .card,
  .blank{
    width:56px;
    height:56px;
  }

  .arrow{
    font-size:15px;
  }

  .option{
    width:74px;
    height:64px;
  }

  .optionsBox{
    gap:8px;
  }
}
</style>
</head>

<body>

<audio id="correctSound" src="assets/correct.mp3" preload="auto"></audio>
<audio id="wrongSound" src="assets/wrong.mp3" preload="auto"></audio>
<audio id="clapSound" src="assets/freesound_community-claps-44774.mp3" preload="auto"></audio>

<!-- LOGO SCREEN -->

<div id="logoScreen" class="screen active">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<!-- GAME SCREEN -->

<div id="gameScreen" class="screen">

  <div class="title">Pattern Chain Adventure</div>

  <div class="instruction">
    Drag the correct picture into the empty box to complete the pattern.
  </div>

  <div class="levelTag" id="levelTag">
    Phase 1 • Level 1
  </div>

  <div class="patternArea">
    <div class="chain" id="chain"></div>
  </div>

  <div class="optionsBox" id="optionsBox"></div>

  <div id="message"></div>

</div>

<!-- END SCREEN -->

<div id="endScreen" class="screen">

  <h1>Great Job! 🎉</h1>

  <button onclick="location.reload()">
    Play Again
  </button>

</div>

<script>

function setVH(){
  document.documentElement.style.setProperty(
    "--vh",
    window.innerHeight * 0.01 + "px"
  );
}

setVH();

window.addEventListener("resize", setVH);
window.addEventListener("orientationchange", setVH);

const correctSound=document.getElementById("correctSound");
const wrongSound=document.getElementById("wrongSound");
const clapSound=document.getElementById("clapSound");

const img={
  dog:"assets/dog.png",
  cat:"assets/cat.png",
  boots:"assets/boots.png",
  koala:"assets/koala.png",
  rainbow:"assets/rainbow.png",
  cloud:"assets/rainy-cloud.png",
  penguin:"assets/cartoon-penguin.png",
  umbrella:"assets/umbrella.png",
  purpleFlower:"assets/purple-flower.png",
  avocado:"assets/avocado.png",
  bear:"assets/dear.png",
  giraffe:"assets/giraffe.png",
  orangeFlower:"assets/orange-flower.png",
  blueFlower:"assets/blue-flower.png",
  carrot:"assets/carrot.png",
  pear:"assets/pear.png",
  girl:"assets/cartoon-girl.png",
  boy:"assets/cartoon-boy.png"
};

const levels=[

{
tag:"Phase 1 • Level 1",
chain:["dog","cat","dog",null],
answer:"cat",
options:["cat","boots","koala"]
},

{
tag:"Phase 1 • Level 2",
chain:["rainbow","cloud","rainbow",null],
answer:"cloud",
options:["cloud","boots","penguin"]
},

{
tag:"Phase 1 • Level 3",
chain:["boots","umbrella","boots",null],
answer:"umbrella",
options:["purpleFlower","avocado","umbrella"]
},

{
tag:"Phase 2 • Level 4",
chain:["koala","bear","giraffe","koala","bear",null],
answer:"giraffe",
options:["orangeFlower","giraffe","umbrella"]
},

{
tag:"Phase 2 • Level 5",
chain:["blueFlower","purpleFlower","orangeFlower","blueFlower","purpleFlower",null],
answer:"orangeFlower",
options:["orangeFlower","cloud","avocado"]
},

{
tag:"Phase 2 • Level 6",
chain:["carrot","avocado","pear","carrot","avocado",null],
answer:"pear",
options:["pear","penguin","boots"]
},

{
tag:"Phase 2 • Level 7",
chain:["penguin","girl","boy","penguin","girl",null],
answer:"boy",
options:["blueFlower","boy","boots"]
}

];

let current=0;
let dragged=null;
let dragClone=null;

/* START GAME */

setTimeout(()=>{

  document.getElementById("logoScreen")
    .classList.remove("active");

  document.getElementById("gameScreen")
    .classList.add("active");

  loadLevel();

},2000);

/* SOUND */

function playSound(sound){
  sound.currentTime=0;
  sound.play().catch(()=>{});
}

/* MESSAGE */

function showMessage(text){

  const m=document.getElementById("message");

  m.innerText=text;

  m.style.display="block";

  setTimeout(()=>{
    m.style.display="none";
  },850);
}

/* LOAD LEVEL */

function loadLevel(){

  const level=levels[current];

  document.getElementById("levelTag")
    .innerText=level.tag;

  const chain=document.getElementById("chain");
  const optionsBox=document.getElementById("optionsBox");

  chain.innerHTML="";
  optionsBox.innerHTML="";

  level.chain.forEach((item,index)=>{

    if(index>0){

      const arrow=document.createElement("div");

      arrow.className="arrow";

      arrow.innerText="➜";

      chain.appendChild(arrow);
    }

    const box=document.createElement("div");

    box.className=item ? "card" : "blank";

    if(item){

      box.innerHTML=`<img src="${img[item]}" alt="">`;

    }else{

      box.innerText="?";
    }

    chain.appendChild(box);
  });

  shuffle([...level.options]).forEach(item=>{

    const op=document.createElement("div");

    op.className="option";

    op.dataset.item=item;

    op.innerHTML=`<img src="${img[item]}" alt="">`;

    op.addEventListener("pointerdown",startDrag);

    optionsBox.appendChild(op);
  });
}

/* DRAG */

function startDrag(e){

  e.preventDefault();

  dragged=e.currentTarget;

  dragged.setPointerCapture(e.pointerId);

  dragClone=dragged.cloneNode(true);

  dragClone.classList.add("dragging");

  document.body.appendChild(dragClone);

  moveClone(e.clientX,e.clientY);

  document.addEventListener("pointermove",moveDrag);

  document.addEventListener(
    "pointerup",
    endDrag,
    {once:true}
  );
}

function moveDrag(e){
  moveClone(e.clientX,e.clientY);
}

function moveClone(x,y){

  if(!dragClone)return;

  dragClone.style.left=
    (x-dragClone.offsetWidth/2)+"px";

  dragClone.style.top=
    (y-dragClone.offsetHeight/2)+"px";
}

/* DROP */

function endDrag(e){

  document.removeEventListener(
    "pointermove",
    moveDrag
  );

  const blank=document.querySelector(".blank");

  const rect=blank.getBoundingClientRect();

  const inside=
    e.clientX>=rect.left &&
    e.clientX<=rect.right &&
    e.clientY>=rect.top &&
    e.clientY<=rect.bottom;

  if(dragClone){

    dragClone.remove();

    dragClone=null;
  }

  if(!inside){

    dragged=null;

    return;
  }

  checkAnswer(dragged.dataset.item);

  dragged=null;
}

/* ANSWER */

function checkAnswer(item){

  const level=levels[current];

  if(item===level.answer){

    playSound(correctSound);

    const blank=document.querySelector(".blank");

    blank.className="card";

    blank.innerHTML=
      `<img src="${img[item]}" alt="">`;

    showMessage("Correct! 🌟");

    setTimeout(()=>{

      current++;

      if(current>=levels.length){

        showEnd();

      }else{

        loadLevel();
      }

    },1100);

  }else{

    playSound(wrongSound);

    if(navigator.vibrate){
      navigator.vibrate(120);
    }

    showMessage("Try again!");
  }
}

/* END */

function showEnd(){

  document.getElementById("gameScreen")
    .classList.remove("active");

  document.getElementById("endScreen")
    .classList.add("active");

  playSound(clapSound);
}

/* SHUFFLE */

function shuffle(arr){
  return arr.sort(()=>Math.random()-.5);
}

</script>

</body>
</html>
