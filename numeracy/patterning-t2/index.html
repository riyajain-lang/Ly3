<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <meta name="theme-color" content="#fff7df" />
  <title>Pattern Treasure Hunt</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: "Trebuchet MS", Arial, sans-serif;
      background: #fff7df;
      color: #3f2c20;
    }

    button {
      font: inherit;
    }

    img {
      display: block;
      max-width: 100%;
    }

    /* =====================================================
       1. WHITE LOGO SPLASH
    ===================================================== */

    #splashScreen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
    }

    #splashLogo {
      max-width: 58vw;
      max-height: 36vh;
      object-fit: contain;
    }

    /* =====================================================
       2. GAME SCREEN
    ===================================================== */

    #gameScreen {
      position: relative;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      display: none;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
      padding:
        max(8px, env(safe-area-inset-top))
        max(10px, env(safe-area-inset-right))
        max(8px, env(safe-area-inset-bottom))
        max(10px, env(safe-area-inset-left));
      background:
        radial-gradient(circle at 12% 14%, rgba(255, 255, 255, 0.86) 0 3%, transparent 3.2%),
        radial-gradient(circle at 88% 12%, rgba(255, 255, 255, 0.82) 0 2.8%, transparent 3%),
        linear-gradient(#9ddfff 0 31%, #dff2c8 31% 100%);
    }

    #gameScreen::before {
      content: "";
      position: absolute;
      left: -5%;
      right: -5%;
      bottom: -12%;
      height: 48%;
      border-radius: 50% 50% 0 0;
      background: linear-gradient(#85cb61, #64af4f);
      z-index: 0;
    }

    .cloud {
      position: absolute;
      width: 88px;
      height: 32px;
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.88);
      z-index: 0;
    }

    .cloud::before,
    .cloud::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      background: inherit;
    }

    .cloud::before {
      width: 36px;
      height: 36px;
      left: 15px;
      top: -18px;
    }

    .cloud::after {
      width: 45px;
      height: 45px;
      right: 9px;
      top: -25px;
    }

    .cloud.one {
      left: 5%;
      top: 12%;
      transform: scale(0.8);
    }

    .cloud.two {
      right: 5%;
      top: 16%;
      transform: scale(0.65);
    }

    .topBar,
    .keyTrail,
    .gameCard {
      position: relative;
      z-index: 2;
    }

    /* =====================================================
       HEADER
    ===================================================== */

    .topBar {
      width: min(980px, 98%);
      min-height: 12%;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 8px;
    }

    .titleWrap {
      grid-column: 2;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(25px, 4.3vw, 48px);
      line-height: 1;
      color: #7a3e16;
      text-shadow: 0 3px 0 rgba(255, 255, 255, 0.78);
    }

    .subtitle {
      margin-top: 4px;
      font-size: clamp(13px, 1.9vw, 20px);
      font-weight: 800;
      color: #4d4b2a;
    }

    .progressBox {
      justify-self: end;
      min-width: 82px;
      padding: 7px 10px;
      border: 3px solid #71411e;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 4px 0 rgba(88, 49, 25, 0.22);
      text-align: center;
      font-size: clamp(13px, 1.8vw, 18px);
      font-weight: 900;
    }

    /* =====================================================
       KEY TRAIL
    ===================================================== */

    .keyTrail {
      width: min(900px, 95%);
      min-height: 38px;
      height: 8%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(3px, 0.8vw, 8px);
    }

    .keySlot {
      width: clamp(25px, 4.3vw, 42px);
      height: clamp(25px, 4.3vw, 42px);
      display: grid;
      place-items: center;
      border: 2px dashed rgba(96, 60, 27, 0.45);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.58);
      font-size: clamp(17px, 3vw, 29px);
      filter: grayscale(1);
      opacity: 0.55;
      transition: transform 0.35s ease, filter 0.35s ease, opacity 0.35s ease;
    }

    .keySlot.earned {
      filter: none;
      opacity: 1;
      transform: scale(1.1) rotate(-8deg);
      background: #fff6a6;
      border-style: solid;
      border-color: #d59b12;
    }

    /* =====================================================
       QUESTION CARD
    ===================================================== */

    .gameCard {
      width: min(980px, 97%);
      flex: 1;
      min-height: 0;
      max-height: 77%;
      margin-bottom: 1%;
      padding: clamp(10px, 1.7vh, 18px) clamp(10px, 2vw, 24px);
      border: clamp(3px, 0.5vw, 6px) solid #73451f;
      border-radius: clamp(20px, 3vw, 34px);
      background: rgba(255, 251, 236, 0.97);
      box-shadow:
        0 10px 0 rgba(88, 52, 24, 0.23),
        0 16px 28px rgba(58, 49, 25, 0.18);
      display: grid;
      grid-template-rows: auto minmax(120px, 1fr) auto minmax(112px, 0.85fr);
      gap: clamp(6px, 1.2vh, 12px);
      align-items: center;
    }

    #instruction {
      margin: 0;
      text-align: center;
      font-size: clamp(18px, 2.8vw, 30px);
      line-height: 1.1;
      font-weight: 900;
      color: #4a382c;
    }

    /* =====================================================
       PATTERN IMAGE BOXES
       object-fit: contain keeps the complete character visible.
    ===================================================== */

    .patternArea {
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: nowrap;
      gap: clamp(5px, 1vw, 13px);
    }

    .patternToken,
    .blankToken {
      width: clamp(52px, 10vw, 98px);
      height: clamp(52px, 10vw, 98px);
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      border-radius: 18px;
    }

    .patternToken {
      overflow: hidden;
      padding: clamp(6px, 0.8vw, 10px);
      border: clamp(2px, 0.35vw, 4px) solid #d3cec8;
      background: #ffffff;
      box-shadow: 0 5px 0 rgba(87, 61, 38, 0.14);
    }

    .patternToken img {
      width: 100%;
      height: 100%;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      object-position: center;
    }

    .blankToken {
      border: clamp(3px, 0.45vw, 5px) dashed #8b5f38;
      background: #fff4bb;
      color: #8b5f38;
      font-size: clamp(28px, 5.5vw, 56px);
      font-weight: 1000;
      animation: softPulse 1.4s ease-in-out infinite;
    }

    .answerLabel {
      text-align: center;
      font-size: clamp(15px, 2.1vw, 22px);
      font-weight: 900;
      color: #67492e;
    }

    /* =====================================================
       OPTION BOXES
       Border retained; inside kept plain white.
    ===================================================== */

    #options {
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      align-items: stretch;
      justify-content: center;
      gap: clamp(8px, 2vw, 18px);
    }

    .optionBtn {
      position: relative;
      min-width: 0;
      min-height: 92px;
      overflow: hidden;
      display: grid;
      place-items: center;
      padding: clamp(8px, 1vw, 13px);
      border: clamp(3px, 0.45vw, 5px) solid #6d482d;
      border-radius: clamp(16px, 2.4vw, 25px);
      background: #ffffff;
      box-shadow: 0 7px 0 #b47b42;
      cursor: pointer;
      touch-action: manipulation;
      transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.2s ease;
    }

    .optionBtn img {
      width: 100%;
      height: 100%;
      max-width: 100%;
      max-height: clamp(72px, 12vw, 118px);
      object-fit: contain;
      object-position: center;
      pointer-events: none;
    }

    .optionBtn:active {
      transform: translateY(5px) scale(0.98);
      box-shadow: 0 2px 0 #b47b42;
    }

    .optionBtn:disabled {
      cursor: default;
    }

    .optionBtn.wrong {
      background: #ffe4e4;
      border-color: #d54b4b;
      animation: giggle 0.42s ease;
    }

    .optionBtn.correct {
      background: #e8f9de;
      border-color: #3ba94c;
      box-shadow: 0 7px 0 #2b873b;
    }

    .optionBtn.hintGlow {
      border-color: #f5a400;
      background: #fff8c9;
      animation: answerGlow 0.85s ease-in-out infinite alternate;
    }

    .imageFallback {
      padding: 6px;
      color: #7a3e16;
      text-align: center;
      font-size: 12px;
      line-height: 1.2;
      font-weight: 800;
    }

    /* =====================================================
       CORRECT FEEDBACK
    ===================================================== */

    #feedback {
      position: fixed;
      z-index: 40;
      left: 50%;
      top: 50%;
      min-width: min(80vw, 320px);
      padding: 16px 24px;
      border: 5px solid #2f8e3f;
      border-radius: 25px;
      background: rgba(241, 255, 234, 0.97);
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.25);
      color: #237333;
      text-align: center;
      font-size: clamp(30px, 6vw, 54px);
      font-weight: 1000;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, -50%) scale(0.6);
    }

    #feedback.show {
      animation: feedbackPop 1s ease forwards;
    }

    /* =====================================================
       3. FINAL TREASURE SCREEN
    ===================================================== */

    #endScreen {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 18px;
      background: linear-gradient(#8cddff 0 38%, #79c861 38% 100%);
    }

    #celebrationCanvas {
      position: fixed;
      inset: 0;
      z-index: 2;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .endCard {
      position: relative;
      z-index: 3;
      width: min(720px, 94vw);
      max-height: 94vh;
      padding: clamp(16px, 2.5vh, 28px);
      border: 6px solid #73451f;
      border-radius: 34px;
      background: rgba(255, 250, 229, 0.98);
      box-shadow:
        0 12px 0 rgba(87, 50, 22, 0.25),
        0 20px 40px rgba(0, 0, 0, 0.18);
      text-align: center;
    }

    .endCard h2 {
      margin: 0 0 4px;
      color: #25843b;
      font-size: clamp(38px, 8vw, 72px);
      line-height: 1;
    }

    .endCard p {
      margin: 4px 0 4px;
      color: #69401f;
      font-size: clamp(17px, 2.7vw, 27px);
      font-weight: 900;
    }

    #tapMessage {
      margin-top: 4px;
      color: #8a4e18;
      font-size: clamp(15px, 2.2vw, 21px);
      font-weight: 900;
      animation: messagePulse 1.1s ease-in-out infinite;
    }

    .treasureScene {
      position: relative;
      height: clamp(150px, 29vh, 235px);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      perspective: 700px;
    }

    #chestButton {
      position: relative;
      width: clamp(190px, 36vw, 300px);
      height: clamp(112px, 21vw, 175px);
      padding: 0;
      border: 0;
      background: transparent;
      cursor: pointer;
      touch-action: manipulation;
      animation: chestInvite 0.95s ease-in-out infinite alternate;
    }

    #chestButton:focus-visible {
      outline: 5px solid #ffcf2f;
      outline-offset: 8px;
      border-radius: 20px;
    }

    #chestButton.opened {
      cursor: default;
      animation: none;
    }

    .treasureGlow {
      position: absolute;
      left: 50%;
      top: 12%;
      width: 58%;
      height: 54%;
      border-radius: 50%;
      background: radial-gradient(
        circle,
        rgba(255, 250, 145, 0.98),
        rgba(255, 218, 49, 0.35) 52%,
        transparent 72%
      );
      filter: blur(2px);
      opacity: 0;
      transform: translateX(-50%) scale(0.7);
      transition: opacity 0.5s ease, transform 0.6s ease;
      pointer-events: none;
    }

    #chestButton.opened .treasureGlow {
      opacity: 1;
      transform: translateX(-50%) scale(1.25);
      animation: glowPulse 0.75s ease-in-out infinite alternate;
    }

    .chest {
      position: absolute;
      inset: 0;
    }

    .chestBody {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 64%;
      border: 6px solid #5f3419;
      border-radius: 8px 8px 23px 23px;
      background: repeating-linear-gradient(90deg, #a95b24 0 32px, #c8752d 32px 63px);
      box-shadow: inset 0 -12px 0 rgba(99, 49, 18, 0.22);
    }

    .chestLid {
      position: absolute;
      left: 0;
      right: 0;
      top: 10%;
      height: 43%;
      border: 6px solid #5f3419;
      border-radius: 70px 70px 8px 8px;
      background: repeating-linear-gradient(90deg, #bd6928 0 32px, #dd8738 32px 63px);
      transform-origin: center bottom;
      transition: transform 0.72s cubic-bezier(0.2, 0.9, 0.25, 1.25), top 0.72s ease;
      z-index: 4;
    }

    #chestButton.opened .chestLid {
      top: 1%;
      transform: translateY(-26%) rotateX(-74deg);
    }

    .chestBand {
      position: absolute;
      left: 45%;
      top: 4%;
      width: 11%;
      height: 88%;
      z-index: 5;
      border: 3px solid #8b6414;
      background: #f6cd3c;
      transition: opacity 0.3s ease;
    }

    .chestLock {
      position: absolute;
      z-index: 6;
      left: 42%;
      top: 53%;
      width: 17%;
      height: 25%;
      border: 4px solid #8b6414;
      border-radius: 7px;
      background: #ffd84c;
      transition: transform 0.45s ease, opacity 0.4s ease;
    }

    #chestButton.opened .chestLock {
      opacity: 0;
      transform: translateY(25px) rotate(18deg);
    }

    .goldCoins {
      position: absolute;
      left: 50%;
      bottom: 36%;
      z-index: 3;
      width: 68%;
      height: 26%;
      opacity: 0;
      transform: translateX(-50%) translateY(18px) scale(0.7);
      transition: opacity 0.5s ease 0.25s, transform 0.6s ease 0.25s;
      pointer-events: none;
    }

    #chestButton.opened .goldCoins {
      opacity: 1;
      transform: translateX(-50%) translateY(0) scale(1);
    }

    .coin {
      position: absolute;
      width: clamp(16px, 3vw, 27px);
      aspect-ratio: 1;
      border: 3px solid #b47b00;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #fff7a4 0 17%, #ffd743 18% 65%, #e7a914 66% 100%);
      box-shadow: 0 3px 0 rgba(121, 79, 0, 0.25);
    }

    .coin:nth-child(1) { left: 4%; bottom: 1%; }
    .coin:nth-child(2) { left: 18%; bottom: 14%; }
    .coin:nth-child(3) { left: 31%; bottom: 3%; }
    .coin:nth-child(4) { left: 45%; bottom: 19%; }
    .coin:nth-child(5) { left: 59%; bottom: 5%; }
    .coin:nth-child(6) { left: 72%; bottom: 17%; }
    .coin:nth-child(7) { left: 84%; bottom: 2%; }

    #playAgainBtn {
      display: inline-block;
      min-width: 190px;
      margin-top: 4px;
      padding: 13px 28px;
      border: 4px solid #5c361d;
      border-radius: 22px;
      background: linear-gradient(#ffdb51, #f6aa1c);
      box-shadow: 0 7px 0 #bd701b;
      color: #5a351c;
      font-size: clamp(21px, 3.6vw, 31px);
      font-weight: 1000;
      cursor: pointer;
      touch-action: manipulation;
      opacity: 0;
      visibility: hidden;
      transform: translateY(18px) scale(0.92);
      transition: opacity 0.45s ease, transform 0.45s ease, visibility 0.45s;
    }

    #playAgainBtn.show {
      opacity: 1;
      visibility: visible;
      transform: translateY(0) scale(1);
    }

    #playAgainBtn:active {
      transform: translateY(5px);
      box-shadow: 0 2px 0 #bd701b;
    }

    /* =====================================================
       ANIMATIONS
    ===================================================== */

    @keyframes giggle {
      0%, 100% { transform: translateX(0) rotate(0); }
      20% { transform: translateX(-8px) rotate(-3deg); }
      40% { transform: translateX(8px) rotate(3deg); }
      60% { transform: translateX(-6px) rotate(-2deg); }
      80% { transform: translateX(6px) rotate(2deg); }
    }

    @keyframes answerGlow {
      from {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(255, 184, 0, 0.35), 0 7px 0 #d59a22;
      }
      to {
        transform: scale(1.04);
        box-shadow: 0 0 0 12px rgba(255, 184, 0, 0.12), 0 7px 0 #d59a22;
      }
    }

    @keyframes softPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.045); }
    }

    @keyframes feedbackPop {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.55);
      }
      20%, 77% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(1.12);
      }
    }

    @keyframes chestInvite {
      from { transform: translateY(0) scale(1); }
      to { transform: translateY(-7px) scale(1.02); }
    }

    @keyframes glowPulse {
      from { opacity: 0.68; }
      to { opacity: 1; }
    }

    @keyframes messagePulse {
      0%, 100% { transform: scale(1); opacity: 0.74; }
      50% { transform: scale(1.035); opacity: 1; }
    }

    /* =====================================================
       SHORT LANDSCAPE SCREENS
    ===================================================== */

    @media (max-height: 560px) {
      .topBar {
        min-height: 13%;
      }

      .keyTrail {
        height: 8%;
        min-height: 30px;
      }

      .gameCard {
        max-height: 75%;
        padding-top: 7px;
        padding-bottom: 8px;
        gap: 4px;
        grid-template-rows: auto minmax(80px, 1fr) auto minmax(70px, 0.75fr);
      }

      .patternToken,
      .blankToken {
        width: clamp(42px, 8.5vw, 74px);
        height: clamp(42px, 8.5vw, 74px);
        padding: 5px;
      }

      .optionBtn {
        min-height: 68px;
        padding: 6px;
      }

      .optionBtn img {
        max-height: clamp(48px, 9vw, 78px);
      }

      .subtitle {
        display: none;
      }

      .endCard {
        padding: 12px 20px 14px;
      }

      .treasureScene {
        height: clamp(122px, 33vh, 175px);
      }

      #tapMessage {
        margin-top: 0;
      }
    }

    /* =====================================================
       MOBILE PORTRAIT
    ===================================================== */

    @media (max-width: 560px) and (orientation: portrait) {
      .topBar {
        width: 100%;
        grid-template-columns: 1fr auto;
      }

      .titleWrap {
        grid-column: 1;
        padding-left: 4px;
        text-align: left;
      }

      .progressBox {
        grid-column: 2;
      }

      h1 {
        font-size: clamp(25px, 7vw, 36px);
      }

      .gameCard {
        width: 98%;
        max-height: 77%;
        grid-template-rows: auto minmax(130px, 1fr) auto minmax(120px, 0.86fr);
      }

      .patternArea {
        gap: 4px;
      }

      .patternToken,
      .blankToken {
        width: clamp(44px, 14vw, 68px);
        height: clamp(44px, 14vw, 68px);
        padding: 5px;
      }

      .optionBtn img {
        max-height: clamp(56px, 18vw, 92px);
      }

      .treasureScene {
        height: clamp(150px, 27vh, 210px);
      }
    }
  </style>
</head>

<body>
  <!-- =====================================================
       SPLASH SCREEN
  ====================================================== -->
  <div id="splashScreen" aria-label="Logo screen">
    <img id="splashLogo" src="assets/innovine-logo.png" alt="Innovine logo" />
  </div>

  <!-- =====================================================
       GAME SCREEN
  ====================================================== -->
  <main id="gameScreen" aria-live="polite">
    <div class="cloud one"></div>
    <div class="cloud two"></div>

    <header class="topBar">
      <div class="titleWrap">
        <h1>Pattern Treasure Hunt</h1>
        <div class="subtitle">Complete the ABC pattern and collect the keys!</div>
      </div>

      <div class="progressBox">
        <span id="questionNumber">1</span> / <span id="totalQuestions">10</span>
      </div>
    </header>

    <div class="keyTrail" id="keyTrail" aria-label="Keys collected"></div>

    <section class="gameCard">
      <p id="instruction">Tap the picture that comes next.</p>

      <div class="patternArea" id="patternArea" aria-label="Pattern"></div>

      <div class="answerLabel">Which picture comes next?</div>

      <div id="options" aria-label="Answer choices"></div>
    </section>
  </main>

  <!-- =====================================================
       CORRECT FEEDBACK
  ====================================================== -->
  <div id="feedback" role="status">✅ Good Job!</div>

  <!-- =====================================================
       FINAL SCREEN
  ====================================================== -->
  <section id="endScreen" aria-label="Game complete">
    <canvas id="celebrationCanvas"></canvas>

    <div class="endCard">
      <h2>Good Job!</h2>
      <p>You collected all the keys!</p>
      <div id="tapMessage">Tap the treasure chest to open it.</div>

      <div class="treasureScene">
        <button id="chestButton" type="button" aria-label="Tap to open the treasure chest">
          <div class="treasureGlow"></div>

          <div class="goldCoins" aria-hidden="true">
            <span class="coin"></span>
            <span class="coin"></span>
            <span class="coin"></span>
            <span class="coin"></span>
            <span class="coin"></span>
            <span class="coin"></span>
            <span class="coin"></span>
          </div>

          <div class="chest" aria-hidden="true">
            <div class="chestLid"></div>
            <div class="chestBody"></div>
            <div class="chestBand"></div>
            <div class="chestLock"></div>
          </div>
        </button>
      </div>

      <button id="playAgainBtn" type="button">▶ Play Again</button>
    </div>
  </section>

  <!-- =====================================================
       AUDIO
  ====================================================== -->
  <audio id="clapsSound" src="assets/claps.mp3" preload="auto" playsinline></audio>
  <audio id="wrongSound" src="assets/wrong.mp3" preload="auto" playsinline></audio>

  <script>
    (function () {
      "use strict";

      /* ===================================================
         SETTINGS
      =================================================== */

      var QUESTIONS_PER_GAME = 10;
      var NEXT_QUESTION_DELAY = 1050;

      /*
        The code first looks for .png files.
        If an image is not found, it automatically tries:
        .jpg, .jpeg and .webp
      */
      var IMAGE_EXTENSIONS = ["png", "jpg", "jpeg", "webp"];

      /* ===================================================
         QUESTION BANK
         ABC pattern shown as:
         A B C A B ?
         Correct answer = image 3
      =================================================== */

      var QUESTION_BANK = [
        { id: "a", items: ["a1", "a2", "a3"] },
        { id: "b", items: ["b1", "b2", "b3"] },
        { id: "c", items: ["c1", "c2", "c3"] },
        { id: "d", items: ["d1", "d2", "d3"] },
        { id: "e", items: ["e1", "e2", "e3"] },
        { id: "f", items: ["f1", "f2", "f3"] },
        { id: "g", items: ["g1", "g2", "g3"] },
        { id: "h", items: ["h1", "h2", "h3"] },
        { id: "i", items: ["i1", "i2", "i3"] },
        { id: "j", items: ["j1", "j2", "j3"] }
      ];

      /* ===================================================
         ELEMENTS
      =================================================== */

      var splashScreen = document.getElementById("splashScreen");
      var gameScreen = document.getElementById("gameScreen");
      var endScreen = document.getElementById("endScreen");
      var patternArea = document.getElementById("patternArea");
      var optionsBox = document.getElementById("options");
      var questionNumber = document.getElementById("questionNumber");
      var totalQuestions = document.getElementById("totalQuestions");
      var keyTrail = document.getElementById("keyTrail");
      var feedback = document.getElementById("feedback");
      var chestButton = document.getElementById("chestButton");
      var tapMessage = document.getElementById("tapMessage");
      var playAgainBtn = document.getElementById("playAgainBtn");
      var clapsSound = document.getElementById("clapsSound");
      var wrongSound = document.getElementById("wrongSound");

      /* ===================================================
         GAME STATE
      =================================================== */

      var currentQuestions = [];
      var currentIndex = 0;
      var wrongAttempts = 0;
      var answered = false;
      var nextTimer = null;
      var treasureOpened = false;

      /* ===================================================
         HELPERS
      =================================================== */

      function shuffle(array) {
        var copy = array.slice();
        var i;
        var j;
        var temp;

        for (i = copy.length - 1; i > 0; i--) {
          j = Math.floor(Math.random() * (i + 1));
          temp = copy[i];
          copy[i] = copy[j];
          copy[j] = temp;
        }

        return copy;
      }

      function safePlay(audioElement) {
        try {
          audioElement.pause();
          audioElement.currentTime = 0;

          var playPromise = audioElement.play();

          if (playPromise && typeof playPromise.catch === "function") {
            playPromise.catch(function () {});
          }
        } catch (error) {}
      }

      function imagePath(name, extension) {
        return "assets/" + name + "." + extension;
      }

      /*
        Creates an image and automatically tries multiple
        extensions if needed.
      */
      function createImageElement(name, altText) {
        var img = document.createElement("img");
        var extensionIndex = 0;

        img.alt = altText || name;
        img.draggable = false;
        img.decoding = "async";
        img.src = imagePath(name, IMAGE_EXTENSIONS[extensionIndex]);

        img.onerror = function () {
          extensionIndex++;

          if (extensionIndex < IMAGE_EXTENSIONS.length) {
            img.src = imagePath(name, IMAGE_EXTENSIONS[extensionIndex]);
          } else {
            var fallback = document.createElement("div");
            fallback.className = "imageFallback";
            fallback.textContent = "Missing image: " + name;

            if (img.parentNode) {
              img.parentNode.innerHTML = "";
              img.parentNode.appendChild(fallback);
            }
          }
        };

        return img;
      }

      /* ===================================================
         KEYS
      =================================================== */

      function createKeyTrail() {
        keyTrail.innerHTML = "";

        for (var i = 0; i < QUESTIONS_PER_GAME; i++) {
          var slot = document.createElement("div");
          slot.className = "keySlot";
          slot.textContent = "🗝️";
          slot.setAttribute("aria-label", "Key " + (i + 1));
          keyTrail.appendChild(slot);
        }
      }

      function earnKey(index) {
        var slots = keyTrail.getElementsByClassName("keySlot");

        if (slots[index]) {
          slots[index].className = "keySlot earned";
        }
      }

      /* ===================================================
         PATTERN
      =================================================== */

      function buildPattern(question) {
        var sequence = [
          question.items[0],
          question.items[1],
          question.items[2],
          question.items[0],
          question.items[1]
        ];

        patternArea.innerHTML = "";

        sequence.forEach(function (name) {
          var token = document.createElement("div");
          token.className = "patternToken";
          token.appendChild(createImageElement(name, name));
          patternArea.appendChild(token);
        });

        var blank = document.createElement("div");
        blank.className = "blankToken";
        blank.textContent = "?";
        patternArea.appendChild(blank);
      }

      /* ===================================================
         OPTIONS
      =================================================== */

      function buildOptions(question) {
        var choices = shuffle(question.items.slice());
        var correctAnswer = question.items[2];

        optionsBox.innerHTML = "";

        choices.forEach(function (choice) {
          var button = document.createElement("button");

          button.type = "button";
          button.className = "optionBtn";
          button.setAttribute("data-answer", choice);
          button.setAttribute("aria-label", "Choose " + choice);
          button.appendChild(createImageElement(choice, choice));

          button.onclick = function () {
            checkAnswer(button, choice, correctAnswer);
          };

          optionsBox.appendChild(button);
        });
      }

      function showQuestion() {
        var question = currentQuestions[currentIndex];

        wrongAttempts = 0;
        answered = false;
        questionNumber.textContent = currentIndex + 1;

        buildPattern(question);
        buildOptions(question);
      }

      function removeWrongClass(button) {
        window.setTimeout(function () {
          button.className = button.className.replace(/\s?wrong/g, "");
        }, 450);
      }

      function glowCorrectAnswer(correctAnswer) {
        var buttons = optionsBox.getElementsByClassName("optionBtn");

        for (var i = 0; i < buttons.length; i++) {
          if (buttons[i].getAttribute("data-answer") === correctAnswer) {
            if (buttons[i].className.indexOf("hintGlow") === -1) {
              buttons[i].className += " hintGlow";
            }
          }
        }
      }

      function disableOptions() {
        var buttons = optionsBox.getElementsByClassName("optionBtn");

        for (var i = 0; i < buttons.length; i++) {
          buttons[i].disabled = true;
        }
      }

      function showGoodJob() {
        feedback.className = "";
        void feedback.offsetWidth;
        feedback.className = "show";
      }

      /* ===================================================
         ANSWER CHECK
      =================================================== */

      function checkAnswer(button, selectedAnswer, correctAnswer) {
        if (answered) {
          return;
        }

        if (selectedAnswer === correctAnswer) {
          answered = true;
          disableOptions();

          button.className = "optionBtn correct";
          earnKey(currentIndex);
          showGoodJob();
          safePlay(clapsSound);

          nextTimer = window.setTimeout(function () {
            currentIndex++;

            if (currentIndex < currentQuestions.length) {
              showQuestion();
            } else {
              showEndScreen();
            }
          }, NEXT_QUESTION_DELAY);
        } else {
          wrongAttempts++;
          safePlay(wrongSound);

          button.className = button.className.replace(/\s?wrong/g, "") + " wrong";
          removeWrongClass(button);

          if (wrongAttempts >= 2) {
            glowCorrectAnswer(correctAnswer);
          }
        }
      }

      /* ===================================================
         GAME FLOW
      =================================================== */

      function resetTreasureScreen() {
        treasureOpened = false;
        chestButton.className = "";
        chestButton.disabled = false;
        tapMessage.textContent = "Tap the treasure chest to open it.";
        tapMessage.style.animation = "messagePulse 1.1s ease-in-out infinite";
        playAgainBtn.className = "";
      }

      function startGame() {
        if (nextTimer) {
          window.clearTimeout(nextTimer);
          nextTimer = null;
        }

        stopCelebration();
        resetTreasureScreen();

        endScreen.style.display = "none";
        gameScreen.style.display = "flex";

        currentQuestions = shuffle(QUESTION_BANK).slice(0, QUESTIONS_PER_GAME);
        currentIndex = 0;
        wrongAttempts = 0;
        answered = false;

        totalQuestions.textContent = QUESTIONS_PER_GAME;

        createKeyTrail();
        showQuestion();
      }

      function showEndScreen() {
        gameScreen.style.display = "none";
        endScreen.style.display = "flex";
        resetTreasureScreen();
      }

      function openTreasure() {
        if (treasureOpened) {
          return;
        }

        treasureOpened = true;
        chestButton.className = "opened";
        chestButton.disabled = true;
        tapMessage.textContent = "Hurray! You opened the treasure!";
        tapMessage.style.animation = "none";

        safePlay(clapsSound);

        window.setTimeout(function () {
          startCelebration();
        }, 120);

        window.setTimeout(function () {
          playAgainBtn.className = "show";
        }, 900);
      }

      chestButton.onclick = openTreasure;

      playAgainBtn.onclick = function () {
        startGame();
      };

      /* ===================================================
         FIRECRACKERS + CONFETTI CANVAS
      =================================================== */

      var canvas = document.getElementById("celebrationCanvas");
      var ctx = canvas.getContext("2d");
      var celebrationFrame = null;
      var celebrationRunning = false;
      var confettiPieces = [];
      var fireworkParticles = [];
      var burstTimers = [];

      var colours = [
        "#ffcf2f",
        "#ff6b6b",
        "#4ecdc4",
        "#7a77ff",
        "#ff8fd8",
        "#59c75b",
        "#ff8a2b"
      ];

      function resizeCanvas() {
        var ratio = window.devicePixelRatio || 1;

        canvas.width = Math.floor(window.innerWidth * ratio);
        canvas.height = Math.floor(window.innerHeight * ratio);
        canvas.style.width = window.innerWidth + "px";
        canvas.style.height = window.innerHeight + "px";

        ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      }

      function randomColour() {
        return colours[Math.floor(Math.random() * colours.length)];
      }

      function createConfettiPiece(startAboveScreen) {
        return {
          x: Math.random() * window.innerWidth,
          y: startAboveScreen
            ? -20 - Math.random() * window.innerHeight
            : -20 - Math.random() * 160,
          w: 5 + Math.random() * 8,
          h: 8 + Math.random() * 11,
          speed: 2 + Math.random() * 3.3,
          drift: -1.3 + Math.random() * 2.6,
          rotation: Math.random() * Math.PI,
          spin: -0.13 + Math.random() * 0.26,
          colour: randomColour()
        };
      }

      function addFireworkBurst(x, y, count) {
        for (var i = 0; i < count; i++) {
          var angle = Math.random() * Math.PI * 2;
          var speed = 3 + Math.random() * 7;

          fireworkParticles.push({
            x: x,
            y: y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 2.2,
            gravity: 0.12 + Math.random() * 0.05,
            life: 44 + Math.random() * 26,
            maxLife: 70,
            size: 2.5 + Math.random() * 4.5,
            colour: randomColour(),
            trail: []
          });
        }
      }

      function scheduleFireworks() {
        var centreX = window.innerWidth * 0.5;
        var chestTopY = window.innerHeight * 0.57;

        var bursts = [
          { delay: 0, x: centreX - 70, y: chestTopY },
          { delay: 180, x: centreX + 60, y: chestTopY - 12 },
          { delay: 360, x: centreX, y: chestTopY - 50 },
          { delay: 620, x: centreX - 130, y: chestTopY - 85 },
          { delay: 820, x: centreX + 125, y: chestTopY - 100 },
          { delay: 1080, x: centreX - 30, y: chestTopY - 145 },
          { delay: 1320, x: centreX + 40, y: chestTopY - 165 }
        ];

        bursts.forEach(function (burst) {
          var timer = window.setTimeout(function () {
            if (celebrationRunning) {
              addFireworkBurst(burst.x, burst.y, 34);
            }
          }, burst.delay);

          burstTimers.push(timer);
        });
      }

      function drawConfetti() {
        for (var i = 0; i < confettiPieces.length; i++) {
          var piece = confettiPieces[i];

          piece.y += piece.speed;
          piece.x += piece.drift;
          piece.rotation += piece.spin;

          if (piece.y > window.innerHeight + 25) {
            confettiPieces[i] = createConfettiPiece(false);
            piece = confettiPieces[i];
          }

          ctx.save();
          ctx.translate(piece.x, piece.y);
          ctx.rotate(piece.rotation);
          ctx.fillStyle = piece.colour;
          ctx.fillRect(-piece.w / 2, -piece.h / 2, piece.w, piece.h);
          ctx.restore();
        }
      }

      function drawFireworks() {
        for (var i = fireworkParticles.length - 1; i >= 0; i--) {
          var particle = fireworkParticles[i];

          particle.trail.push({ x: particle.x, y: particle.y });

          if (particle.trail.length > 4) {
            particle.trail.shift();
          }

          particle.x += particle.vx;
          particle.y += particle.vy;
          particle.vy += particle.gravity;
          particle.vx *= 0.986;
          particle.life--;

          var alpha = Math.max(0, particle.life / particle.maxLife);

          for (var t = 0; t < particle.trail.length; t++) {
            var trailPoint = particle.trail[t];
            ctx.globalAlpha = alpha * ((t + 1) / particle.trail.length) * 0.45;
            ctx.fillStyle = particle.colour;
            ctx.beginPath();
            ctx.arc(trailPoint.x, trailPoint.y, particle.size * 0.45, 0, Math.PI * 2);
            ctx.fill();
          }

          ctx.globalAlpha = alpha;
          ctx.fillStyle = particle.colour;
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
          ctx.fill();

          ctx.globalAlpha = 1;

          if (particle.life <= 0) {
            fireworkParticles.splice(i, 1);
          }
        }
      }

      function animateCelebration() {
        if (!celebrationRunning) {
          return;
        }

        ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
        drawConfetti();
        drawFireworks();

        celebrationFrame = window.requestAnimationFrame(animateCelebration);
      }

      function startCelebration() {
        stopCelebration();
        resizeCanvas();

        confettiPieces = [];
        fireworkParticles = [];

        for (var i = 0; i < 105; i++) {
          confettiPieces.push(createConfettiPiece(true));
        }

        celebrationRunning = true;
        scheduleFireworks();
        animateCelebration();
      }

      function stopCelebration() {
        celebrationRunning = false;

        if (celebrationFrame) {
          window.cancelAnimationFrame(celebrationFrame);
          celebrationFrame = null;
        }

        while (burstTimers.length) {
          window.clearTimeout(burstTimers.pop());
        }

        confettiPieces = [];
        fireworkParticles = [];

        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }

      window.addEventListener("resize", function () {
        if (celebrationRunning) {
          resizeCanvas();
        }
      });

      /* ===================================================
         START AFTER 2-SECOND LOGO SCREEN
      =================================================== */

      window.setTimeout(function () {
        splashScreen.style.display = "none";
        startGame();
      }, 2000);
    })();
  </script>
</body>
