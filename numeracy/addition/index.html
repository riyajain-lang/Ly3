<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Addition Game</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:Fredoka,sans-serif}
body{background:url('assets/background.png') center/cover no-repeat}
.hidden{display:none!important}
#splash,#end{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fff}
#splash img{max-width:280px;width:70%}
#game{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px;gap:12px}
h1{color:#7a49b7;font-size:clamp(32px,6vw,56px)}
.row{display:flex;align-items:center;justify-content:center;gap:20px;width:100%}
.box{width:30vw;max-width:360px;min-width:140px;height:150px;background:rgba(255,255,255,.92);
border:6px solid #c68bd6;border-radius:25px;box-shadow:inset 0 0 0 4px #f3bfdc;
display:flex;flex-wrap:wrap;justify-content:center;align-content:center;gap:8px;padding:10px}
.box img{width:50px;height:50px;object-fit:contain}
.sign{font-size:70px;font-weight:bold;color:#444}
#answer{width:140px;height:90px;border:5px dashed #7a49b7;border-radius:20px;background:#fff;
display:flex;align-items:center;justify-content:center;font-size:48px;color:#7a49b7}
#options{display:flex;gap:20px}
.opt{width:90px;height:90px;border-radius:50%;background:#fff;border:5px solid #7a49b7;
display:flex;align-items:center;justify-content:center;font-size:42px;font-weight:bold;cursor:pointer}
.wiggle{animation:w .35s}
@keyframes w{25%{transform:translateX(-5px)}50%{transform:translateX(5px)}75%{transform:translateX(-5px)}}
.glow{animation:g 1s infinite}
@keyframes g{50%{box-shadow:0 0 20px gold}}
#feedback{height:40px;font-size:30px;color:green}
button{padding:14px 30px;font-size:24px;border:none;border-radius:12px;background:#7a49b7;color:#fff}
@media(max-width:700px){
.box{height:120px}.box img{width:38px;height:38px}.sign{font-size:50px}
.opt{width:75px;height:75px;font-size:34px}#answer{width:110px;height:70px}
}
</style>
</head>
<body>

<div id="splash">
<img src="assets/innovine-logo.png">
</div>

<div id="game" class="hidden">
<h1>Addition</h1>
<div class="row">
<div id="g1" class="box"></div>
<div class="sign">+</div>
<div id="g2" class="box"></div>
</div>
<div class="sign">=</div>
<div id="answer">?</div>
<div id="options"></div>
<div id="feedback"></div>
</div>

<div id="end" class="hidden">
<h1>🎉 Good Job! 🎉</h1>
<br>
<button onclick="restart()">Play Again</button>
</div>

<audio id="correct" src="assets/freesound_community-claps-44774.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<script>
const imgs=["car.png","owl.png","panda.png","pumpkin.png","sun.png","turtle.png"];
let qs=[],idx=0,wrongCount=0;

function shuffle(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function buildQuestions(){
qs=[];
for(let i=0;i<10;i++){
let a=Math.floor(Math.random()*5)+1;
let b=Math.floor(Math.random()*(10-a))+1;
qs.push({a,b,ans:a+b,img:imgs[Math.floor(Math.random()*imgs.length)]});
}
shuffle(qs);
}

function render(){
if(idx>=qs.length){finish();return;}
wrongCount=0;
feedback.innerHTML='';
answer.innerHTML='?';
g1.innerHTML=''; g2.innerHTML='';
let q=qs[idx];
for(let i=0;i<q.a;i++)g1.innerHTML+=`<img src="assets/${q.img}">`;
for(let i=0;i<q.b;i++)g2.innerHTML+=`<img src="assets/${q.img}">`;

let opts=[q.ans];
while(opts.length<3){
let n=Math.floor(Math.random()*10)+1;
if(!opts.includes(n))opts.push(n);
}
shuffle(opts);
options.innerHTML='';
opts.forEach(n=>{
let d=document.createElement('div');
d.className='opt'; d.textContent=n;
d.onclick=()=>check(n,d);
options.appendChild(d);
});
}

function check(n,el){
let q=qs[idx];
if(n===q.ans){
document.getElementById('correct').play();
answer.innerHTML=n;
feedback.innerHTML='✅ Good Job!';
setTimeout(()=>{idx++;render();},1200);
}else{
document.getElementById('wrong').play();
wrongCount++;
el.classList.add('wiggle');
setTimeout(()=>el.classList.remove('wiggle'),350);
if(wrongCount>=2){
document.querySelectorAll('.opt').forEach(o=>{
if(+o.textContent===q.ans)o.classList.add('glow');
});
}
}
}

function finish(){
game.classList.add('hidden');
end.classList.remove('hidden');
confetti({particleCount:200,spread:120});
}

function restart(){
idx=0;
buildQuestions();
end.classList.add('hidden');
game.classList.remove('hidden');
render();
}

setTimeout(()=>{
splash.classList.add('hidden');
game.classList.remove('hidden');
buildQuestions();
render();
},2000);
</script>
</body>
</html>
