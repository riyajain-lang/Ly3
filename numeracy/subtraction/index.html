<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">

<title>Subtraction Game</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html,body{
height:100%;
overflow:hidden;
font-family:'Fredoka',sans-serif;
}

body{
background:url('assets/background.png') center center/cover no-repeat;
}

.hidden{
display:none !important;
}

/* SPLASH */

#splash{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:white;
}

#logo{
width:min(300px,70vw);
}

/* GAME */

#game{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:12px;
padding:10px;
}

.title{
font-size:clamp(32px,6vw,60px);
font-weight:700;
color:#7a49b7;
}

.row{
display:flex;
align-items:center;
justify-content:center;
gap:20px;
width:100%;
}

.box{
width:30vw;
max-width:360px;
min-width:140px;
height:150px;

background:rgba(255,255,255,.95);

border:6px solid #c98ed6;
border-radius:25px;

box-shadow:
inset 0 0 0 4px #f4bfd9;

display:flex;
flex-wrap:wrap;
justify-content:center;
align-content:center;
gap:8px;

padding:10px;
}

.box img{
width:55px;
height:55px;
object-fit:contain;
}

.sign{
font-size:70px;
font-weight:bold;
color:#444;
}

#answerBox{
width:140px;
height:90px;

background:white;

border:5px dashed #7a49b7;

border-radius:20px;

display:flex;
justify-content:center;
align-items:center;

font-size:48px;
font-weight:bold;

color:#7a49b7;
}

#options{
display:flex;
gap:20px;
}

.option{
width:90px;
height:90px;

border-radius:50%;

background:white;

border:5px solid #7a49b7;

display:flex;
justify-content:center;
align-items:center;

font-size:42px;
font-weight:bold;

cursor:pointer;

transition:.2s;
}

.option:hover{
transform:scale(1.05);
}

#feedback{
height:40px;
font-size:30px;
font-weight:bold;
color:green;
}

/* WIGGLE */

.wiggle{
animation:wiggle .35s;
}

@keyframes wiggle{

25%{transform:translateX(-5px);}
50%{transform:translateX(5px);}
75%{transform:translateX(-5px);}

}

/* GLOW */

.glow{
animation:glow 1s infinite;
}

@keyframes glow{

50%{
box-shadow:
0 0 15px gold,
0 0 25px gold;
}

}

/* END SCREEN */

#endScreen{
position:fixed;
inset:0;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

gap:25px;

background:url('assets/background.png') center center/cover no-repeat;
}

.endTitle{
font-size:clamp(34px,6vw,60px);
color:#28a745;
}

#playAgain{
padding:15px 30px;

font-size:24px;

background:#7a49b7;
color:white;

border:none;
border-radius:15px;

cursor:pointer;
}

@media(max-width:700px){

.box{
height:120px;
}

.box img{
width:38px;
height:38px;
}

.sign{
font-size:50px;
}

.option{
width:75px;
height:75px;
font-size:34px;
}

#answerBox{
width:110px;
height:70px;
}

}

</style>
</head>
<body>

<!-- SPLASH -->

<div id="splash">

<img
id="logo"
src="assets/innovine-logo.png">

</div>

<!-- GAME -->

<div id="game" class="hidden">

<div class="title">
Subtraction
</div>

<div class="row">

<div id="group1" class="box"></div>

<div class="sign">−</div>

<div id="group2" class="box"></div>

</div>

<div class="sign">=</div>

<div id="answerBox">?</div>

<div id="options"></div>

<div id="feedback"></div>

</div>

<!-- END -->

<div id="endScreen" class="hidden">

<div class="endTitle">
🎉 Good Job! 🎉
</div>

<button id="playAgain">
Play Again
</button>

</div>

<!-- AUDIO -->

<audio id="correctSound">
<source src="assets/freesound_community-claps-44774.mp3">
</audio>

<audio id="wrongSound">
<source src="assets/wrong.mp3">
</audio>

<!-- CONFETTI -->

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<script>

const images=[
"ant.png",
"apple.png",
"boy.png",
"butterfly.png",
"mango.png",
"monkey.png",
"parrot.png"
];

let questions=[];
let currentQuestion=0;
let wrongAttempts=0;

function shuffle(array){

for(let i=array.length-1;i>0;i--){

const j=Math.floor(Math.random()*(i+1));

[array[i],array[j]]=[array[j],array[i]];

}

return array;

}

function createQuestions(){

questions=[];

for(let i=0;i<10;i++){

let total=Math.floor(Math.random()*8)+2;
let takeAway=Math.floor(Math.random()*(total-1))+1;

questions.push({

total:total,
takeAway:takeAway,
answer:total-takeAway,

image:images[
Math.floor(Math.random()*images.length)
]

});

}

shuffle(questions);

}

function loadQuestion(){

if(currentQuestion>=questions.length){

finishGame();
return;

}

wrongAttempts=0;

document.getElementById("feedback").innerHTML="";
document.getElementById("answerBox").innerHTML="?";

const q=questions[currentQuestion];

group1.innerHTML="";
group2.innerHTML="";
options.innerHTML="";

for(let i=0;i<q.total;i++){

group1.innerHTML+=
`<img src="assets/${q.image}">`;

}

for(let i=0;i<q.takeAway;i++){

group2.innerHTML+=
`<img src="assets/${q.image}">`;

}

let choices=[q.answer];

while(choices.length<3){

let random=Math.floor(Math.random()*10)+1;

if(!choices.includes(random)){

choices.push(random);

}

}

shuffle(choices);

choices.forEach(number=>{

let btn=document.createElement("div");

btn.className="option";

btn.innerHTML=number;

btn.onclick=()=>checkAnswer(number,btn);

options.appendChild(btn);

});

}

function checkAnswer(number,button){

const q=questions[currentQuestion];

if(number===q.answer){

correctSound.currentTime=0;
correctSound.play();

answerBox.innerHTML=number;

feedback.innerHTML="✅ Good Job!";

setTimeout(()=>{

currentQuestion++;

loadQuestion();

},1200);

}
else{

wrongSound.currentTime=0;
wrongSound.play();

wrongAttempts++;

button.classList.add("wiggle");

setTimeout(()=>{

button.classList.remove("wiggle");

},350);

if(wrongAttempts>=2){

document
.querySelectorAll(".option")
.forEach(opt=>{

if(Number(opt.innerHTML)===q.answer){

opt.classList.add("glow");

}

});

}

}

}

function finishGame(){

game.classList.add("hidden");

endScreen.classList.remove("hidden");

confetti({

particleCount:200,
spread:120

});

}

playAgain.onclick=()=>{

currentQuestion=0;

createQuestions();

endScreen.classList.add("hidden");

game.classList.remove("hidden");

loadQuestion();

};

setTimeout(()=>{

splash.classList.add("hidden");

game.classList.remove("hidden");

createQuestions();

loadQuestion();

},2000);

</script>

</body>
</html>
