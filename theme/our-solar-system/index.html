<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planet Puzzle Game</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family: Arial, sans-serif;}
body, html { width:100%; height:100%; overflow:hidden; display:flex; justify-content:center; align-items:center; background:#000; }
#game-container { width:100%; max-width:500px; height:100%; text-align:center; position:relative; }
.slide { width:100%; height:100%; position:absolute; top:0; left:0; display:none; flex-direction:column; justify-content:center; align-items:center; }
.active { display:flex; }
.logo-slide { background:white; justify-content:center; align-items:center; }
.game-slide { background:url('assets/background.png') no-repeat center center/cover; }
.instruction-box { margin-top:10px; padding:10px 20px; background:rgba(255,255,255,0.8); border-radius:12px; font-weight:bold; font-size:18px; }
.puzzle-container { display:flex; flex-wrap:wrap; justify-content:center; margin-top:10px; }
.piece { width:80px; height:80px; margin:5px; cursor:pointer; transition: transform 0.2s; }
.piece.wrong { animation: shake 0.3s; }
@keyframes shake { 0%{transform:translateX(0);}25%{transform:translateX(-10px);}50%{transform:translateX(10px);}75%{transform:translateX(-10px);}100%{transform:translateX(0);} }
.tick { width:30px; height:30px; margin-top:10px; display:none; }
.goodjob-slide { justify-content:center; align-items:center; color:white; font-size:24px; }
button { margin-top:15px; padding:10px 20px; font-size:18px; cursor:pointer; border-radius:10px; border:none; background:#ff6f61; color:white; }
canvas { position:absolute; top:0; left:0; pointer-events:none; }
</style>
</head>
<body>
<div id="game-container">

  <div class="slide logo-slide active">
    <img src="assets/innovine-logo.png" style="width:50%;" />
  </div>

  <div class="slide game-slide" id="game-slide">
    <div class="instruction-box">Assemble the Planet Puzzle</div>
    <div class="puzzle-container" id="puzzle-container"></div>
    <div id="tick-container"><img id="tick" src="assets/correct.mp3" class="tick"/></div>
  </div>

  <div class="slide goodjob-slide" id="goodjob-slide">
    <h2>Good Job!</h2>
    <canvas id="confetti-canvas" width="500" height="500"></canvas>
    <button id="play-again">Play Again</button>
  </div>

</div>

<script>
// Puzzle data
const planets = [
  {name:'earth.png', pieces: ['d8a83220-cbe6-4559-a40a-6997f979bb70.png','assets/earth.png','assets/earth.png','assets/earth.png']},
  {name:'mars.png', pieces: ['assets/mars.png','assets/mars.png','assets/mars.png','assets/mars.png']}
  // Add other planets with 3–4 pieces each
];

let currentIndex=0, selectedCount=0, attempts=0;

const puzzleContainer=document.getElementById('puzzle-container');

function shuffle(arr){ return arr.sort(()=>Math.random()-0.5); }

function loadPuzzle(){
  puzzleContainer.innerHTML='';
  attempts=0;
  selectedCount=0;
  const puzzle=planets[currentIndex];
  const pieces=shuffle(puzzle.pieces.slice());
  pieces.forEach((src,i)=>{
    const img=document.createElement('img');
    img.src=src;
    img.classList.add('piece');
    img.dataset.correct=i;
    img.onclick=()=>selectPiece(img,i);
    puzzleContainer.appendChild(img);
  });
}

function selectPiece(img,index){
  const puzzle=planets[currentIndex];
  if(index===selectedCount){
    selectedCount++;
    img.style.border='3px solid green';
    if(selectedCount===puzzle.pieces.length){
      document.getElementById('tick').style.display='block';
      setTimeout(nextPuzzle,500);
    }
  } else {
    attempts++;
    img.classList.add('wrong');
    setTimeout(()=>img.classList.remove('wrong'),300);
    if(attempts>=2){
      // Highlight correct piece
      const imgs=document.querySelectorAll('.piece');
      imgs.forEach((im,i)=>{ if(i===selectedCount) im.style.border='3px solid yellow'; });
    }
  }
}

function nextPuzzle(){
  document.getElementById('tick').style.display='none';
  currentIndex++;
  if(currentIndex<planets.length){
    loadPuzzle();
  } else {
    showGoodJob();
  }
}

function showGoodJob(){
  document.querySelectorAll('.slide').forEach(s=>s.classList.remove('active'));
  document.getElementById('goodjob-slide').classList.add('active');
  playConfetti();
}

function playConfetti(){
  const canvas=document.getElementById('confetti-canvas');
  const ctx=canvas.getContext('2d');
  const particles=[];
  for(let i=0;i<100;i++){
    particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*6+2,dx:(Math.random()-0.5)*4,dy:Math.random()*2+1});
  }
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle='rgba(255,215,0,0.8)';
      ctx.fill();
      p.x+=p.dx;p.y+=p.dy;
      if(p.y>canvas.height)p.y=0;
      if(p.x>canvas.width)p.x=0;
    });
    requestAnimationFrame(draw);
  }
  draw();
}

setTimeout(()=>{
  document.querySelector('.logo-slide').classList.remove('active');
  document.getElementById('game-slide').classList.add('active');
  loadPuzzle();
},2000);

document.getElementById('play-again').onclick=()=>{location.reload();}
</script>
</body>
</html>
