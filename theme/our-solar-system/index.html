<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadow Matching Planets Creative Glow</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family: Arial,sans-serif; }
body, html { width:100%; height:100%; overflow:hidden; display:flex; justify-content:center; align-items:center; background:#000; }
#game-container { width:100%; max-width:600px; height:100%; position:relative; text-align:center; overflow:hidden; }
.slide { width:100%; height:100%; position:absolute; top:0; left:0; display:none; flex-direction:column; justify-content:flex-start; align-items:center; }
.active { display:flex; }
.logo-slide { justify-content:center; align-items:center; background:white; }
.game-slide { background: url('/mnt/data/52f94fe4-4fcf-47ec-b2e8-8ebe1ce59892.png') no-repeat center center/cover; }
.instruction-box { margin-top:10px; padding:10px 20px; background:rgba(255,255,255,0.8); border-radius:12px; font-weight:bold; font-size:18px; }
.shadow-container { position:relative; width:100%; height:70%; margin-top:10px; }
.shadow { position:absolute; width:70px; height:70px; display:flex; justify-content:center; align-items:center; border-radius:50%; cursor:pointer; }
.shadow img { width:100%; height:100%; position:absolute; top:0; left:0; }
.overlay { position:absolute; width:100%; height:100%; top:0; left:0; display:none; pointer-events:none; }
.planet-options { display:flex; flex-wrap:wrap; justify-content:center; margin-top:10px; }
.planet-option { margin:5px; width:60px; height:60px; cursor:pointer; transition: transform 0.2s; animation: rotate 4s linear infinite; }
.planet-option.wrong { animation: shake 0.3s; }
@keyframes shake { 0%{transform:translateX(0);}25%{transform:translateX(-10px);}50%{transform:translateX(10px);}75%{transform:translateX(-10px);}100%{transform:translateX(0);} }
@keyframes rotate { 0%{transform:rotate(0deg);} 100%{transform:rotate(360deg);} }
.tick { width:30px; height:30px; position:absolute; display:none; }
.goodjob-slide { justify-content:center; align-items:center; color:white; font-size:24px; }
button { margin-top:15px; padding:10px 20px; font-size:18px; cursor:pointer; border-radius:10px; border:none; background:#ff6f61; color:white; }
#progress { margin-top:10px; display:flex; justify-content:center; }
.star { width:25px; height:25px; margin:2px; opacity:0.3; transition: opacity 0.3s; }
.star.active { opacity:1; }
canvas { position:absolute; top:0; left:0; pointer-events:none; }
</style>
</head>
<body>
<div id="game-container">

  <div class="slide logo-slide active">
    <img src="assets/innovine-logo.png" alt="Logo" style="width:50%;">
  </div>

  <div class="slide game-slide" id="game-slide">
    <div class="instruction-box">Shadow Matching Planets</div>
    <div id="progress"></div>
    <div class="shadow-container" id="shadow-container"></div>
    <div class="planet-options" id="planet-options"></div>
  </div>

  <div class="slide goodjob-slide" id="goodjob-slide">
    <h2>Good Job!</h2>
    <canvas id="confetti-canvas" width="600" height="600"></canvas>
    <button id="play-again">Play Again</button>
  </div>

</div>

<script>
const planetData = [
  {name:"mercury.png", shadow:"/mnt/data/fac35f06-a584-47eb-82b9-0e6684e9d46c.png", top:"10%", left:"20%"},
  {name:"venus.png", shadow:"/mnt/data/fac35f06-a584-47eb-82b9-0e6684e9d46c.png", top:"25%", left:"70%"},
  {name:"earth.png", shadow:"/mnt/data/fac35f06-a584-47eb-82b9-0e6684e9d46c.png", top:"40%", left:"35%"},
  {name:"mars.png", shadow:"/mnt/data/fac35f06-a584-47eb-82b9-0e6684e9d46c.png", top:"55%", left:"60%"},
  {name:"jupiter.png", shadow:"/mnt/data/fac35f06-a584-47eb-82b9-0e6684e9d46c.png", top:"70%", left:"25%"},
  {name:"saturn.png", shadow:"/mnt/data/fac35f06-a584-47eb-82b9-0e6684e9d46c.png", top:"20%", left:"50%"},
  {name:"uranus.png", shadow:"/mnt/data/fac35f06-a584-47eb-82b9-0e6684e9d46c.png", top:"50%", left:"80%"},
  {name:"neptune.png", shadow:"/mnt/data/fac35f06-a584-47eb-82b9-0e6684e9d46c.png", top:"65%", left:"45%"}
];

const glowOverlay = "/mnt/data/4d570600-7490-499d-b140-9a265561513f.png";

let selectedPlanet = null;
let attempts = {};
const shadowContainer = document.getElementById('shadow-container');
const planetOptionsDiv = document.getElementById('planet-options');
const progressDiv = document.getElementById('progress');

// Initialize shadows with glow overlay
planetData.forEach(p=>{
  const div=document.createElement('div');
  div.classList.add('shadow');
  div.style.top=p.top;
  div.style.left=p.left;
  div.dataset.planet=p.name;

  const shadowImg=document.createElement('img');
  shadowImg.src=p.shadow;
  div.appendChild(shadowImg);

  const overlayImg=document.createElement('img');
  overlayImg.src=glowOverlay;
  overlayImg.classList.add('overlay');
  div.appendChild(overlayImg);

  div.onclick=()=> placePlanet(div);
  shadowContainer.appendChild(div);
  attempts[p.name]=0;
});

// Progress stars
planetData.forEach(()=>{ const star=document.createElement('img'); star.src='https://i.imgur.com/O0Y8FhT.png'; star.classList.add('star'); progressDiv.appendChild(star); });

function shuffle(array){return array.sort(()=>Math.random()-0.5);}
function createOptions(){
  planetOptionsDiv.innerHTML='';
  shuffle(planetData).forEach(p=>{
    const img=document.createElement('img');
    img.src='assets/'+p.name;
    img.classList.add('planet-option');
    img.onclick=()=> selectPlanet(img,p.name);
    planetOptionsDiv.appendChild(img);
  });
}

function selectPlanet(img,name){selectedPlanet={img,name};}

function placePlanet(shadowDiv){
  if(!selectedPlanet) return;
  const overlay = shadowDiv.querySelector('.overlay');
  if(shadowDiv.dataset.planet===selectedPlanet.name){
    shadowDiv.appendChild(selectedPlanet.img);
    selectedPlanet.img.style.position='absolute';
    selectedPlanet.img.style.top='0';
    selectedPlanet.img.style.left='0';
    overlay.style.display='none';
    document.querySelectorAll('.star')[planetData.findIndex(p=>p.name===selectedPlanet.name)].classList.add('active');
    selectedPlanet=null;
    checkCompletion();
  } else {
    attempts[selectedPlanet.name]++;
    selectedPlanet.img.classList.add('wrong');
    setTimeout(()=> selectedPlanet.img.classList.remove('wrong'),300);
    if(attempts[selectedPlanet.name]>=2){
      overlay.style.display='block';
    }
  }
}

function checkCompletion(){
  const matched=document.querySelectorAll('.shadow img:not(.overlay)').length - planetData.length;
  if(matched>=planetData.length) showGoodJob();
}

function showGoodJob(){
  document.querySelectorAll('.slide').forEach(s=>s.classList.remove('active'));
  document.getElementById('goodjob-slide').classList.add('active');
  playConfetti();
}

function playConfetti(){
  const canvas=document.getElementById('confetti-canvas');
  const ctx=canvas.getContext('2d');
  const particles=[];
  for(let i=0;i<150;i++){
    particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*6+2,dx:(Math.random()-0.5)*4,dy:Math.random()*2+1});
  }
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle='rgba(255,215,0,0.8)';
      ctx.fill();
      p.x+=p.dx;p.y+=p.dy;
      if(p.y>canvas.height)p.y=0;
      if(p.x>canvas.width)p.x=0;
    });
    requestAnimationFrame(draw);
  }
  draw();
}

// Start after logo
setTimeout(()=>{
  document.querySelector('.logo-slide').classList.remove('active');
  document.getElementById('game-slide').classList.add('active');
  createOptions();
},2000);

document.getElementById('play-again').onclick=()=>{location.reload();};
</script>
</body>
</html>
