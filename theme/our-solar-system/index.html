<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Who Am I? Solar System Game</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
}

body{
display:flex;
justify-content:center;
align-items:center;
background:#000;
}

#game{
width:100%;
max-width:500px;
height:100vh;
position:relative;
overflow:hidden;
}

/* Slides */

.slide{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
}

.active{
display:flex;
}

/* Logo */

#logoSlide{
background:white;
}

#logoSlide img{
width:70%;
max-width:280px;
}

/* Game */

#gameSlide{
background:url('assets/background-solar-system.png') center center/cover no-repeat;
padding:15px;
}

.instruction{
background:rgba(255,255,255,.9);
padding:12px 20px;
border-radius:18px;
font-size:28px;
font-weight:bold;
margin-bottom:15px;
text-align:center;
}

.planet-box{
width:180px;
height:180px;
display:flex;
justify-content:center;
align-items:center;
margin-bottom:20px;
}

.planet-box img{
max-width:100%;
max-height:100%;
object-fit:contain;
}

.options{
width:100%;
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.option{
background:white;
border-radius:18px;
padding:15px;
font-size:24px;
font-weight:bold;
text-align:center;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,.2);
user-select:none;
}

.option.correctGlow{
animation:glow 1s infinite;
}

@keyframes glow{
0%{
box-shadow:0 0 5px #0000FF;
}
50%{
box-shadow:0 0 25px #0000FF;
}
100%{
box-shadow:0 0 5px #0000FF;
}
}

.wiggle{
animation:wiggle .35s;
}

@keyframes wiggle{
0%{transform:translateX(0);}
25%{transform:translateX(-8px);}
50%{transform:translateX(8px);}
75%{transform:translateX(-8px);}
100%{transform:translateX(0);}
}

.tick{
font-size:70px;
color:green;
margin-top:10px;
display:none;
}

/* Good Job */

#endSlide{
background:url('assets/background-solar-system.png') center center/cover no-repeat;
color:white;
text-align:center;
}

#endSlide h1{
font-size:42px;
margin-bottom:20px;
text-shadow:2px 2px 5px black;
}

#playAgain{
padding:14px 25px;
font-size:22px;
border:none;
border-radius:15px;
cursor:pointer;
background:#4CAF50;
color:white;
}

canvas{
position:absolute;
top:0;
left:0;
pointer-events:none;
width:100%;
height:100%;
}

</style>
</head>
<body>

<div id="game">

<!-- LOGO -->

<div id="logoSlide" class="slide active">
<img src="assets/innovine-logo.png">
</div>

<!-- GAME -->

<div id="gameSlide" class="slide">

<div class="instruction">
Who Am I?
</div>

<div class="planet-box">
<img id="planetImage">
</div>

<div class="options" id="options"></div>

<div class="tick" id="tick">
✔
</div>

</div>

<!-- END -->

<div id="endSlide" class="slide">

<canvas id="confetti"></canvas>

<h1>🎉 Good Job! 🎉</h1>

<button id="playAgain">
Play Again
</button>

</div>

</div>

<!-- AUDIO -->

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapsSound" src="assets/claps.mp3"></audio>

<script>

const questions = [

{
name:"Mercury",
image:"assets/mercury.png"
},

{
name:"Venus",
image:"assets/venus.png"
},

{
name:"Earth",
image:"assets/earth.png"
},

{
name:"Mars",
image:"assets/mars.png"
},

{
name:"Jupiter",
image:"assets/jupiter.png"
},

{
name:"Saturn",
image:"assets/saturn.png"
},

{
name:"Uranus",
image:"assets/uranus.png"
},

{
name:"Neptune",
image:"assets/neptune.png"
},

{
name:"Sun",
image:"assets/sun.png"
}

];

let current=0;
let wrongAttempts=0;

const gameSlide=document.getElementById("gameSlide");
const endSlide=document.getElementById("endSlide");

const planetImage=document.getElementById("planetImage");
const options=document.getElementById("options");

const correctSound=document.getElementById("correctSound");
const wrongSound=document.getElementById("wrongSound");
const clapsSound=document.getElementById("clapsSound");

shuffle(questions);

function shuffle(arr){
for(let i=arr.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[arr[i],arr[j]]=[arr[j],arr[i]];
}
}

function loadQuestion(){

wrongAttempts=0;

document.getElementById("tick").style.display="none";

const q=questions[current];

planetImage.src=q.image;

let choices=[q.name];

while(choices.length<4){

let random=
questions[Math.floor(Math.random()*questions.length)].name;

if(!choices.includes(random))
choices.push(random);
}

shuffle(choices);

options.innerHTML="";

choices.forEach(choice=>{

let btn=document.createElement("div");

btn.className="option";

btn.innerText=choice;

btn.onclick=()=>checkAnswer(btn,choice);

options.appendChild(btn);

});

}

function checkAnswer(btn,choice){

const answer=questions[current].name;

if(choice===answer){

correctSound.play();
clapsSound.play();

document.getElementById("tick").style.display="block";

setTimeout(()=>{

current++;

if(current>=questions.length){

showEnd();

}
else{

loadQuestion();

}

},1200);

}
else{

wrongSound.play();

btn.classList.add("wiggle");

setTimeout(()=>{
btn.classList.remove("wiggle");
},350);

wrongAttempts++;

if(wrongAttempts>=2){

document.querySelectorAll(".option").forEach(o=>{

if(o.innerText===answer){

o.classList.add("correctGlow");

}

});

}

}

}

function showEnd(){

gameSlide.classList.remove("active");
endSlide.classList.add("active");

startConfetti();

}

document.getElementById("playAgain").onclick=()=>{

location.reload();

};

/* Logo */

setTimeout(()=>{

document.getElementById("logoSlide").classList.remove("active");
gameSlide.classList.add("active");

loadQuestion();

},2000);

/* Confetti */

function startConfetti(){

const canvas=document.getElementById("confetti");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const confetti=[];

for(let i=0;i<150;i++){

confetti.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height-canvas.height,
r:Math.random()*8+4,
d:Math.random()*150

});

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

confetti.forEach(c=>{

ctx.beginPath();
ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
ctx.fillStyle=`hsl(${Math.random()*360},100%,50%)`;
ctx.fill();

c.y+=3;

if(c.y>canvas.height){

c.y=-20;

}

});

requestAnimationFrame(draw);

}

draw();

}

</script>

</body>
</html>
