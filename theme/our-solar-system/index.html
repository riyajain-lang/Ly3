<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadow Matching Planets</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family: Arial, sans-serif; }
  body, html { width:100%; height:100%; display:flex; justify-content:center; align-items:center; background:#0b0b2f; overflow:hidden; }
  .game-container {
    width:100%; max-width:500px; height:100%; position:relative; text-align:center; color:white; 
  }
  .slide { width:100%; height:100%; display:none; flex-direction:column; justify-content:center; align-items:center; }
  .slide.active { display:flex; }
  #logo-slide { background:#ffffff; }
  .slide.game-slide { 
    background: url('background.png') no-repeat center center; 
    background-size: cover;
  }
  #logo-slide img { width:150px; height:auto; }
  .shadows { display:flex; flex-wrap:wrap; justify-content:center; gap:10px; margin-top:20px; }
  .shadow { width:60px; height:60px; background:white; border-radius:50%; display:flex; justify-content:center; align-items:center; }
  .objects { display:flex; flex-wrap:wrap; justify-content:center; gap:10px; margin-top:20px; }
  .object { width:60px; height:60px; cursor:pointer; transition: transform 0.2s, box-shadow 0.3s; }
  .object.jiggle { animation: jiggle 0.3s; }
  .shadow.correct-glow { box-shadow:0 0 15px 5px green; }
  @keyframes jiggle { 0%{transform:rotate(0deg);}25%{transform:rotate(10deg);}50%{transform:rotate(-10deg);}75%{transform:rotate(10deg);}100%{transform:rotate(0deg);} }
  .tick { font-size:2rem; color:green; margin-top:10px; display:none; }
  .end-slide { flex-direction:column; justify-content:center; align-items:center; }
  .play-again-btn { margin-top:20px; padding:10px 20px; font-size:1.2rem; border:none; border-radius:10px; background:#4a2c91; color:#fff; cursor:pointer; }
  canvas { position:absolute; top:0; left:0; pointer-events:none; }
</style>
</head>
<body>
<div class="game-container">
  <!-- Slide 1: Logo -->
  <div class="slide active" id="logo-slide">
    <img src="innovine-logo.png" alt="Logo">
  </div>

  <!-- End Slide -->
  <div class="slide" id="end-slide">
    <h2>Good Job!</h2>
    <canvas id="confetti"></canvas>
    <button class="play-again-btn" onclick="restartGame()">Play Again</button>
  </div>
</div>

<audio id="correct-sound" src="correct.mp3"></audio>
<audio id="wrong-sound" src="wrong.mp3"></audio>
<audio id="clap-sound" src="freesound_community-claps-44774.mp3"></audio>

<script>
const items = [
  {name:"sun", img:"sun.png"},
  {name:"mercury", img:"mercury.png"},
  {name:"venus", img:"venus.png"},
  {name:"earth", img:"earth.png"},
  {name:"mars", img:"mars.png"},
  {name:"jupiter", img:"jupiter.png"},
  {name:"saturn", img:"saturn.png"},
  {name:"uranus", img:"uranus.png"},
  {name:"neptune", img:"neptune.png"},
  {name:"rocket", img:"rocket.png"}
];

let remainingItems = [];
let currentItem = null;
let wrongAttempts = 0;

function startGame(){
  setTimeout(()=>{
    document.getElementById("logo-slide").classList.remove("active");
    remainingItems = [...items].sort(()=>Math.random()-0.5);
    showNextItem();
  },2000);
}

function showNextItem(){
  const container = document.querySelector(".game-container");
  const oldSlide = document.querySelector(".slide.game-slide");
  if(oldSlide) oldSlide.remove();

  if(remainingItems.length === 0){
    document.getElementById("end-slide").classList.add("active");
    document.getElementById("clap-sound").play();
    startConfetti();
    return;
  }

  wrongAttempts = 0;
  currentItem = remainingItems.pop();

  const slide = document.createElement("div");
  slide.classList.add("slide","game-slide","active");
  slide.innerHTML = `
    <div class="shadows" id="shadows"></div>
    <div class="objects" id="objects"></div>
    <div class="tick" id="tick">✓</div>
  `;
  document.getElementById("end-slide").before(slide);

  const shadowsDiv = slide.querySelector("#shadows");
  const objectsDiv = slide.querySelector("#objects");

  const shuffledShadows = [...items].sort(()=>Math.random()-0.5);
  shuffledShadows.forEach(it=>{
    const shadow = document.createElement("div");
    shadow.classList.add("shadow");
    shadow.dataset.name = it.name;
    shadowsDiv.appendChild(shadow);
  });

  const shuffledObjects = [currentItem, ...items.filter(i=>i.name!==currentItem.name).slice(0,2)].sort(()=>Math.random()-0.5);
  shuffledObjects.forEach(it=>{
    const obj = document.createElement("img");
    obj.classList.add("object");
    obj.src = it.img;
    obj.dataset.name = it.name;
    obj.onclick = () => checkMatch(obj);
    objectsDiv.appendChild(obj);
  });
}

function checkMatch(obj){
  const shadow = document.querySelector(`.shadow[data-name='${currentItem.name}']`);
  if(obj.dataset.name === currentItem.name){
    document.getElementById("correct-sound").play();
    shadow.classList.add("correct-glow");
    document.getElementById("tick").style.display="block";
    setTimeout(showNextItem,1000);
  } else {
    wrongAttempts++;
    document.getElementById("wrong-sound").play();
    obj.classList.add("jiggle");
    setTimeout(()=>obj.classList.remove("jiggle"),300);
    if(wrongAttempts>=2) shadow.classList.add("correct-glow");
  }
}

function restartGame(){
  document.querySelector(".slide.game-slide")?.remove();
  document.getElementById("end-slide").classList.remove("active");
  remainingItems = [...items].sort(()=>Math.random()-0.5);
  showNextItem();
}

// Confetti effect
function startConfetti(){
  const canvas = document.getElementById("confetti");
  const ctx = canvas.getContext("2d");
  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
  const confettis = [];
  for(let i=0;i<100;i++){
    confettis.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height,
      r:Math.random()*6+4,
      d:Math.random()*canvas.height,
      color:`hsl(${Math.random()*360},100%,50%)`,
      tilt:Math.random()*10-10
    });
  }
  let angle = 0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    confettis.forEach(f=>{
      ctx.beginPath();
      ctx.lineWidth=f.r/2;
      ctx.strokeStyle=f.color;
      ctx.moveTo(f.x+f.tilt,f.y);
      ctx.lineTo(f.x+f.tilt,f.y+f.r);
      ctx.stroke();
    });
    angle += 0.01;
    confettis.forEach(f=>{
      f.x += Math.sin(angle);
      f.y += 1;
      if(f.y>canvas.height){ f.y=0; f.x=Math.random()*canvas.width; }
    });
    requestAnimationFrame(draw);
  }
  draw();
}

startGame();
</script>
</body>
</html>
