<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Materials Hunt</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:"Comic Sans MS","Trebuchet MS",Arial,sans-serif;
}

#splash{
  position:fixed;
  inset:0;
  background:white;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:10;
}
#splash img{
  max-width:45%;
  max-height:45%;
}

#game{
  width:100vw;
  height:100vh;
  display:none;
  flex-direction:column;
  align-items:center;
  text-align:center;
  padding:2vh 3vw;
  background:
    radial-gradient(circle at top left,#d9f8c4 0%,transparent 32%),
    radial-gradient(circle at top right,#c7f0ff 0%,transparent 35%),
    radial-gradient(circle at bottom left,#fff0a8 0%,transparent 35%),
    radial-gradient(circle at bottom right,#ffd6c9 0%,transparent 35%),
    linear-gradient(135deg,#f7fff2,#eefcff);
  position:relative;
}

h1{
  font-size:clamp(30px,5vw,58px);
  color:white;
  background:linear-gradient(135deg,#43a047,#81c784,#4fc3f7);
  border:5px solid #2e7d32;
  border-radius:28px;
  padding:8px 36px;
  margin-bottom:1.5vh;
  box-shadow:0 6px 0 #2e7d32,0 12px 18px rgba(0,0,0,.18);
  text-shadow:2px 2px rgba(0,0,0,.25);
}

#question{
  font-size:clamp(21px,3vw,34px);
  color:#1565c0;
  background:white;
  border:4px dashed #43a047;
  border-radius:22px;
  padding:9px 22px;
  margin-bottom:2vh;
  font-weight:bold;
}

#soundBtn{
  font-family:"Comic Sans MS","Trebuchet MS",Arial,sans-serif;
  font-size:clamp(22px,3vw,34px);
  padding:12px 36px;
  border:none;
  background:linear-gradient(135deg,#66bb6a,#26c6da,#42a5f5);
  color:white;
  border-radius:45px;
  cursor:pointer;
  margin-bottom:4vh;
  font-weight:bold;
  box-shadow:0 6px 0 #1565c0,0 10px 18px rgba(0,0,0,.2);
}

#soundBtn:active{
  transform:translateY(5px);
  box-shadow:0 2px 0 #1565c0;
}

.cards{
  width:100%;
  display:flex;
  justify-content:center;
  gap:clamp(18px,6vw,95px);
}

.card{
  width:clamp(115px,22vw,220px);
  height:clamp(120px,20vw,210px);
  background:linear-gradient(160deg,#ffffff,#f1fff3);
  border:6px solid #43a047;
  border-radius:32px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  box-shadow:0 8px 0 #2e7d32,0 12px 20px rgba(0,0,0,.18);
  padding:14px;
}

.card:nth-child(2){
  border-color:#29b6f6;
  box-shadow:0 8px 0 #0288d1,0 12px 20px rgba(0,0,0,.18);
}

.card:nth-child(3){
  border-color:#ffa726;
  box-shadow:0 8px 0 #ef6c00,0 12px 20px rgba(0,0,0,.18);
}

.card img{
  max-width:100%;
  max-height:100%;
  object-fit:contain;
}

.shake{animation:shake .35s}
@keyframes shake{
  0%,100%{transform:translateX(0)}
  25%{transform:translateX(-9px)}
  50%{transform:translateX(9px)}
  75%{transform:translateX(-9px)}
}

.glow{
  animation:glow 1s infinite alternate;
  border-color:#00c853!important;
}
@keyframes glow{
  from{box-shadow:0 0 10px #00c853}
  to{box-shadow:0 0 38px #00c853}
}

#feedback{
  position:absolute;
  bottom:4vh;
  font-size:clamp(34px,6vw,72px);
  font-weight:bold;
  color:#00a000;
  text-shadow:3px 3px white;
}

#end{
  display:none;
  position:fixed;
  inset:0;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  text-align:center;
  z-index:5;
  background:
    radial-gradient(circle at top left,#d9f8c4 0%,transparent 32%),
    radial-gradient(circle at top right,#c7f0ff 0%,transparent 35%),
    radial-gradient(circle at bottom left,#fff0a8 0%,transparent 35%),
    radial-gradient(circle at bottom right,#ffd6c9 0%,transparent 35%),
    linear-gradient(135deg,#f7fff2,#eefcff);
}

#end h2{
  font-size:clamp(48px,9vw,100px);
  color:white;
  background:linear-gradient(135deg,#43a047,#81c784,#4fc3f7);
  border:6px solid #2e7d32;
  padding:22px 42px;
  border-radius:35px;
  margin-bottom:35px;
  box-shadow:0 8px 0 #2e7d32;
  text-shadow:2px 2px rgba(0,0,0,.25);
}

#playAgain{
  font-family:"Comic Sans MS","Trebuchet MS",Arial,sans-serif;
  font-size:clamp(24px,3vw,36px);
  padding:15px 42px;
  border:none;
  background:linear-gradient(135deg,#66bb6a,#26c6da,#42a5f5);
  color:white;
  border-radius:45px;
  cursor:pointer;
  font-weight:bold;
  box-shadow:0 6px 0 #1565c0,0 10px 18px rgba(0,0,0,.2);
}

#playAgain:active{
  transform:translateY(5px);
  box-shadow:0 2px 0 #1565c0;
}

canvas{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:20;
}

@media(max-width:650px){
  #game{padding:2vh 2vw}
  h1{font-size:28px;padding:7px 16px}
  #question{font-size:18px;margin-bottom:1.5vh}
  #soundBtn{font-size:20px;padding:10px 28px;margin-bottom:3vh}
  .cards{gap:10px}
  .card{
    width:30vw;
    height:30vw;
    padding:10px;
    border-radius:24px;
  }
}
</style>
</head>

<body>

<div id="splash">
  <img src="assets/innovine-logo.png" alt="Logo">
</div>

<div id="game">
  <h1>🌿 Materials Hunt 🌿</h1>
  <div id="question"></div>
  <button id="soundBtn">🔊 Play</button>
  <div class="cards" id="cards"></div>
  <div id="feedback"></div>
</div>

<div id="end">
  <h2>🎉 Good Job! 🎉</h2>
  <button id="playAgain">Play Again</button>
</div>

<canvas id="confetti"></canvas>

<script>
const materials=[
  {name:"Plastic", img:"assets/plastic.png", audio:"assets/plastic-audio.mp3"},
  {name:"Wood", img:"assets/wood.png", audio:"assets/wood-audio.mp3"},
  {name:"Metal", img:"assets/metal.png", audio:"assets/metal-audio.mp3"},
  {name:"Fabric", img:"assets/fabric.png", audio:"assets/fabric-audio.mp3"},
  {name:"Paper", img:"assets/paper.png", audio:"assets/paper-audio.mp3"},
  {name:"Glass", img:"assets/glass.png", audio:"assets/glass-audio.mp3"}
];

let questions=[], current=0, wrongAttempts=0, locked=false;
let currentAudio=null;

const splash=document.getElementById("splash");
const game=document.getElementById("game");
const question=document.getElementById("question");
const cards=document.getElementById("cards");
const feedback=document.getElementById("feedback");
const end=document.getElementById("end");
const playAgain=document.getElementById("playAgain");
const soundBtn=document.getElementById("soundBtn");

const claps=new Audio("assets/claps.mp3");
const wrong=new Audio("assets/wrong.mp3");

function shuffle(arr){
  return arr.sort(()=>Math.random()-0.5);
}

function startGame(){
  questions=shuffle([...materials]);
  current=0;
  end.style.display="none";
  game.style.display="flex";
  loadQuestion();
}

function playQuestionAudio(){
  if(currentAudio){
    currentAudio.pause();
    currentAudio.currentTime=0;
  }
  currentAudio=new Audio(questions[current].audio);
  currentAudio.play().catch(()=>{});
}

function loadQuestion(){
  locked=false;
  wrongAttempts=0;
  feedback.textContent="";
  cards.innerHTML="";

  const answer=questions[current];
  question.textContent=`Tap on the objects made up of ${answer.name}.`;

  let options=[answer];

  while(options.length<3){
    let random=materials[Math.floor(Math.random()*materials.length)];
    if(!options.some(o=>o.name===random.name)){
      options.push(random);
    }
  }

  options=shuffle(options);

  options.forEach(item=>{
    const card=document.createElement("div");
    card.className="card";

    const img=document.createElement("img");
    img.src=item.img;
    img.alt=item.name;

    card.appendChild(img);
    card.onclick=()=>checkAnswer(card,item.name,answer.name);
    cards.appendChild(card);
  });

  setTimeout(playQuestionAudio,500);
}

function checkAnswer(card,selected,answer){
  if(locked) return;

  if(selected===answer){
    locked=true;
    feedback.textContent="✓ Good Job!";
    claps.currentTime=0;
    claps.play().catch(()=>{});

    setTimeout(()=>{
      current++;
      if(current>=questions.length){
        showEnd();
      }else{
        loadQuestion();
      }
    },1200);
  }else{
    wrongAttempts++;
    wrong.currentTime=0;
    wrong.play().catch(()=>{});
    card.classList.add("shake");
    setTimeout(()=>card.classList.remove("shake"),400);

    if(wrongAttempts>=2){
      document.querySelectorAll(".card").forEach(c=>{
        const img=c.querySelector("img");
        if(img.alt===answer){
          c.classList.add("glow");
        }
      });
    }
  }
}

soundBtn.onclick=playQuestionAudio;

function showEnd(){
  game.style.display="none";
  end.style.display="flex";
  claps.currentTime=0;
  claps.play().catch(()=>{});
  startConfetti();
}

playAgain.onclick=()=>{
  stopConfetti();
  startGame();
};

setTimeout(()=>{
  splash.style.display="none";
  startGame();
},2000);

const canvas=document.getElementById("confetti");
const ctx=canvas.getContext("2d");
let confetti=[], confettiTimer;

function resizeCanvas(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
}
window.addEventListener("resize",resizeCanvas);
resizeCanvas();

function startConfetti(){
  const colours=[
    "#ff5252","#ffca28","#66bb6a","#29b6f6","#ab47bc",
    "#ff7043","#26c6da","#ec407a","#7e57c2","#ffee58"
  ];

  confetti=[];

  for(let i=0;i<180;i++){
    confetti.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height-canvas.height,
      r:Math.random()*8+4,
      s:Math.random()*4+2,
      color:colours[Math.floor(Math.random()*colours.length)]
    });
  }

  animateConfetti();
}

function animateConfetti(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  confetti.forEach(p=>{
    ctx.fillStyle=p.color;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();

    p.y+=p.s;

    if(p.y>canvas.height){
      p.y=-10;
      p.x=Math.random()*canvas.width;
    }
  });

  confettiTimer=requestAnimationFrame(animateConfetti);
}

function stopConfetti(){
  cancelAnimationFrame(confettiTimer);
  ctx.clearRect(0,0,canvas.width,canvas.height);
}
</script>

</body>
</html>
