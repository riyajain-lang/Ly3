<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Body Parts Quiz</title>
<style>
body, html {
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  font-family:"Comic Sans MS","Trebuchet MS",sans-serif;
  background:
    repeating-linear-gradient(90deg,#f4a3d1 0 38px,#eef5a8 38px 76px),
    repeating-linear-gradient(0deg,#f4a3d1 0 38px,#eef5a8 38px 76px);
  background-blend-mode:multiply;
  display:flex;
  justify-content:center;
  align-items:center;
}
.container{
  width:95vw;
  max-width:800px;
  background:white;
  border:8px solid #ec1593;
  border-radius:30px;
  padding:20px;
  position:relative;
}
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.title{
  font-size:2.4rem;
  color:#ec1593;
  text-align:center;
  flex:1;
}
.score{
  font-size:1.5rem;
  padding:5px 12px;
  border:3px solid #0d2027;
  border-radius:20px;
  background:#eefafa;
}
.instruction{
  text-align:center;
  margin:12px 0;
  font-size:1.4rem;
  border:4px solid #0d2027;
  border-radius:20px;
  padding:8px 12px;
  background:#fff7cf;
}
.board{
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:10px;
}
.column{
  flex:0 0 48%;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.item{
  flex:1;
  border:4px solid #0d2027;
  border-radius:20px;
  background:#eefafa;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  position:relative;
  padding:8px;
}
.item img{
  max-width:80%;
  max-height:80%;
}
.item.selected{border-color:#ec1593; box-shadow:0 0 12px #ec1593;}
.item.matched{opacity:0.7; pointer-events:none;}
.giggle{animation:giggle .35s}
@keyframes giggle{
  0%{transform:translateX(0)}
  25%{transform:translateX(-6px)}
  50%{transform:translateX(6px)}
  75%{transform:translateX(-4px)}
  100%{transform:translateX(0)}
}
.feedback{
  position:absolute;
  left:50%;
  bottom:-10px;
  transform:translateX(-50%);
  font-size:1.8rem;
  font-weight:bold;
  padding:6px 14px;
  border:3px solid #10b917;
  border-radius:18px;
  background:white;
  display:none;
  color:#10b917;
  z-index:5;
}
svg{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  pointer-events:none;
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="title">Body Parts Quiz</div>
    <div class="score">★ <span id="roundNo">1</span>/8 &nbsp; ✓ <span id="score">0</span></div>
  </div>
  <div class="instruction">Tap and tap on the correct match</div>
  <div class="board" id="board">
    <svg id="lineSvg"></svg>
    <div class="column" id="leftColumn"></div>
    <div class="column" id="rightColumn"></div>
    <div class="feedback" id="feedback">✓ Good Job!</div>
  </div>
</div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/freesound_community-claps-44774.mp3"></audio>

<script>
const allPairs = [
  {part:"nose", use:"smelling", partImg:"assets/nose.png", useImg:"assets/smelling.png"},
  {part:"mouth", use:"eating", partImg:"assets/mouth.png", useImg:"assets/eating.png"},
  {part:"legs", use:"running", partImg:"assets/legs.png", useImg:"assets/running.png"},
  {part:"hand", use:"writing", partImg:"assets/hand.png", useImg:"assets/writing.png"},
  {part:"ears", use:"listening", partImg:"assets/ears.png", useImg:"assets/listening.png"},
  {part:"eye", use:"seeing", partImg:"assets/eye.png", useImg:"assets/seeing.png"}
];

let askedPairs = [];
let currentPair = null;
let score = 0;
let selectedLeft = null;
let locked = false;

const leftColumn = document.getElementById("leftColumn");
const rightColumn = document.getElementById("rightColumn");
const board = document.getElementById("board");
const svg = document.getElementById("lineSvg");
const feedback = document.getElementById("feedback");
const roundNo = document.getElementById("roundNo");
const scoreBox = document.getElementById("score");
const correctSound = document.getElementById("correctSound");
const wrongSound = document.getElementById("wrongSound");
const clapSound = document.getElementById("clapSound");

function shuffle(array){return array.sort(()=>Math.random()-0.5)}

function loadNextPair(){
  locked=false;
  selectedLeft=null;
  feedback.style.display="none";
  svg.innerHTML="";
  leftColumn.innerHTML="";
  rightColumn.innerHTML="";

  if(askedPairs.length===8){showEndScreen();return;}

  // pick a random pair not yet asked
  let remaining = allPairs.filter(p=>!askedPairs.includes(p.part));
  currentPair = remaining[Math.floor(Math.random()*remaining.length)];
  askedPairs.push(currentPair.part);

  let leftItems = shuffle([currentPair,...allPairs.filter(p=>p.part!==currentPair.part).slice(0,2)]);
  let rightItems = shuffle([currentPair,...allPairs.filter(p=>p.part!==currentPair.part).slice(0,2)]);

  leftItems.forEach(p=>{
    let div=document.createElement("div");
    div.className="item left-item";
    div.dataset.part=p.part;
    div.dataset.match=p.use;
    div.innerHTML=`<img src="${p.partImg}" alt="${p.part}">`;
    div.onclick=()=>selectLeft(div);
    leftColumn.appendChild(div);
  });

  rightItems.forEach(p=>{
    let div=document.createElement("div");
    div.className="item right-item";
    div.dataset.use=p.use;
    div.innerHTML=`<img src="${p.useImg}" alt="${p.use}">`;
    div.onclick=()=>selectRight(div);
    rightColumn.appendChild(div);
  });

  roundNo.textContent = askedPairs.length;
}

function selectLeft(item){
  if(locked || item.classList.contains("matched")) return;
  document.querySelectorAll(".left-item").forEach(el=>el.classList.remove("selected"));
  selectedLeft=item;
  selectedLeft.classList.add("selected");
}

function selectRight(item){
  if(locked || item.classList.contains("matched")) return;
  if(!selectedLeft){item.classList.add("giggle"); setTimeout(()=>item.classList.remove("giggle"),350); return;}
  if(selectedLeft.dataset.match===item.dataset.use){
    locked=true;
    score++;
    selectedLeft.classList.add("matched");
    item.classList.add("matched");
    drawLine(selectedLeft,item);
    feedback.style.display="block";
    scoreBox.textContent=score;
    playSound(correctSound);
    selectedLeft=null;
    setTimeout(()=>{feedback.style.display="none"; loadNextPair();},800);
  } else {
    playSound(wrongSound);
    item.classList.add("giggle"); setTimeout(()=>item.classList.remove("giggle"),350);
  }
}

function drawLine(leftEl,rightEl){
  const boardRect=board.getBoundingClientRect();
  const leftRect=leftEl.getBoundingClientRect();
  const rightRect=rightEl.getBoundingClientRect();
  const x1=leftRect.right-boardRect.left;
  const y1=leftRect.top+leftRect.height/2-boardRect.top;
  const x2=rightRect.left-boardRect.left;
  const y2=rightRect.top+rightRect.height/2-boardRect.top;
  const line=document.createElementNS("http://www.w3.org/2000/svg","line");
  line.setAttribute("x1",x1);
  line.setAttribute("y1",y1);
  line.setAttribute("x2",x2);
  line.setAttribute("y2",y2);
  svg.appendChild(line);
}

function showEndScreen(){
  playSound(clapSound);
  alert("Excellent! You matched all body parts correctly!"); location.reload();
}

function playSound(sound){sound.currentTime=0; sound.play().catch(()=>{});}

window.onload=()=>{loadNextPair()};
</script>
</body>
</html>
