<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Body Parts Matching Game</title>
<style>
body, html {margin:0; padding:0; width:100%; height:100%; font-family:"Comic Sans MS", sans-serif; background:#a0e5f0; overflow:hidden;}
.container {width:95vw; max-width:1000px; height:95vh; background:white; border:6px solid #ec1593; border-radius:15px; padding:20px 15px; display:flex; flex-direction:column; align-items:center; position:relative;}
.header {width:100%; display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;}
.title { font-size:2rem; color:#ec1593; flex:1; text-align:center; }
.score { font-size:1.4rem; padding:4px 10px; border:3px solid #0d2027; border-radius:10px; background:#eefafa; }
.instruction { font-size:1.3rem; border:3px solid #0d2027; border-radius:10px; background:#fff7cf; padding:6px 12px; margin-bottom:10px; text-align:center; }
.board { display:flex; justify-content:center; flex:1; width:100%; position:relative; gap:60px; }
.column { display:flex; flex-direction:column; justify-content:center; align-items:center; gap:20px; }
.item { width:120px; height:120px; border:4px solid #0d2027; border-radius:5px; background:#eefafa; display:flex; justify-content:center; align-items:center; cursor:pointer; position:relative; }
.item img { max-width:80%; max-height:80%; }
.item.selected { border-color:#ec1593; box-shadow:0 0 12px #ec1593; }
.item.matched { opacity:0.7; pointer-events:none; }
.giggle { animation:giggle .35s; }
@keyframes giggle { 0%{transform:translateX(0)}25%{transform:translateX(-6px)}50%{transform:translateX(6px)}75%{transform:translateX(-4px)}100%{transform:translateX(0)} }
svg { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }
.feedback { position:absolute; left:50%; bottom:5px; transform:translateX(-50%); font-size:1.6rem; font-weight:bold; padding:6px 12px; border:3px solid #10b917; border-radius:12px; background:white; display:none; color:#10b917; z-index:5; }
.confetti{ position:absolute; width:10px; height:10px; top:0; left:0; animation:fall linear forwards; }
@keyframes fall{ 0%{transform:translateY(0) rotate(0deg);} 100%{transform:translateY(100vh) rotate(360deg);} }
#logoScreen, #finalScreen{ position:absolute; top:0; left:0; width:100%; height:100%; display:flex; justify-content:center; align-items:center; flex-direction:column; z-index:100; }
#logoScreen { background:white; display:none; }
#logoScreen img { max-width:50%; }
#finalScreen { background:rgba(255,255,255,0.95); display:none; }
#finalScreen h1 { font-size:3rem; color:#ec1593; margin-bottom:20px; }
#finalScreen button { padding:10px 20px; font-size:1.5rem; border:none; border-radius:15px; background:#ec1593; color:white; cursor:pointer; }
</style>
</head>
<body>

<!-- Slide 1: Logo -->
<div id="logoScreen">
  <img src="03851793-51a9-4f4c-8874-1f09191d7aca.png" alt="Logo">
</div>

<!-- Slides 2 & 3: Matching game -->
<div class="container" id="gameContainer">
  <div class="header">
    <div class="title">Body Parts Matching Game</div>
    <div class="score">★ <span id="score">0</span>/6 ✓</div>
  </div>
  <div class="instruction">Match the uses of body parts.</div>
  <div class="board" id="board">
    <svg id="lineSvg"></svg>
    <div class="column" id="leftColumn"></div>
    <div class="column" id="rightColumn"></div>
    <div class="feedback" id="feedback">✓ Good Job!</div>
  </div>
</div>

<!-- Slide 4: Good Job -->
<div id="finalScreen">
  <h1>Good Job!</h1>
  <button onclick="playAgain()">Play Again</button>
</div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/freesound_community-claps-44774.mp3"></audio>

<script>
const allPairs = [
  {part:"nose", use:"smelling", partImg:"assets/nose.png", useImg:"assets/smelling.png"},
  {part:"mouth", use:"eating", partImg:"assets/mouth.png", useImg:"assets/eating.png"},
  {part:"legs", use:"running", partImg:"assets/legs.png", useImg:"assets/running.png"},
  {part:"hand", use:"writing", partImg:"assets/hand.png", useImg:"assets/writing.png"},
  {part:"ears", use:"listening", partImg:"assets/ears.png", useImg:"assets/listening.png"},
  {part:"eye", use:"seeing", partImg:"assets/eye.png", useImg:"assets/seeing.png"}
];

let score=0, selectedLeft=null, currentSlide=0;
const slides = [ allPairs.slice(0,3), allPairs.slice(3,6) ];

const leftColumn=document.getElementById("leftColumn");
const rightColumn=document.getElementById("rightColumn");
const board=document.getElementById("board");
const svg=document.getElementById("lineSvg");
const feedback=document.getElementById("feedback");
const scoreBox=document.getElementById("score");
const correctSound=document.getElementById("correctSound");
const wrongSound=document.getElementById("wrongSound");
const clapSound=document.getElementById("clapSound");
const finalScreen=document.getElementById("finalScreen");
const logoScreen=document.getElementById("logoScreen");

function shuffle(array){return array.sort(()=>Math.random()-0.5)}

function showLogoThenGame(){
  logoScreen.style.display='flex';
  setTimeout(()=>{
    logoScreen.style.display='none';
    loadBoard();
  },2000);
}

function loadBoard(){
  leftColumn.innerHTML=""; rightColumn.innerHTML=""; svg.innerHTML=""; feedback.style.display="none";
  const slidePairs = shuffle(slides[currentSlide].slice());
  const leftItems = shuffle(slidePairs.slice());
  const rightItems = shuffle(slidePairs.slice());

  leftItems.forEach(p=>{
    const div=document.createElement("div");
    div.className="item left-item"; div.dataset.part=p.part; div.dataset.match=p.use;
    div.innerHTML=`<img src="${p.partImg}" alt="${p.part}">`;
    div.onclick=()=>selectLeft(div); leftColumn.appendChild(div);
  });

  rightItems.forEach(p=>{
    const div=document.createElement("div");
    div.className="item right-item"; div.dataset.use=p.use;
    div.innerHTML=`<img src="${p.useImg}" alt="${p.use}">`;
    div.onclick=()=>selectRight(div); rightColumn.appendChild(div);
  });
}

function selectLeft(item){
  if(item.classList.contains("matched")) return;
  document.querySelectorAll(".left-item").forEach(el=>el.classList.remove("selected"));
  selectedLeft=item; selectedLeft.classList.add("selected");
}

function selectRight(item){
  if(item.classList.contains("matched")) return;
  if(!selectedLeft){item.classList.add("giggle"); setTimeout(()=>item.classList.remove("giggle"),350); return;}
  if(selectedLeft.dataset.match===item.dataset.use){
    score++; scoreBox.textContent=score;
    selectedLeft.classList.add("matched"); item.classList.add("matched");
    drawLine(selectedLeft,item); feedback.style.display="block"; playSound(correctSound);
    setTimeout(()=>{
      feedback.style.display="none"; selectedLeft=null;
      if(document.querySelectorAll('.item.matched').length===slides[currentSlide].length*2){
        currentSlide++;
        if(currentSlide<slides.length){
          loadBoard();
        } else {
          launchConfetti(); playSound(clapSound);
          setTimeout(()=>{finalScreen.style.display="flex";},1000);
        }
      }
    }, 800);
  } else {
    playSound(wrongSound);
    item.classList.add("giggle"); setTimeout(()=>item.classList.remove("giggle"),350);
  }
}

function drawLine(leftEl,rightEl){
  const boardRect=board.getBoundingClientRect();
  const leftRect=leftEl.getBoundingClientRect();
  const rightRect=rightEl.getBoundingClientRect();
  const x1=leftRect.right-boardRect.left;
  const y1=leftRect.top+leftRect.height/2-boardRect.top;
  const x2=rightRect.left-boardRect.left;
  const y2=rightRect.top+rightRect.height/2-boardRect.top;
  const line=document.createElementNS("http://www.w3.org/2000/svg","line");
  line.setAttribute("x1",x1); line.setAttribute("y1",y1);
  line.setAttribute("x2",x2); line.setAttribute("y2",y2);
  line.setAttribute("stroke","#ec1593"); line.setAttribute("stroke-width","5"); line.setAttribute("stroke-linecap","round");
  svg.appendChild(line);
}

function launchConfetti(){
  for(let i=0;i<100;i++){
    const confetti=document.createElement("div");
    confetti.className="confetti";
    confetti.style.background=`hsl(${Math.random()*360},70%,70%)`;
    confetti.style.left=Math.random()*100 + "vw";
    confetti.style.animationDuration=(2+Math.random()*2)+"s";
    board.appendChild(confetti);
    setTimeout(()=>confetti.remove(),4000);
  }
}

function playSound(sound){sound.currentTime=0; sound.play().catch(()=>{});}
function playAgain(){finalScreen.style.display="none"; score=0; scoreBox.textContent=score; currentSlide=0; loadBoard();}
window.onload=()=>{showLogoThenGame()};
</script>
</body>
</html>
