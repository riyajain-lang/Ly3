<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Body Parts Quiz</title>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:"Comic Sans MS","Trebuchet MS",sans-serif;
  background:#58d4d4;
}

.slide{
  width:100vw;
  height:100vh;
  display:none;
  overflow:hidden;
  position:relative;
}

.slide.active{
  display:flex;
}

.logo-slide{
  background:white;
  justify-content:center;
  align-items:center;
}

.logo-slide img{
  width:70%;
  max-width:400px;
  object-fit:contain;
}

.game-slide{
  background:#58d4d4;
  flex-direction:column;
}

.header{
  height:70px;
  width:100%;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:8px 18px;
  color:white;
  font-weight:bold;
}

.back-btn{
  font-size:42px;
  cursor:pointer;
}

.title{
  font-size:clamp(28px,4vw,54px);
  color:white;
  text-shadow:2px 2px #0d2027;
}

.score{
  font-size:clamp(20px,3vw,32px);
  background:rgba(255,255,255,0.28);
  padding:8px 18px;
  border-radius:22px;
}

.main{
  height:calc(100vh - 70px);
  width:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:8px 18px 18px;
  gap:24px;
}

.face-side{
  width:50%;
  height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.instruction{
  font-size:clamp(24px,3vw,40px);
  font-weight:bold;
  color:#0d2027;
  background:white;
  padding:8px 22px;
  border-radius:25px;
  margin-bottom:8px;
  border:4px solid #0d2027;
}

.face-box{
  position:relative;
  width:min(47vw,500px);
  height:min(47vw,500px);
}

.face-img{
  width:100%;
  height:100%;
  object-fit:contain;
}

.target{
  position:absolute;
  width:58px;
  height:58px;
  border:7px solid #fff3b0;
  border-radius:50%;
  box-shadow:0 0 0 5px rgba(255,255,255,0.75), 0 0 24px #fff3b0;
  animation:pulse 0.9s infinite alternate;
  pointer-events:none;
}

@keyframes pulse{
  from{ transform:translate(-50%,-50%) scale(0.9); }
  to{ transform:translate(-50%,-50%) scale(1.15); }
}

.options-side{
  width:46%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:22px;
}

.option-btn{
  width:100%;
  min-height:78px;
  border:6px solid #0d2027;
  background:#eefafa;
  border-radius:18px;
  font-size:clamp(30px,4vw,56px);
  font-family:inherit;
  font-weight:bold;
  text-align:left;
  padding-left:26px;
  cursor:pointer;
  display:none;
}

.option-btn:active{
  transform:scale(0.97);
}

.feedback{
  position:absolute;
  left:50%;
  bottom:14px;
  transform:translateX(-50%);
  background:white;
  color:#10b917;
  padding:10px 26px;
  border-radius:24px;
  font-size:clamp(28px,4vw,48px);
  font-weight:bold;
  display:none;
  border:4px solid #10b917;
}

.end-slide{
  background:#58d4d4;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.end-card{
  background:white;
  width:88%;
  max-width:620px;
  padding:38px 24px;
  border-radius:32px;
  box-shadow:0 10px 25px rgba(0,0,0,0.22);
}

.end-card h1{
  color:#ff4fb2;
  font-size:clamp(54px,8vw,94px);
}

.end-card p{
  color:#2487c7;
  font-size:clamp(26px,4vw,42px);
  font-weight:bold;
  margin-top:10px;
}

.play-again{
  margin-top:24px;
  border:none;
  background:#2487c7;
  color:white;
  font-size:clamp(24px,4vw,38px);
  padding:15px 34px;
  border-radius:28px;
  font-family:inherit;
  font-weight:bold;
  cursor:pointer;
}

.giggle{
  animation:giggle 0.35s;
}

@keyframes giggle{
  0%{transform:translateX(0);}
  25%{transform:translateX(-8px);}
  50%{transform:translateX(8px);}
  75%{transform:translateX(-6px);}
  100%{transform:translateX(0);}
}

.glow{
  animation:glow 0.8s infinite alternate;
}

@keyframes glow{
  from{box-shadow:0 0 10px #00ff44;}
  to{box-shadow:0 0 34px #00ff44;}
}

.confetti{
  position:fixed;
  top:-20px;
  width:12px;
  height:18px;
  z-index:9999;
  animation:fall 3s linear forwards;
}

@keyframes fall{
  to{
    transform:translateY(110vh) rotate(720deg);
    opacity:0;
  }
}

@media(max-width:700px){
  .header{
    height:58px;
    padding:6px 10px;
  }

  .back-btn{
    font-size:34px;
  }

  .main{
    height:calc(100vh - 58px);
    padding:6px;
    gap:8px;
  }

  .face-side{
    width:48%;
  }

  .options-side{
    width:52%;
    gap:12px;
  }

  .instruction{
    font-size:clamp(18px,5vw,26px);
    padding:6px 12px;
    border:3px solid #0d2027;
    margin-bottom:6px;
  }

  .face-box{
    width:48vw;
    height:48vw;
  }

  .target{
    width:40px;
    height:40px;
    border:5px solid #fff3b0;
  }

  .option-btn{
    min-height:58px;
    border:5px solid #0d2027;
    font-size:clamp(23px,6vw,34px);
    padding-left:16px;
    border-radius:14px;
  }

  .feedback{
    bottom:5px;
    font-size:24px;
    padding:6px 18px;
  }
}

@media(max-height:500px){
  .header{
    height:50px;
  }

  .main{
    height:calc(100vh - 50px);
  }

  .option-btn{
    min-height:48px;
  }

  .options-side{
    gap:9px;
  }
}
</style>
</head>

<body>

<div class="slide logo-slide active" id="logoSlide">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<div class="slide game-slide" id="gameSlide">

  <div class="header">
    <div class="back-btn" onclick="restartGame()">←</div>
    <div class="title">Body Parts Quiz</div>
    <div class="score">★ <span id="questionNo">1</span>/8 &nbsp; ✓ <span id="score">0</span></div>
  </div>

  <div class="main">

    <div class="face-side">
      <div class="instruction">Tap the correct answer</div>

      <div class="face-box">
        <img src="assets/face.png" class="face-img" alt="Face">
        <div class="target" id="target"></div>
      </div>
    </div>

    <div class="options-side">
      <button class="option-btn" onclick="checkAnswer(this)"></button>
      <button class="option-btn" onclick="checkAnswer(this)"></button>
      <button class="option-btn" onclick="checkAnswer(this)"></button>
    </div>

    <div class="feedback" id="feedback">✓ Good Job!</div>

  </div>
</div>

<div class="slide end-slide" id="endSlide">
  <div class="end-card">
    <h1>Excellent!</h1>
    <p>You completed the Body Parts Quiz!</p>
    <button class="play-again" onclick="restartGame()">Play Again</button>
  </div>
</div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/freesound_community-claps-44774.mp3"></audio>

<script>
const questions = [
  {
    answer:"nose",
    options:["mouth","eye","nose"],
    target:{left:"50%",top:"57%"}
  },
  {
    answer:"nose",
    options:["ear","nose","mouth"],
    target:{left:"50%",top:"57%"}
  },
  {
    answer:"ear",
    options:["eye","ear","hair"],
    target:{left:"86%",top:"54%"}
  },
  {
    answer:"cheek",
    options:["nose","cheek","eye"],
    target:{left:"32%",top:"64%"}
  },
  {
    answer:"hair",
    options:["hair","ear","mouth"],
    target:{left:"50%",top:"20%"}
  },
  {
    answer:"eye",
    options:["mouth","eye","hair"],
    target:{left:"62%",top:"50%"}
  },
  {
    answer:"mouth",
    options:["mouth","nose","ear"],
    target:{left:"50%",top:"69%"}
  },
  {
    answer:"eye",
    options:["nose","eye","ear"],
    target:{left:"38%",top:"50%"}
  }
];

let currentQuestion = 0;
let score = 0;
let wrongAttempts = 0;
let locked = false;

const logoSlide = document.getElementById("logoSlide");
const gameSlide = document.getElementById("gameSlide");
const endSlide = document.getElementById("endSlide");

const questionNo = document.getElementById("questionNo");
const scoreBox = document.getElementById("score");
const target = document.getElementById("target");
const feedback = document.getElementById("feedback");
const buttons = document.querySelectorAll(".option-btn");

const correctSound = document.getElementById("correctSound");
const wrongSound = document.getElementById("wrongSound");
const clapSound = document.getElementById("clapSound");

window.onload = function(){
  setTimeout(function(){
    logoSlide.classList.remove("active");
    gameSlide.classList.add("active");
    loadQuestion();
  },2000);
};

function loadQuestion(){
  locked = true;
  wrongAttempts = 0;

  feedback.style.display = "none";

  buttons.forEach(function(btn){
    btn.style.display = "none";
    btn.classList.remove("giggle","glow");
  });

  const q = questions[currentQuestion];

  questionNo.textContent = currentQuestion + 1;
  scoreBox.textContent = score;

  target.style.left = q.target.left;
  target.style.top = q.target.top;

  setTimeout(function(){
    q.options.forEach(function(option,index){
      buttons[index].textContent = option;
      buttons[index].style.display = "block";
    });

    locked = false;
  },900);
}

function checkAnswer(button){
  if(locked) return;

  const selected = button.textContent.trim().toLowerCase();
  const correct = questions[currentQuestion].answer;

  if(selected === correct){
    locked = true;
    score++;
    scoreBox.textContent = score;

    feedback.style.display = "block";
    playSound(correctSound);

    setTimeout(function(){
      currentQuestion++;

      if(currentQuestion < questions.length){
        loadQuestion();
      }else{
        showEndScreen();
      }
    },1000);

  }else{
    wrongAttempts++;
    playSound(wrongSound);

    button.classList.add("giggle");

    setTimeout(function(){
      button.classList.remove("giggle");
    },350);

    if(wrongAttempts >= 2){
      buttons.forEach(function(btn){
        if(btn.textContent.trim().toLowerCase() === correct){
          btn.classList.add("glow");
        }
      });
    }
  }
}

function showEndScreen(){
  gameSlide.classList.remove("active");
  endSlide.classList.add("active");

  playSound(clapSound);
  launchConfetti();
}

function restartGame(){
  currentQuestion = 0;
  score = 0;
  wrongAttempts = 0;
  locked = false;

  endSlide.classList.remove("active");
  gameSlide.classList.remove("active");
  logoSlide.classList.add("active");

  setTimeout(function(){
    logoSlide.classList.remove("active");
    gameSlide.classList.add("active");
    loadQuestion();
  },2000);
}

function playSound(sound){
  sound.currentTime = 0;
  sound.play().catch(function(){});
}

function launchConfetti(){
  const colors = ["#ff4fb2","#ffe600","#36a7f0","#4dff4d","#ff8a00"];

  for(let i=0;i<100;i++){
    const confetti = document.createElement("div");

    confetti.className = "confetti";
    confetti.style.left = Math.random()*100 + "vw";
    confetti.style.background = colors[Math.floor(Math.random()*colors.length)];
    confetti.style.animationDelay = Math.random()*1.5 + "s";

    document.body.appendChild(confetti);

    setTimeout(function(){
      confetti.remove();
    },4000);
  }
}
</script>

</body>
</html>
