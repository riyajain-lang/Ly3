<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Body Parts Uses</title>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:"Comic Sans MS","Trebuchet MS",sans-serif;
  background:#58d4d4;
}

.slide{
  width:100vw;
  height:100vh;
  display:none;
  overflow:hidden;
  position:relative;
}

.slide.active{
  display:flex;
}

/* LOGO */

.logo-slide{
  background:white;
  justify-content:center;
  align-items:center;
}

.logo-slide img{
  width:70%;
  max-width:400px;
  object-fit:contain;
}

/* GAME */

.game-slide{
  background:#58d4d4;
  flex-direction:column;
}

.header{
  height:74px;
  width:100%;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:8px 18px;
  color:white;
  font-weight:bold;
}

.back-btn{
  font-size:42px;
  cursor:pointer;
}

.title{
  font-size:clamp(24px,4vw,48px);
  color:white;
  text-shadow:2px 2px #0d2027;
  text-align:center;
}

.score{
  font-size:clamp(18px,3vw,30px);
  background:rgba(255,255,255,0.28);
  padding:8px 16px;
  border-radius:22px;
  white-space:nowrap;
}

.main{
  height:calc(100vh - 74px);
  width:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:8px 18px 18px;
  gap:24px;
}

.left-side{
  width:46%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.instruction{
  font-size:clamp(20px,3vw,34px);
  font-weight:bold;
  color:#0d2027;
  background:white;
  border:4px solid #0d2027;
  padding:8px 18px;
  border-radius:24px;
  text-align:center;
  margin-bottom:14px;
}

.body-card{
  width:90%;
  max-width:420px;
  min-height:180px;
  background:#fff7cf;
  border:7px solid #0d2027;
  border-radius:30px;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:18px;
  box-shadow:0 8px 0 rgba(13,32,39,0.35);
}

.body-word{
  font-size:clamp(46px,7vw,86px);
  font-weight:bold;
  color:#ff4fb2;
  text-transform:lowercase;
}

.tap-note{
  margin-top:18px;
  background:#ffffff;
  border-radius:22px;
  padding:8px 18px;
  border:4px dashed #2487c7;
  color:#2487c7;
  font-size:clamp(18px,2.5vw,28px);
  font-weight:bold;
  text-align:center;
}

.right-side{
  width:50%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:18px;
}

.option-btn{
  width:100%;
  min-height:72px;
  border:6px solid #0d2027;
  background:#eefafa;
  border-radius:18px;
  font-size:clamp(28px,4vw,52px);
  font-family:inherit;
  font-weight:bold;
  text-align:left;
  padding-left:26px;
  cursor:pointer;
  display:none;
  text-transform:lowercase;
}

.option-btn:active{
  transform:scale(0.97);
}

.feedback{
  position:absolute;
  left:50%;
  bottom:12px;
  transform:translateX(-50%);
  background:white;
  color:#10b917;
  padding:9px 24px;
  border-radius:24px;
  font-size:clamp(26px,4vw,46px);
  font-weight:bold;
  display:none;
  border:4px solid #10b917;
  z-index:10;
}

/* END */

.end-slide{
  background:#58d4d4;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.end-card{
  background:white;
  width:88%;
  max-width:620px;
  padding:38px 24px;
  border-radius:32px;
  box-shadow:0 10px 25px rgba(0,0,0,0.22);
}

.end-card h1{
  color:#ff4fb2;
  font-size:clamp(54px,8vw,94px);
}

.end-card p{
  color:#2487c7;
  font-size:clamp(26px,4vw,42px);
  font-weight:bold;
  margin-top:10px;
}

.play-again{
  margin-top:24px;
  border:none;
  background:#2487c7;
  color:white;
  font-size:clamp(24px,4vw,38px);
  padding:15px 34px;
  border-radius:28px;
  font-family:inherit;
  font-weight:bold;
  cursor:pointer;
}

/* EFFECTS */

.giggle{
  animation:giggle 0.35s;
}

@keyframes giggle{
  0%{transform:translateX(0);}
  25%{transform:translateX(-8px);}
  50%{transform:translateX(8px);}
  75%{transform:translateX(-6px);}
  100%{transform:translateX(0);}
}

.glow{
  animation:glow 0.8s infinite alternate;
}

@keyframes glow{
  from{box-shadow:0 0 10px #00ff44;}
  to{box-shadow:0 0 34px #00ff44;}
}

.confetti{
  position:fixed;
  top:-20px;
  width:12px;
  height:18px;
  z-index:9999;
  animation:fall 3s linear forwards;
}

@keyframes fall{
  to{
    transform:translateY(110vh) rotate(720deg);
    opacity:0;
  }
}

/* MOBILE */

@media(max-width:700px){

  .header{
    height:60px;
    padding:6px 8px;
  }

  .back-btn{
    font-size:34px;
  }

  .title{
    font-size:clamp(20px,5vw,30px);
  }

  .score{
    font-size:18px;
    padding:6px 10px;
  }

  .main{
    height:calc(100vh - 60px);
    padding:6px;
    gap:8px;
  }

  .left-side{
    width:45%;
  }

  .right-side{
    width:55%;
    gap:10px;
  }

  .instruction{
    font-size:clamp(16px,4vw,22px);
    padding:6px 10px;
    border:3px solid #0d2027;
    margin-bottom:8px;
  }

  .body-card{
    width:96%;
    min-height:130px;
    border:5px solid #0d2027;
    border-radius:22px;
    padding:10px;
  }

  .body-word{
    font-size:clamp(34px,10vw,52px);
  }

  .tap-note{
    margin-top:10px;
    padding:6px 10px;
    font-size:clamp(15px,4vw,20px);
    border:3px dashed #2487c7;
  }

  .option-btn{
    min-height:58px;
    border:5px solid #0d2027;
    font-size:clamp(22px,6vw,34px);
    padding-left:16px;
    border-radius:14px;
  }

  .feedback{
    bottom:5px;
    font-size:23px;
    padding:6px 16px;
  }
}

@media(max-height:500px){
  .header{
    height:52px;
  }

  .main{
    height:calc(100vh - 52px);
  }

  .body-card{
    min-height:110px;
  }

  .option-btn{
    min-height:46px;
  }

  .right-side{
    gap:7px;
  }

  .tap-note{
    display:none;
  }
}
</style>
</head>

<body>

<!-- LOGO SLIDE -->
<div class="slide logo-slide active" id="logoSlide">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<!-- GAME SLIDE -->
<div class="slide game-slide" id="gameSlide">

  <div class="header">
    <div class="back-btn" onclick="restartGame()">←</div>
    <div class="title">Body Parts Uses</div>
    <div class="score">★ <span id="questionNo">1</span>/15 &nbsp; ✓ <span id="score">0</span></div>
  </div>

  <div class="main">

    <div class="left-side">
      <div class="instruction">Match the body parts to their uses</div>

      <div class="body-card">
        <div class="body-word" id="bodyWord">nose</div>
      </div>

      <div class="tap-note">Tap the correct match</div>
    </div>

    <div class="right-side">
      <button class="option-btn" onclick="checkAnswer(this)"></button>
      <button class="option-btn" onclick="checkAnswer(this)"></button>
      <button class="option-btn" onclick="checkAnswer(this)"></button>
    </div>

    <div class="feedback" id="feedback">✓ Good Job!</div>

  </div>
</div>

<!-- END SLIDE -->
<div class="slide end-slide" id="endSlide">
  <div class="end-card">
    <h1>Excellent!</h1>
    <p>You matched all the body parts correctly!</p>
    <button class="play-again" onclick="restartGame()">Play Again</button>
  </div>
</div>

<!-- AUDIO -->
<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/freesound_community-claps-44774.mp3"></audio>

<script>
const questions = [
  {part:"nose", answer:"smelling", options:["eating","smelling","running"]},
  {part:"mouth", answer:"eating", options:["eating","seeing","listening"]},
  {part:"legs", answer:"running", options:["writing","running","smelling"]},
  {part:"hand", answer:"writing", options:["listening","eating","writing"]},
  {part:"ears", answer:"listening", options:["seeing","listening","running"]},
  {part:"eye", answer:"seeing", options:["smelling","writing","seeing"]},

  {part:"nose", answer:"smelling", options:["smelling","eating","seeing"]},
  {part:"legs", answer:"running", options:["running","listening","writing"]},
  {part:"mouth", answer:"eating", options:["seeing","eating","smelling"]},
  {part:"eye", answer:"seeing", options:["writing","seeing","running"]},
  {part:"hand", answer:"writing", options:["eating","writing","listening"]},
  {part:"ears", answer:"listening", options:["listening","smelling","seeing"]},

  {part:"legs", answer:"running", options:["smelling","running","eating"]},
  {part:"nose", answer:"smelling", options:["writing","seeing","smelling"]},
  {part:"mouth", answer:"eating", options:["eating","listening","running"]}
];

let currentQuestion = 0;
let score = 0;
let wrongAttempts = 0;
let locked = false;

const logoSlide = document.getElementById("logoSlide");
const gameSlide = document.getElementById("gameSlide");
const endSlide = document.getElementById("endSlide");

const questionNo = document.getElementById("questionNo");
const scoreBox = document.getElementById("score");
const bodyWord = document.getElementById("bodyWord");
const feedback = document.getElementById("feedback");
const buttons = document.querySelectorAll(".option-btn");

const correctSound = document.getElementById("correctSound");
const wrongSound = document.getElementById("wrongSound");
const clapSound = document.getElementById("clapSound");

window.onload = function(){
  setTimeout(function(){
    logoSlide.classList.remove("active");
    gameSlide.classList.add("active");
    loadQuestion();
  },2000);
};

function loadQuestion(){
  locked = true;
  wrongAttempts = 0;

  feedback.style.display = "none";

  buttons.forEach(function(btn){
    btn.style.display = "none";
    btn.classList.remove("giggle","glow");
  });

  const q = questions[currentQuestion];

  questionNo.textContent = currentQuestion + 1;
  scoreBox.textContent = score;
  bodyWord.textContent = q.part;

  setTimeout(function(){
    q.options.forEach(function(option,index){
      buttons[index].textContent = option;
      buttons[index].style.display = "block";
    });

    locked = false;
  },700);
}

function checkAnswer(button){
  if(locked) return;

  const selected = button.textContent.trim().toLowerCase();
  const correct = questions[currentQuestion].answer;

  if(selected === correct){
    locked = true;
    score++;
    scoreBox.textContent = score;

    feedback.style.display = "block";
    playSound(correctSound);

    setTimeout(function(){
      currentQuestion++;

      if(currentQuestion < questions.length){
        loadQuestion();
      }else{
        showEndScreen();
      }
    },1000);

  }else{
    wrongAttempts++;
    playSound(wrongSound);

    button.classList.add("giggle");

    setTimeout(function(){
      button.classList.remove("giggle");
    },350);

    if(wrongAttempts >= 2){
      buttons.forEach(function(btn){
        if(btn.textContent.trim().toLowerCase() === correct){
          btn.classList.add("glow");
        }
      });
    }
  }
}

function showEndScreen(){
  gameSlide.classList.remove("active");
  endSlide.classList.add("active");

  playSound(clapSound);
  launchConfetti();
}

function restartGame(){
  currentQuestion = 0;
  score = 0;
  wrongAttempts = 0;
  locked = false;

  endSlide.classList.remove("active");
  gameSlide.classList.remove("active");
  logoSlide.classList.add("active");

  setTimeout(function(){
    logoSlide.classList.remove("active");
    gameSlide.classList.add("active");
    loadQuestion();
  },2000);
}

function playSound(sound){
  sound.currentTime = 0;
  sound.play().catch(function(){});
}

function launchConfetti(){
  const colors = ["#ff4fb2","#ffe600","#36a7f0","#4dff4d","#ff8a00"];

  for(let i=0;i<100;i++){
    const confetti = document.createElement("div");

    confetti.className = "confetti";
    confetti.style.left = Math.random()*100 + "vw";
    confetti.style.background = colors[Math.floor(Math.random()*colors.length)];
    confetti.style.animationDelay = Math.random()*1.5 + "s";

    document.body.appendChild(confetti);

    setTimeout(function(){
      confetti.remove();
    },4000);
  }
}
</script>

</body>
</html>
