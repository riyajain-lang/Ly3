<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Shadow Matching</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    user-select:none;
    -webkit-user-select:none;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial, sans-serif;
}

body{
    background:
    linear-gradient(
        to bottom,
        #8fd8ff 0%,
        #8fd8ff 55%,
        #73c04b 55%,
        #5ca236 100%
    );
}

#splash-screen{
    position:fixed;
    inset:0;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
    transition:opacity 0.5s;
}

#splash-screen img{
    width:220px;
    max-width:80%;
}

#game-container{
    position:relative;
    width:100vw;
    height:100vh;
}

#title{
    position:absolute;
    top:12px;
    left:50%;
    transform:translateX(-50%);
    background:#fff4c7;
    border:4px solid #7b4b22;
    border-radius:30px;
    padding:10px 28px;
    font-size:2rem;
    font-weight:bold;
    color:#7b4b22;
    z-index:20;
    white-space:nowrap;
}

/* ANIMAL SHELTER / BARN */
#farmhouse{
    position:absolute;
    right:12px;
    bottom:170px;
    width:165px;
    height:150px;
    z-index:2;
}

#roof{
    position:absolute;
    top:0;
    left:8px;
    width:150px;
    height:65px;
    background:#8b2f16;
    clip-path:polygon(50% 0%, 100% 100%, 0% 100%);
}

#house-body{
    position:absolute;
    bottom:0;
    left:0;
    width:165px;
    height:100px;
    background:#b96b32;
    border:5px solid #63330f;
    border-radius:4px;
}

#door{
    position:absolute;
    bottom:0;
    left:52px;
    width:58px;
    height:72px;
    background:#5b2c0c;
    border:4px solid #3b1a05;
}

#door::before,
#door::after{
    content:"";
    position:absolute;
    width:100%;
    height:4px;
    background:#d9b07a;
    left:0;
}

#door::before{
    top:20px;
    transform:rotate(35deg);
}

#door::after{
    top:20px;
    transform:rotate(-35deg);
}

.window{
    display:none;
}

#target-area{
    position:absolute;
    top:80px;
    left:0;
    width:100%;
    height:55%;
}

.shadow{
    position:absolute;
    object-fit:contain;
    filter:brightness(0);
    opacity:0.75;
}

#shadow-Pig{ width:85px; height:85px; left:5%; top:13%; }
#shadow-Horse{ width:115px; height:115px; left:35%; top:0%; }
#shadow-Cow{ width:100px; height:100px; left:10%; top:43%; }
#shadow-Hen{ width:78px; height:78px; left:39%; top:56%; }
#shadow-Duck{ width:78px; height:78px; left:57%; top:58%; }
#shadow-Sheep{ width:100px; height:100px; left:72%; top:43%; }

.shadow.matched{
    filter:none;
    opacity:1;
    transform:scale(1.05);
}

#dock{
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    height:170px;
    background:rgba(255,255,255,0.15);
    border-top:4px dashed white;
    display:grid;
    grid-template-columns:repeat(6, 1fr);
    gap:8px;
    align-items:center;
    justify-items:center;
    padding:10px;
    z-index:5;
}

.animal{
    width:82px;
    height:82px;
    object-fit:contain;
    touch-action:none;
    cursor:grab;
    z-index:50;
}

.dragging{
    position:fixed !important;
    z-index:500;
    pointer-events:none;
}

#win-screen{
    position:absolute;
    inset:0;
    background:rgba(255,255,255,0.92);
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:999;
}

#win-screen h1{
    font-size:2.5rem;
    color:#ff4747;
    margin-bottom:20px;
}

#win-screen button{
    padding:15px 30px;
    font-size:1.2rem;
    font-weight:bold;
    border:none;
    border-radius:30px;
    background:#2ecc71;
    color:white;
}

@media(max-width:700px){
    #dock{
        grid-template-columns:repeat(3,1fr);
        height:175px;
    }

    .animal{
        width:68px;
        height:68px;
    }

    #title{
        font-size:1.4rem;
    }

    #farmhouse{
        width:120px;
        height:115px;
        bottom:175px;
    }

    #roof{
        width:110px;
        height:48px;
        left:5px;
    }

    #house-body{
        width:120px;
        height:78px;
    }

    #door{
        left:38px;
        width:42px;
        height:55px;
    }
}
</style>
</head>

<body>

<div id="splash-screen">
    <img src="./assets/innovine-logo.png" alt="Innovine Logo">
</div>

<audio id="correctSound" src="./assets/correct.mp3" preload="auto"></audio>
<audio id="wrongSound" src="./assets/wrong.mp3" preload="auto"></audio>
<audio id="clapSound" src="./assets/freesound_community-claps-44774.mp3" preload="auto"></audio>

<div id="game-container">

    <div id="title">Shadow Matching</div>

    <div id="farmhouse">
        <div id="roof"></div>
        <div id="house-body">
            <div id="door"></div>
        </div>
    </div>

    <div id="target-area">
        <img id="shadow-Pig" class="shadow" data-animal="Pig" src="./assets/Pig.png">
        <img id="shadow-Horse" class="shadow" data-animal="Horse" src="./assets/Horse.png">
        <img id="shadow-Cow" class="shadow" data-animal="Cow" src="./assets/Cow.png">
        <img id="shadow-Hen" class="shadow" data-animal="Hen" src="./assets/Hen.png">
        <img id="shadow-Duck" class="shadow" data-animal="Duck" src="./assets/Duck.png">
        <img id="shadow-Sheep" class="shadow" data-animal="Sheep" src="./assets/Sheep.png">
    </div>

    <div id="dock"></div>

    <div id="win-screen">
        <h1>WELL DONE! 🎉</h1>
        <button onclick="resetGame()">Play Again</button>
    </div>

</div>

<script>
const animals = ["Cow", "Duck", "Hen", "Horse", "Pig", "Sheep"];
let matched = 0;

window.addEventListener("load", () => {
    setTimeout(() => {
        const splash = document.getElementById("splash-screen");
        splash.style.opacity = "0";
        setTimeout(() => splash.style.display = "none", 500);
    }, 3000);

    createAnimals();
});

function playSound(id){
    const sound = document.getElementById(id);
    if(!sound) return;

    sound.pause();
    sound.currentTime = 0;

    sound.play().catch(() => {
        console.log("Sound blocked until user interaction");
    });
}

function shuffle(array){
    return array.sort(() => Math.random() - 0.5);
}

function createAnimals(){
    matched = 0;

    document.getElementById("win-screen").style.display = "none";
    const dock = document.getElementById("dock");
    dock.innerHTML = "";

    document.querySelectorAll(".shadow").forEach(shadow => {
        shadow.classList.remove("matched");
        shadow.style.visibility = "visible";
    });

    shuffle([...animals]).forEach(animal => {
        const img = document.createElement("img");
        img.src = `./assets/${animal}.png`;
        img.className = "animal";
        img.dataset.animal = animal;
        img.alt = animal;
        dock.appendChild(img);
        enableDrag(img);
    });
}

function enableDrag(el){
    let offsetX = 0;
    let offsetY = 0;
    let originalParent = null;
    let originalNext = null;

    el.addEventListener("pointerdown", startDrag);

    function startDrag(e){
        e.preventDefault();

        originalParent = el.parentElement;
        originalNext = el.nextSibling;

        const rect = el.getBoundingClientRect();

        offsetX = e.clientX - rect.left;
        offsetY = e.clientY - rect.top;

        el.classList.add("dragging");
        el.style.left = rect.left + "px";
        el.style.top = rect.top + "px";
        el.style.width = rect.width + "px";
        el.style.height = rect.height + "px";

        document.body.appendChild(el);

        el.setPointerCapture(e.pointerId);

        el.addEventListener("pointermove", moveDrag);
        el.addEventListener("pointerup", endDrag);
        el.addEventListener("pointercancel", endDrag);
    }

    function moveDrag(e){
        el.style.left = (e.clientX - offsetX) + "px";
        el.style.top = (e.clientY - offsetY) + "px";
    }

    function endDrag(e){
        el.releasePointerCapture(e.pointerId);

        el.removeEventListener("pointermove", moveDrag);
        el.removeEventListener("pointerup", endDrag);
        el.removeEventListener("pointercancel", endDrag);

        const animal = el.dataset.animal;
        const target = document.getElementById(`shadow-${animal}`);

        const animalRect = el.getBoundingClientRect();
        const targetRect = target.getBoundingClientRect();

        const animalCenterX = animalRect.left + animalRect.width / 2;
        const animalCenterY = animalRect.top + animalRect.height / 2;

        const targetCenterX = targetRect.left + targetRect.width / 2;
        const targetCenterY = targetRect.top + targetRect.height / 2;

        const distance = Math.hypot(
            animalCenterX - targetCenterX,
            animalCenterY - targetCenterY
        );

        if(distance < 75){
            playSound("correctSound");

            target.classList.add("matched");
            target.src = el.src;
            el.remove();

            matched++;

            if(matched === animals.length){
                setTimeout(() => {
                    playSound("clapSound");
                    document.getElementById("win-screen").style.display = "flex";
                }, 500);
            }
        }else{
            playSound("wrongSound");

            el.classList.remove("dragging");
            el.removeAttribute("style");

            if(originalNext){
                originalParent.insertBefore(el, originalNext);
            }else{
                originalParent.appendChild(el);
            }
        }
    }
}

function resetGame(){
    createAnimals();
}
</script>

</body>
</html>
