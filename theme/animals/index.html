<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>

<title>Shadow Matching Game</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    user-select:none;
    -webkit-user-select:none;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:'Arial Rounded MT Bold',sans-serif;
}

/* ---------------- GAME BACKGROUND ---------------- */

body{
    background:
    linear-gradient(
        to bottom,
        #8ed6ff 0%,
        #8ed6ff 55%,
        #74c043 55%,
        #5fa333 100%
    );
}

/* ---------------- SPLASH SCREEN ---------------- */

#splash-screen{
    position:fixed;
    inset:0;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
    transition:opacity .5s ease;
}

#splash-screen img{
    width:240px;
    max-width:70%;
}

/* ---------------- MAIN GAME ---------------- */

#game-container{
    width:100%;
    height:100%;
    position:relative;
    overflow:hidden;
}

/* ---------------- TITLE ---------------- */

#game-title{
    position:absolute;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    z-index:20;

    background:#fff7c7;

    padding:12px 28px;

    border-radius:40px;

    border:4px solid #8b5a2b;

    font-size:2rem;
    font-weight:bold;
    color:#7a3e10;

    box-shadow:0 4px 0 #5a2c08;
}

/* ---------------- FARM GROUND ---------------- */

#ground{
    position:absolute;
    bottom:0;
    width:100%;
    height:42%;
    background:#6db63f;
}

/* ---------------- FARM HOUSE ---------------- */

#farmhouse{
    position:absolute;
    bottom:170px;   /* FIXED TO GROUND */
    right:20px;

    width:150px;
    height:140px;

    z-index:2;
}

/* Roof */

#roof{
    position:absolute;
    top:0;
    left:0;

    width:0;
    height:0;

    border-left:75px solid transparent;
    border-right:75px solid transparent;
    border-bottom:65px solid #7a2d16;
}

/* House */

#house-body{
    position:absolute;
    bottom:0;

    width:150px;
    height:90px;

    background:#9b5a2e;

    border:4px solid #5f3210;

    border-radius:8px;
}

/* Door */

#door{
    position:absolute;
    bottom:0;
    left:55px;

    width:40px;
    height:55px;

    background:#5a2f0d;

    border-radius:8px 8px 0 0;
}

/* Windows */

.window{
    position:absolute;
    top:18px;

    width:25px;
    height:25px;

    background:#dff6ff;

    border:3px solid #5a2f0d;
}

#window-left{
    left:18px;
}

#window-right{
    right:18px;
}

/* ---------------- TARGET AREA ---------------- */

#target-area{
    position:absolute;
    top:80px;
    left:0;
    width:100%;
    height:50%;
}

/* ---------------- SHADOWS ---------------- */

.shadow-target{
    position:absolute;

    object-fit:contain;

    filter:brightness(0);

    opacity:.75;
}

/* Properly placed on the grass */

#shadow-Pig{
    width:85px;
    height:85px;

    left:5%;
    bottom:35%;
}

#shadow-Horse{
    width:110px;
    height:110px;

    left:35%;
    bottom:42%;
}

#shadow-Cow{
    width:100px;
    height:100px;

    left:10%;
    bottom:0%;
}

#shadow-Hen{
    width:75px;
    height:75px;

    left:40%;
    bottom:5%;
}

#shadow-Duck{
    width:75px;
    height:75px;

    left:58%;
    bottom:3%;
}

#shadow-Sheep{
    width:90px;
    height:90px;

    left:72%;
    bottom:10%;
}

.matched{
    filter:none !important;
    opacity:1 !important;
    transform:scale(1.1);
    transition:all .3s ease;
}

/* ---------------- DOCK AREA ---------------- */

#dock-area{
    position:absolute;
    bottom:0;

    width:100%;
    height:170px;

    background:rgba(255,255,255,.15);

    border-top:4px dashed white;

    display:grid;

    grid-template-columns:repeat(3,1fr);

    gap:10px;

    padding:15px;

    align-items:center;
    justify-items:center;

    z-index:10;
}

/* ---------------- ANIMAL CARDS ---------------- */

.animal-card{
    width:80px;
    height:80px;

    object-fit:contain;

    touch-action:none;

    cursor:grab;

    transition:transform .2s ease;

    z-index:50;
}

.animal-card:active{
    transform:scale(1.08);
}

/* ---------------- WIN SCREEN ---------------- */

#winner-screen{
    position:absolute;
    inset:0;

    background:rgba(255,255,255,.9);

    display:none;

    flex-direction:column;
    justify-content:center;
    align-items:center;

    z-index:100;
}

#winner-screen h1{
    font-size:3rem;
    color:#ff4b4b;
    margin-bottom:20px;
}

#winner-screen button{
    padding:14px 34px;

    font-size:1.3rem;
    font-weight:bold;

    border:none;
    border-radius:30px;

    background:#2ecc71;
    color:white;

    box-shadow:0 5px 0 #1f9d55;
}

/* ---------------- MOBILE ---------------- */

@media (max-width:480px){

    #game-title{
        font-size:1.5rem;
        padding:10px 20px;
    }

    #farmhouse{
        width:120px;
        height:110px;
        bottom:180px;
    }

    #roof{
        border-left:60px solid transparent;
        border-right:60px solid transparent;
        border-bottom:55px solid #7a2d16;
    }

    #house-body{
        width:120px;
        height:75px;
    }

    #door{
        left:42px;
        width:35px;
        height:45px;
    }

    .animal-card{
        width:70px;
        height:70px;
    }

}

</style>
</head>

<body>

<!-- SPLASH -->

<div id="splash-screen">
    <img src="theme/animals/assets/innovine-logo.png">
</div>

<!-- AUDIO -->

<audio id="correct" src="theme/animals/assets/correct.mp3"></audio>
<audio id="wrong" src="theme/animals/assets/wrong.mp3"></audio>
<audio id="cheer" src="theme/animals/assets/freesound_community-claps-44774.mp3"></audio>

<!-- GAME -->

<div id="game-container">

    <!-- TITLE -->

    <div id="game-title">
        Shadow Matching
    </div>

    <!-- TARGET AREA -->

    <div id="target-area">

        <img id="shadow-Pig" class="shadow-target"
        src="theme/animals/assets/Pig.png">

        <img id="shadow-Horse" class="shadow-target"
        src="theme/animals/assets/Horse.png">

        <img id="shadow-Cow" class="shadow-target"
        src="theme/animals/assets/Cow.png">

        <img id="shadow-Hen" class="shadow-target"
        src="theme/animals/assets/Hen.png">

        <img id="shadow-Duck" class="shadow-target"
        src="theme/animals/assets/Duck.png">

        <img id="shadow-Sheep" class="shadow-target"
        src="theme/animals/assets/Sheep.png">

    </div>

    <!-- FARM HOUSE -->

    <div id="farmhouse">

        <div id="roof"></div>

        <div id="house-body">

            <div class="window" id="window-left"></div>

            <div class="window" id="window-right"></div>

            <div id="door"></div>

        </div>

    </div>

    <!-- GROUND -->

    <div id="ground"></div>

    <!-- DOCK -->

    <div id="dock-area"></div>

    <!-- WIN SCREEN -->

    <div id="winner-screen">

        <h1>WELL DONE! 🎉</h1>

        <button onclick="resetGame()">
            Play Again
        </button>

    </div>

</div>

<script>

const animals = [
    'Cow',
    'Duck',
    'Hen',
    'Horse',
    'Pig',
    'Sheep'
];

let matchedCount = 0;

/* ---------------- SPLASH ---------------- */

window.addEventListener('DOMContentLoaded',()=>{

    setTimeout(()=>{

        const splash = document.getElementById('splash-screen');

        splash.style.opacity = '0';

        setTimeout(()=>{
            splash.style.display = 'none';
        },500);

    },3000);

    setupGame();

});

/* ---------------- SOUND ---------------- */

function playSound(id){

    const sound = document.getElementById(id);

    sound.currentTime = 0;

    sound.play().catch(()=>{});

}

/* ---------------- GAME SETUP ---------------- */

function setupGame(){

    matchedCount = 0;

    document.getElementById('winner-screen').style.display = 'none';

    const dock = document.getElementById('dock-area');

    dock.innerHTML = '';

    document.querySelectorAll('.shadow-target').forEach(shadow=>{

        shadow.classList.remove('matched');

    });

    const shuffled = [...animals].sort(()=>Math.random()-0.5);

    shuffled.forEach(animal=>{

        const img = document.createElement('img');

        img.src = `theme/animals/assets/${animal}.png`;

        img.className = 'animal-card';

        img.dataset.animal = animal;

        dock.appendChild(img);

        enableDrag(img);

    });

}

/* ---------------- DRAG SYSTEM ---------------- */

function enableDrag(el){

    let startX = 0;
    let startY = 0;

    let dragging = false;

    el.addEventListener('touchstart',startDrag,{passive:false});
    el.addEventListener('touchmove',moveDrag,{passive:false});
    el.addEventListener('touchend',endDrag,{passive:false});

    el.addEventListener('mousedown',startDrag);

    function startDrag(e){

        dragging = true;

        const touch = e.touches ? e.touches[0] : e;

        const rect = el.getBoundingClientRect();

        startX = touch.clientX;
        startY = touch.clientY;

        el.style.position = 'fixed';

        el.style.left = rect.left + 'px';
        el.style.top = rect.top + 'px';

        if(!e.touches){

            window.addEventListener('mousemove',moveDrag);

            window.addEventListener('mouseup',endDrag);

        }

    }

    function moveDrag(e){

        if(!dragging) return;

        if(e.cancelable) e.preventDefault();

        const touch = e.touches ? e.touches[0] : e;

        const dx = touch.clientX - startX;
        const dy = touch.clientY - startY;

        startX = touch.clientX;
        startY = touch.clientY;

        el.style.left = (parseFloat(el.style.left)+dx)+'px';

        el.style.top = (parseFloat(el.style.top)+dy)+'px';

    }

    function endDrag(){

        if(!dragging) return;

        dragging = false;

        const animal = el.dataset.animal;

        const target = document.getElementById(`shadow-${animal}`);

        const rect1 = el.getBoundingClientRect();

        const rect2 = target.getBoundingClientRect();

        const x1 = rect1.left + rect1.width/2;
        const y1 = rect1.top + rect1.height/2;

        const x2 = rect2.left + rect2.width/2;
        const y2 = rect2.top + rect2.height/2;

        const dx = Math.abs(x1-x2);
        const dy = Math.abs(y1-y2);

        if(dx < 70 && dy < 70){

            playSound('correct');

            target.classList.add('matched');

            el.remove();

            matchedCount++;

            if(matchedCount === animals.length){

                setTimeout(()=>{

                    playSound('cheer');

                    document.getElementById('winner-screen').style.display='flex';

                },500);

            }

        }else{

            playSound('wrong');

            el.style.position='static';

        }

    }

}

/* ---------------- RESET ---------------- */

function resetGame(){

    setupGame();

}

</script>

</body>
</html>
