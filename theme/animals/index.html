<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Shadow Matching</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    user-select:none;
    -webkit-user-select:none;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial, sans-serif;
}

/* ---------------- BACKGROUND ---------------- */

body{
    background:
    linear-gradient(
        to bottom,
        #8fd8ff 0%,
        #8fd8ff 55%,
        #73c04b 55%,
        #5ca236 100%
    );
}

/* ---------------- SPLASH SCREEN ---------------- */

#splash-screen{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:white;

    display:flex;
    justify-content:center;
    align-items:center;

    z-index:9999;

    transition:opacity 0.5s;
}

#splash-screen img{
    width:220px;
    max-width:80%;
    object-fit:contain;
}

/* ---------------- MAIN GAME ---------------- */

#game-container{
    position:relative;
    width:100%;
    height:100%;
}

/* ---------------- TITLE ---------------- */

#title{
    position:absolute;
    top:10px;
    left:50%;
    transform:translateX(-50%);

    background:#fff4c7;

    border:4px solid #7b4b22;

    border-radius:30px;

    padding:10px 25px;

    font-size:2rem;
    font-weight:bold;
    color:#7b4b22;

    z-index:100;
}

/* ---------------- FARM HOUSE ---------------- */

#farmhouse{
    position:absolute;
    right:15px;
    bottom:170px;

    width:140px;
    height:130px;

    z-index:2;
}

/* roof */

#roof{
    position:absolute;
    top:0;
    left:0;

    width:0;
    height:0;

    border-left:70px solid transparent;
    border-right:70px solid transparent;
    border-bottom:60px solid #7a2f16;
}

/* house body */

#house-body{
    position:absolute;
    bottom:0;

    width:140px;
    height:85px;

    background:#a45d2b;

    border:4px solid #5f3110;
}

/* door */

#door{
    position:absolute;
    bottom:0;
    left:50px;

    width:38px;
    height:52px;

    background:#5a2d0a;
}

/* windows */

.window{
    position:absolute;
    top:15px;

    width:24px;
    height:24px;

    background:#d9f2ff;

    border:3px solid #5a2d0a;
}

#window-left{
    left:18px;
}

#window-right{
    right:18px;
}

/* ---------------- TARGET AREA ---------------- */

#target-area{
    position:absolute;
    top:70px;
    width:100%;
    height:55%;
}

/* ---------------- SHADOWS ---------------- */

.shadow{
    position:absolute;

    object-fit:contain;

    filter:brightness(0);

    opacity:0.75;
}

#shadow-Pig{
    width:80px;
    height:80px;

    left:5%;
    top:20%;
}

#shadow-Horse{
    width:110px;
    height:110px;

    left:35%;
    top:10%;
}

#shadow-Cow{
    width:95px;
    height:95px;

    left:10%;
    top:48%;
}

#shadow-Hen{
    width:75px;
    height:75px;

    left:38%;
    top:60%;
}

#shadow-Duck{
    width:75px;
    height:75px;

    left:57%;
    top:62%;
}

#shadow-Sheep{
    width:90px;
    height:90px;

    left:72%;
    top:50%;
}

.matched{
    filter:none !important;
    opacity:1 !important;
    transform:scale(1.08);
    transition:0.3s;
}

/* ---------------- DOCK AREA ---------------- */

#dock{
    position:absolute;
    bottom:0;
    width:100%;
    height:170px;

    background:rgba(255,255,255,0.15);

    border-top:4px dashed white;

    display:grid;
    grid-template-columns:repeat(3,1fr);

    gap:10px;

    padding:10px;

    justify-items:center;
    align-items:center;
}

/* ---------------- ANIMALS ---------------- */

.animal{
    width:80px;
    height:80px;

    object-fit:contain;

    touch-action:none;

    z-index:50;
}

/* ---------------- WIN SCREEN ---------------- */

#win-screen{
    position:absolute;
    top:0;
    left:0;

    width:100%;
    height:100%;

    background:rgba(255,255,255,0.9);

    display:none;

    justify-content:center;
    align-items:center;
    flex-direction:column;

    z-index:999;
}

#win-screen h1{
    font-size:2.5rem;
    color:#ff4747;

    margin-bottom:20px;
}

#win-screen button{
    padding:15px 30px;

    font-size:1.2rem;
    font-weight:bold;

    border:none;
    border-radius:30px;

    background:#2ecc71;
    color:white;
}

/* ---------------- MOBILE ---------------- */

@media(max-width:480px){

    #title{
        font-size:1.5rem;
    }

    .animal{
        width:70px;
        height:70px;
    }

    #farmhouse{
        width:110px;
        height:110px;
        bottom:180px;
    }

    #roof{
        border-left:55px solid transparent;
        border-right:55px solid transparent;
        border-bottom:50px solid #7a2f16;
    }

    #house-body{
        width:110px;
        height:70px;
    }

}

</style>
</head>

<body>

<!-- SPLASH SCREEN -->

<div id="splash-screen">

    <!-- IMPORTANT -->
    <!-- CORRECT PATH -->

    <img src="./assets/innovine-logo.png" alt="logo">

</div>

<!-- AUDIO -->

<audio id="correct" src="./assets/correct.mp3"></audio>

<audio id="wrong" src="./assets/wrong.mp3"></audio>

<audio id="cheer"
src="./assets/freesound_community-claps-44774.mp3"></audio>

<!-- MAIN GAME -->

<div id="game-container">

    <!-- TITLE -->

    <div id="title">
        Shadow Matching
    </div>

    <!-- FARMHOUSE -->

    <div id="farmhouse">

        <div id="roof"></div>

        <div id="house-body">

            <div class="window" id="window-left"></div>

            <div class="window" id="window-right"></div>

            <div id="door"></div>

        </div>

    </div>

    <!-- TARGET AREA -->

    <div id="target-area">

        <img
        id="shadow-Pig"
        class="shadow"
        data-animal="Pig"
        src="./assets/Pig.png">

        <img
        id="shadow-Horse"
        class="shadow"
        data-animal="Horse"
        src="./assets/Horse.png">

        <img
        id="shadow-Cow"
        class="shadow"
        data-animal="Cow"
        src="./assets/Cow.png">

        <img
        id="shadow-Hen"
        class="shadow"
        data-animal="Hen"
        src="./assets/Hen.png">

        <img
        id="shadow-Duck"
        class="shadow"
        data-animal="Duck"
        src="./assets/Duck.png">

        <img
        id="shadow-Sheep"
        class="shadow"
        data-animal="Sheep"
        src="./assets/Sheep.png">

    </div>

    <!-- DOCK -->

    <div id="dock"></div>

    <!-- WIN SCREEN -->

    <div id="win-screen">

        <h1>WELL DONE! 🎉</h1>

        <button onclick="resetGame()">
            Play Again
        </button>

    </div>

</div>

<script>

/* ---------------- ANIMALS ---------------- */

const animals = [
    'Cow',
    'Duck',
    'Hen',
    'Horse',
    'Pig',
    'Sheep'
];

let matched = 0;

/* ---------------- SPLASH ---------------- */

window.addEventListener('load',()=>{

    setTimeout(()=>{

        const splash = document.getElementById('splash-screen');

        splash.style.opacity = '0';

        setTimeout(()=>{
            splash.style.display = 'none';
        },500);

    },3000);

    createAnimals();

});

/* ---------------- SOUND ---------------- */

function playSound(id){

    const sound = document.getElementById(id);

    sound.currentTime = 0;

    sound.play().catch(()=>{});

}

/* ---------------- CREATE ANIMALS ---------------- */

function createAnimals(){

    matched = 0;

    document.getElementById('win-screen').style.display='none';

    const dock = document.getElementById('dock');

    dock.innerHTML='';

    document.querySelectorAll('.shadow').forEach(shadow=>{

        shadow.classList.remove('matched');

    });

    const shuffled = [...animals].sort(()=>Math.random()-0.5);

    shuffled.forEach(animal=>{

        const img = document.createElement('img');

        img.src = `./assets/${animal}.png`;

        img.className='animal';

        img.dataset.animal=animal;

        dock.appendChild(img);

        dragElement(img);

    });

}

/* ---------------- DRAG SYSTEM ---------------- */

function dragElement(el){

    let startX = 0;
    let startY = 0;

    let dragging = false;

    el.addEventListener('touchstart',startDrag,{passive:false});
    el.addEventListener('touchmove',dragMove,{passive:false});
    el.addEventListener('touchend',endDrag,{passive:false});

    el.addEventListener('mousedown',startDrag);

    function startDrag(e){

        dragging=true;

        const touch = e.touches ? e.touches[0] : e;

        const rect = el.getBoundingClientRect();

        startX = touch.clientX;
        startY = touch.clientY;

        el.style.position='fixed';

        el.style.left = rect.left + 'px';
        el.style.top = rect.top + 'px';

        if(!e.touches){

            window.addEventListener('mousemove',dragMove);

            window.addEventListener('mouseup',endDrag);

        }

    }

    function dragMove(e){

        if(!dragging) return;

        if(e.cancelable) e.preventDefault();

        const touch = e.touches ? e.touches[0] : e;

        const dx = touch.clientX - startX;
        const dy = touch.clientY - startY;

        startX = touch.clientX;
        startY = touch.clientY;

        el.style.left =
        (parseFloat(el.style.left)+dx)+'px';

        el.style.top =
        (parseFloat(el.style.top)+dy)+'px';

    }

    function endDrag(){

        if(!dragging) return;

        dragging=false;

        const animal = el.dataset.animal;

        const target =
        document.getElementById(`shadow-${animal}`);

        const r1 = el.getBoundingClientRect();
        const r2 = target.getBoundingClientRect();

        const x1 = r1.left + r1.width/2;
        const y1 = r1.top + r1.height/2;

        const x2 = r2.left + r2.width/2;
        const y2 = r2.top + r2.height/2;

        const dx = Math.abs(x1-x2);
        const dy = Math.abs(y1-y2);

        if(dx < 70 && dy < 70){

            playSound('correct');

            target.classList.add('matched');

            el.remove();

            matched++;

            if(matched === animals.length){

                setTimeout(()=>{

                    playSound('cheer');

                    document.getElementById('win-screen')
                    .style.display='flex';

                },500);

            }

        }else{

            playSound('wrong');

            el.style.position='static';

        }

    }

}

/* ---------------- RESET ---------------- */

function resetGame(){

    createAnimals();

}

</script>

</body>
</html>
