<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Country on My Map - Stable</title>

<style>
body{
margin:0;
overflow:hidden;
font-family:Arial;
background:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

#splash,#game,#final{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

#game,#final{display:none;}

#logo{
width:180px;
}

#qimg{
width:280px;
margin-bottom:10px;
}

.option{
background:#eef3ff;
padding:12px;
margin:6px;
border-radius:10px;
width:200px;
text-align:center;
cursor:pointer;
}

.option:active{transform:scale(0.97);}

#timer{color:red;font-weight:bold;}
#score{font-weight:bold;}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
<img id="logo" src="" alt="logo">
</div>

<!-- GAME -->
<div id="game">
<div id="score">Score: 0</div>
<div id="timer">60</div>
<img id="qimg">
<div id="options"></div>
</div>

<!-- FINAL -->
<div id="final">
<h1>🎉 Good Job!</h1>
<button onclick="restart()">Play Again</button>
</div>

<audio id="wrong" src="Ly3/theme/country-on-my-map/assets/wrong.mp3"></audio>
<audio id="clap" src="Ly3/theme/country-on-my-map/assets/claps.mp3"></audio>

<script>

const assetsBase = "Ly3/theme/country-on-my-map/assets/";

const logo = document.getElementById("logo");
const splash = document.getElementById("splash");
const game = document.getElementById("game");
const final = document.getElementById("final");

const qimg = document.getElementById("qimg");
const optionsBox = document.getElementById("options");

const scoreText = document.getElementById("score");
const timerText = document.getElementById("timer");

const wrong = document.getElementById("wrong");
const clap = document.getElementById("clap");

/* SAFE LOAD (IMPORTANT FIX) */
function safeImg(img, path){
img.onerror = ()=>{ img.style.display="none"; };
img.src = path;
}

/* FIX LOGO */
safeImg(logo, assetsBase + "innovine-logo.png");

/* QUESTIONS */
const questions = [
{img:"africa.png", ans:"Africa"},
{img:"asia.png", ans:"Asia"},
{img:"europe.png", ans:"Europe"},
{img:"australia.png", ans:"Australia"},
{img:"north-america.png", ans:"North America"},
{img:"south-america.png", ans:"South America"},
{img:"antarctica.png", ans:"Antarctica"}
];

let i=0;
let score=0;
let time=60;
let timer;

function startGame(){
splash.style.display="none";
game.style.display="flex";
loadQ();
}

setTimeout(startGame,2000);

/* TIMER */
function startTimer(){
clearInterval(timer);
time=60;
timerText.innerText=time;

timer=setInterval(()=>{
time--;
timerText.innerText=time;

if(time<=0){
wrong.play();
next();
}
},1000);
}

/* LOAD */
function loadQ(){
startTimer();

if(i>=questions.length){
end();
return;
}

let q=questions[i];
safeImg(qimg, assetsBase + q.img);

/* voice */
speechSynthesis.cancel();
speechSynthesis.speak(new SpeechSynthesisUtterance(q.ans));

let opts=["Africa","Asia","Europe","Australia","North America","South America","Antarctica"];
opts.sort(()=>Math.random()-0.5);
opts=opts.slice(0,4);
if(!opts.includes(q.ans)) opts[0]=q.ans;
opts.sort(()=>Math.random()-0.5);

optionsBox.innerHTML="";

opts.forEach(o=>{
let d=document.createElement("div");
d.className="option";
d.innerText=o;

d.onclick=()=>check(o,q.ans);

optionsBox.appendChild(d);
});
}

/* CHECK */
function check(sel,ans){
if(sel===ans){
score+=10;
scoreText.innerText="Score: "+score;
next();
}else{
wrong.play();
startTimer();
}
}

function next(){
i++;
loadQ();
}

function end(){
game.style.display="none";
final.style.display="flex";
clap.play();
}

function restart(){
i=0;
score=0;
final.style.display="none";
game.style.display="flex";
loadQ();
}

</script>

</body>
</html>
