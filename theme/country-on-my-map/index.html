<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Country on My Map - Pro</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:#fff;
}

/* SPLASH */
#splash{
position:absolute;
width:100%;
height:100%;
background:#fff;
display:flex;
justify-content:center;
align-items:center;
}

#splash img{
width:180px;
}

/* GAME */
#game{
display:none;
width:100%;
height:100vh;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:10px;
}

#timer{
font-size:20px;
font-weight:bold;
color:#e74c3c;
margin-bottom:10px;
}

#score{
font-size:18px;
margin-bottom:10px;
}

#stars{
font-size:22px;
margin-bottom:10px;
}

#continentImg{
width:65%;
max-width:300px;
margin-bottom:15px;
}

.options{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
width:100%;
max-width:500px;
}

.option{
background:#f3f6ff;
padding:14px;
border-radius:12px;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

.option:active{transform:scale(0.97);}

.shake{animation:shake 0.3s;}

@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-5px)}
50%{transform:translateX(5px)}
75%{transform:translateX(-5px)}
100%{transform:translateX(0)}
}

.glow{
box-shadow:0 0 15px #2ecc71;
border:2px solid #2ecc71;
}

/* FINAL */
#final{
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
}

#final h1{
color:#2ecc71;
font-size:30px;
margin-bottom:10px;
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
background:#3498db;
color:#fff;
font-size:16px;
}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
    <img src="Ly3/theme/country-on-my-map/assets/innovine-logo.png">
</div>

<!-- GAME -->
<div id="game">

<div id="score">Score: 0</div>
<div id="stars">⭐ ⭐ ⭐</div>
<div id="timer">Time: 60s</div>

<img id="continentImg">

<div class="options" id="options"></div>

</div>

<!-- FINAL -->
<div id="final">
<h1>🎉 Good Job!</h1>
<h2 id="finalScore"></h2>
<button onclick="restartGame()">Play Again</button>
</div>

<canvas id="confetti"></canvas>

<!-- AUDIO -->
<audio id="correctSound" src="Ly3/theme/country-on-my-map/assets/correct.mp3"></audio>
<audio id="wrongSound" src="Ly3/theme/country-on-my-map/assets/wrong.mp3"></audio>
<audio id="clapSound" src="Ly3/theme/country-on-my-map/assets/claps.mp3"></audio>

<script>

const questions = [
{img:"africa.png", answer:"Africa"},
{img:"asia.png", answer:"Asia"},
{img:"europe.png", answer:"Europe"},
{img:"australia.png", answer:"Australia"},
{img:"north-america.png", answer:"North America"},
{img:"south-america.png", answer:"South America"},
{img:"antarctica.png", answer:"Antarctica"}
];

let current=0;
let attempts=0;
let score=0;
let timer=60;
let interval;

const base="Ly3/theme/country-on-my-map/assets/";

const img=document.getElementById("continentImg");
const optionsDiv=document.getElementById("options");

const timerBox=document.getElementById("timer");
const scoreBox=document.getElementById("score");
const starsBox=document.getElementById("stars");

const correctSound=document.getElementById("correctSound");
const wrongSound=document.getElementById("wrongSound");
const clapSound=document.getElementById("clapSound");

document.getElementById("splash").style.display="flex";

setTimeout(()=>{
document.getElementById("splash").style.display="none";
document.getElementById("game").style.display="flex";
loadQ();
},2000);

/* SPEECH */
function speak(text){
let s=new SpeechSynthesisUtterance(text);
s.rate=0.9;
speechSynthesis.speak(s);
}

/* TIMER */
function startTimer(){
clearInterval(interval);
timer=60;
timerBox.innerText="Time: "+timer+"s";

interval=setInterval(()=>{
timer--;
timerBox.innerText="Time: "+timer+"s";

if(timer<=0){
wrongSound.play();
nextQuestion(); // auto skip
}
},1000);
}

/* LOAD QUESTION */
function loadQ(){
attempts=0;

if(current>=questions.length){
showFinal();
return;
}

startTimer();

let q=questions[current];
img.src=base+q.img;

/* voice instruction */
setTimeout(()=>{
speak(q.answer);
},500);

/* options */
let opts=["Africa","Asia","Europe","Australia","North America","South America","Antarctica"];
opts.sort(()=>Math.random()-0.5);
opts=opts.slice(0,4);
if(!opts.includes(q.answer)) opts[0]=q.answer;

opts.sort(()=>Math.random()-0.5);

optionsDiv.innerHTML="";

opts.forEach(o=>{
let d=document.createElement("div");
d.className="option";
d.innerText=o;

d.onclick=()=>check(d,o,q.answer);

optionsDiv.appendChild(d);
});
}

/* CHECK */
function check(el,selected,correct){

if(selected===correct){

correctSound.play();
score+=10;
updateScore();

el.style.background="#d4edda";

setTimeout(()=>{
nextQuestion();
},800);

}else{

attempts++;
wrongSound.play();
el.classList.add("shake");

setTimeout(()=>el.classList.remove("shake"),300);

/* reset timer on wrong */
startTimer();

if(attempts>=2){
let all=document.querySelectorAll(".option");
all.forEach(o=>{
if(o.innerText===correct){
o.classList.add("glow");
}
});

setTimeout(()=>nextQuestion(),1000);
}
}
}

function nextQuestion(){
current++;
loadQ();
}

function updateScore(){
scoreBox.innerText="Score: "+score;

if(score<=20){
starsBox.innerText="⭐";
}
else if(score<=50){
starsBox.innerText="⭐⭐";
}
else{
starsBox.innerText="⭐⭐⭐";
}
}

/* FINAL */
function showFinal(){
clearInterval(interval);
document.getElementById("game").style.display="none";
document.getElementById("final").style.display="flex";
document.getElementById("finalScore").innerText="Score: "+score;

clapSound.play();
startConfetti();
}

/* RESTART */
function restartGame(){
current=0;
score=0;
document.getElementById("final").style.display="none";
document.getElementById("game").style.display="flex";
loadQ();
}

/* CONFETTI */
const canvas=document.getElementById("confetti");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let pieces=[];

function startConfetti(){
pieces=[];
for(let i=0;i<120;i++){
pieces.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height-canvas.height,
r:Math.random()*6+4,
d:Math.random()*5+2,
c:["#f94144","#f9c74f","#90be6d","#577590"][Math.floor(Math.random()*4)]
});
}
draw();
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

pieces.forEach(p=>{
ctx.fillStyle=p.c;
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();

p.y+=p.d;
if(p.y>canvas.height){
p.y=-10;
p.x=Math.random()*canvas.width;
}
});

requestAnimationFrame(draw);
}

</script>

</body>
</html>
