<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>Country On My Map</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
width:100vw;
height:100vh;
overflow:hidden;
}

/* SCREENS */

#splash,
#game,
#final{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

#game,
#final{
display:none;
}

/* SPLASH */

#splash{
background:white;
}

#logo{
width:280px;
max-width:80%;
}

/* GAME */

#game{
background:url("assets/background.png") center center/cover no-repeat;
padding:10px;
}

.topBar{
width:100%;
max-width:900px;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
font-size:22px;
font-weight:bold;
}

#timer{
color:red;
}

#stars{
color:gold;
}

.questionArea{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
width:100%;
}

#qimg{
width:65vw;
max-width:400px;
max-height:35vh;
object-fit:contain;
margin-bottom:15px;
}

#options{
width:100%;
max-width:500px;
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.option{
background:white;
padding:14px;
border-radius:14px;
font-size:22px;
font-weight:bold;
text-align:center;
cursor:pointer;
box-shadow:0 3px 8px rgba(0,0,0,.2);
user-select:none;
}

.option:hover{
transform:scale(1.02);
}

.correct{
background:#7dff8f !important;
}

.glow{
animation:glow 1s infinite;
}

@keyframes glow{
0%{box-shadow:0 0 5px lime;}
50%{box-shadow:0 0 25px lime;}
100%{box-shadow:0 0 5px lime;}
}

.shake{
animation:shake .4s;
}

@keyframes shake{
0%{transform:translateX(0);}
25%{transform:translateX(-8px);}
50%{transform:translateX(8px);}
75%{transform:translateX(-8px);}
100%{transform:translateX(0);}
}

/* FEEDBACK */

#feedback{
height:40px;
font-size:30px;
font-weight:bold;
margin:5px;
color:green;
}

/* FINAL */

#final{
background:white;
}

#final h1{
font-size:50px;
margin-bottom:20px;
color:#28a745;
}

#playAgain{
padding:15px 30px;
font-size:24px;
border:none;
border-radius:12px;
background:#4caf50;
color:white;
cursor:pointer;
}

/* CONFETTI */

.confetti{
position:absolute;
width:10px;
height:10px;
top:-10px;
animation:fall 4s linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(720deg);
}
}

@media(max-width:600px){

.option{
font-size:18px;
padding:12px;
}

.topBar{
font-size:18px;
}

#qimg{
max-height:30vh;
}

}
</style>
</head>

<body>

<!-- SPLASH -->

<div id="splash">
<img id="logo" src="assets/innovine-logo.png">
</div>

<!-- GAME -->

<div id="game">

<div class="topBar">
<div id="score">⭐ 0</div>
<div id="stars">🌟</div>
<div id="timer">60</div>
</div>

<div id="feedback"></div>

<div class="questionArea">
<img id="qimg">
<div id="options"></div>
</div>

</div>

<!-- FINAL -->

<div id="final">
<h1>🎉 GOOD JOB! 🎉</h1>
<button id="playAgain">Play Again</button>
</div>

<!-- AUDIO -->

<audio id="claps" src="assets/claps.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>

<script>

const questions = [
{img:"africa.png",ans:"Africa"},
{img:"asia.png",ans:"Asia"},
{img:"europe.png",ans:"Europe"},
{img:"australia.png",ans:"Australia"},
{img:"north-america.png",ans:"North America"},
{img:"south-america.png",ans:"South America"},
{img:"antarctica.png",ans:"Antarctica"}
];

let current = 0;
let score = 0;
let wrongAttempts = 0;
let timer = null;
let timeLeft = 60;

const qimg = document.getElementById("qimg");
const optionsDiv = document.getElementById("options");
const scoreBox = document.getElementById("score");
const timerBox = document.getElementById("timer");
const feedback = document.getElementById("feedback");

const claps = document.getElementById("claps");
const wrong = document.getElementById("wrong");

shuffle(questions);

setTimeout(()=>{
document.getElementById("splash").style.display="none";
document.getElementById("game").style.display="flex";
loadQuestion();
},2000);

function shuffle(arr){
for(let i=arr.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[arr[i],arr[j]]=[arr[j],arr[i]];
}
}

function startTimer(){

clearInterval(timer);

timeLeft = 60;

timerBox.innerText = timeLeft;

timer = setInterval(()=>{

timeLeft--;

timerBox.innerText=timeLeft;

if(timeLeft<=0){

clearInterval(timer);

startTimer();

}

},1000);

}

function speak(text){

speechSynthesis.cancel();

let msg = new SpeechSynthesisUtterance(
"Find " + text
);

msg.rate = 0.9;

speechSynthesis.speak(msg);

}

function loadQuestion(){

if(current>=questions.length){

endGame();
return;
}

wrongAttempts = 0;

feedback.innerHTML="";

startTimer();

let q = questions[current];

qimg.src = "assets/" + q.img;

speak(q.ans);

let choices = [
"Africa",
"Asia",
"Europe",
"Australia",
"North America",
"South America",
"Antarctica"
];

choices = choices.filter(x=>x!==q.ans);

shuffle(choices);

choices = choices.slice(0,3);

choices.push(q.ans);

shuffle(choices);

optionsDiv.innerHTML="";

choices.forEach(choice=>{

let btn = document.createElement("div");

btn.className="option";

btn.innerText=choice;

btn.onclick=()=>checkAnswer(btn,choice,q.ans);

optionsDiv.appendChild(btn);

});

}

function checkAnswer(btn,selected,correct){

if(selected===correct){

clearInterval(timer);

feedback.innerHTML="✅ Good Job!";

btn.classList.add("correct");

score += 10;

scoreBox.innerHTML="⭐ " + score;

try{
claps.currentTime=0;
claps.play();
}catch(e){}

setTimeout(()=>{

current++;

loadQuestion();

},1200);

}
else{

wrongAttempts++;

try{
wrong.currentTime=0;
wrong.play();
}catch(e){}

btn.classList.add("shake");

setTimeout(()=>{
btn.classList.remove("shake");
},400);

startTimer();

if(wrongAttempts>=2){

document.querySelectorAll(".option")
.forEach(o=>{

if(o.innerText===correct){

o.classList.add("glow");

}

});

}

}

}

function endGame(){

document.getElementById("game").style.display="none";
document.getElementById("final").style.display="flex";

launchConfetti();

}

function launchConfetti(){

for(let i=0;i<120;i++){

let c=document.createElement("div");

c.className="confetti";

c.style.left=Math.random()*100+"vw";

c.style.background=
`hsl(${Math.random()*360},100%,50%)`;

c.style.animationDuration=
(2+Math.random()*3)+"s";

document.body.appendChild(c);

setTimeout(()=>{

c.remove();

},5000);

}

}

document.getElementById("playAgain").onclick=()=>{

current=0;
score=0;

scoreBox.innerHTML="⭐ 0";

shuffle(questions);

document.getElementById("final").style.display="none";
document.getElementById("game").style.display="flex";

loadQuestion();

};

</script>

</body>
</html>
