<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fixed Map Game</title>

<style>
body{
margin:0;
font-family:Arial;
background:#ffffff;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* FORCE VISIBILITY */
#splash,#game,#final{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

#game{display:none;}
#final{display:none;}

img{
max-width:250px;
}

/* OPTIONS */
.option{
background:#eef3ff;
padding:12px;
margin:6px;
border-radius:10px;
width:220px;
text-align:center;
}

#timer{color:red;font-weight:bold;}
#score{font-weight:bold;}
</style>
</head>

<body>

<div id="splash">
  <h2>Loading Game...</h2>
</div>

<div id="game">
  <div id="score">Score: 0</div>
  <div id="timer">60</div>

  <!-- SAFE IMAGE AREA -->
  <div id="imgBox">
    <h3 id="fallbackText">Loading Question...</h3>
    <img id="qimg" style="display:none;">
  </div>

  <div id="options"></div>
</div>

<div id="final">
  <h1>Good Job 🎉</h1>
  <button onclick="restart()">Play Again</button>
</div>

<script>

const base = "Ly3/theme/country-on-my-map/assets/";

const questions = [
{img:"africa.png", ans:"Africa"},
{img:"asia.png", ans:"Asia"},
{img:"europe.png", ans:"Europe"},
{img:"australia.png", ans:"Australia"},
{img:"north-america.png", ans:"North America"},
{img:"south-america.png", ans:"South America"},
{img:"antarctica.png", ans:"Antarctica"}
];

let i=0;
let score=0;
let timer;
let time=60;

const game=document.getElementById("game");
const splash=document.getElementById("splash");
const final=document.getElementById("final");

const img=document.getElementById("qimg");
const fallback=document.getElementById("fallbackText");
const options=document.getElementById("options");
const scoreBox=document.getElementById("score");
const timerBox=document.getElementById("timer");

/* SAFE IMAGE LOADER (IMPORTANT FIX) */
function loadImage(path){
img.style.display="block";
fallback.style.display="none";

img.onerror=()=>{
fallback.style.display="block";
fallback.innerText="Image missing: "+path;
img.style.display="none";
};

img.src=base+path;
}

/* START ALWAYS */
setTimeout(()=>{
splash.style.display="none";
game.style.display="flex";
loadQ();
},1500);

/* TIMER */
function startTimer(){
clearInterval(timer);
time=60;
timerBox.innerText=time;

timer=setInterval(()=>{
time--;
timerBox.innerText=time;

if(time<=0){
next();
}
},1000);
}

/* LOAD QUESTION */
function loadQ(){

if(i>=questions.length){
end();
return;
}

startTimer();

let q=questions[i];
loadImage(q.img);

fallback.innerText="What is this continent?";

speechSynthesis.cancel();
speechSynthesis.speak(new SpeechSynthesisUtterance(q.ans));

let opts=["Africa","Asia","Europe","Australia","North America","South America","Antarctica"];
opts.sort(()=>Math.random()-0.5);
opts=opts.slice(0,4);
if(!opts.includes(q.ans)) opts[0]=q.ans;
opts.sort(()=>Math.random()-0.5);

options.innerHTML="";

opts.forEach(o=>{
let d=document.createElement("div");
d.className="option";
d.innerText=o;

d.onclick=()=>{
if(o===q.ans){
score+=10;
scoreBox.innerText="Score: "+score;
next();
}else{
startTimer();
}
};

options.appendChild(d);
});
}

/* NEXT */
function next(){
i++;
loadQ();
}

/* END */
function end(){
game.style.display="none";
final.style.display="flex";
}

/* RESTART */
function restart(){
i=0;
score=0;
final.style.display="none";
game.style.display="flex";
loadQ();
}

</script>

</body>
</html>
