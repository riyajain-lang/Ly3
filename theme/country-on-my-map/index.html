<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>Country On My Map</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
width:100vw;
height:100vh;
overflow:hidden;
}

/* SCREENS */

#splash,
#game,
#final{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

#game,
#final{
display:none;
}

/* SPLASH */

#splash{
background:white;
}

#logo{
width:280px;
max-width:80%;
}

/* GAME */

#game{
background:linear-gradient(
180deg,
#87ceeb 0%,
#c8f0ff 60%,
#ffffff 100%
);
padding:10px;
}

/* TOP PANEL */

.topPanel{
width:100%;
max-width:900px;
display:flex;
flex-direction:column;
gap:10px;
margin-bottom:10px;
}

.instructionBox{
background:white;
border:4px solid #ffb347;
border-radius:20px;
padding:12px;
text-align:center;
font-size:20px;
font-weight:bold;
box-shadow:0 4px 10px rgba(0,0,0,.15);
}

.statsRow{
display:flex;
gap:10px;
}

.statBox{
flex:1;
background:white;
border:4px solid #6ec6ff;
border-radius:18px;
padding:10px;
text-align:center;
font-size:22px;
font-weight:bold;
box-shadow:0 4px 10px rgba(0,0,0,.15);
}

#timer{
color:red;
}

/* FEEDBACK */

#feedback{
height:40px;
font-size:32px;
font-weight:bold;
margin:5px;
color:green;
}

/* QUESTION AREA */

.questionArea{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
width:100%;
}

#qimg{
width:70vw;
max-width:420px;
max-height:32vh;
object-fit:contain;
margin-bottom:15px;
}

/* OPTIONS */

#options{
width:100%;
max-width:600px;
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.option{
background:white;
padding:16px;
border-radius:20px;
font-size:22px;
font-weight:bold;
text-align:center;
cursor:pointer;
user-select:none;

border:4px solid #ff8ec7;

box-shadow:
0 4px 8px rgba(0,0,0,.15),
0 0 0 4px rgba(255,255,255,.8) inset;

transition:.2s;
}

.option:hover{
transform:scale(1.03);
}

.correct{
background:#8cff9d !important;
border-color:#28a745 !important;
}

.glow{
animation:glow 1s infinite;
}

@keyframes glow{
0%{
box-shadow:0 0 5px lime;
}
50%{
box-shadow:0 0 25px lime;
}
100%{
box-shadow:0 0 5px lime;
}
}

.shake{
animation:shake .4s;
}

@keyframes shake{
0%{transform:translateX(0);}
25%{transform:translateX(-8px);}
50%{transform:translateX(8px);}
75%{transform:translateX(-8px);}
100%{transform:translateX(0);}
}

/* FINAL SCREEN */

#final{
background:white;
}

#final h1{
font-size:48px;
color:#28a745;
margin-bottom:20px;
text-align:center;
}

#playAgain{
padding:15px 30px;
font-size:24px;
border:none;
border-radius:15px;
background:#4caf50;
color:white;
cursor:pointer;
}

/* CONFETTI */

.confetti{
position:absolute;
width:10px;
height:10px;
top:-10px;
animation:fall 4s linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(720deg);
}
}

/* MOBILE */

@media(max-width:600px){

.instructionBox{
font-size:16px;
}

.statBox{
font-size:18px;
}

.option{
font-size:18px;
padding:12px;
}

#qimg{
max-height:28vh;
}

}

</style>
</head>

<body>

<!-- SPLASH -->

<div id="splash">
<img id="logo" src="assets/innovine-logo.png">
</div>

<!-- GAME -->

<div id="game">

<div class="topPanel">

<div class="instructionBox">
🌍 Listen carefully and choose the correct continent!
</div>

<div class="statsRow">
<div class="statBox" id="score">⭐ 0</div>
<div class="statBox" id="stars">🌟</div>
<div class="statBox" id="timer">60</div>
</div>

</div>

<div id="feedback"></div>

<div class="questionArea">

<img id="qimg" src="">

<div id="options"></div>

</div>

</div>

<!-- FINAL -->

<div id="final">
<h1>🎉 GOOD JOB! 🎉</h1>
<button id="playAgain">Play Again</button>
</div>

<!-- AUDIO -->

<audio id="claps" src="assets/claps.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>

<script>

/* QUESTIONS */

const questions = [
{img:"africa.png",ans:"Africa"},
{img:"asia.png",ans:"Asia"},
{img:"europe.png",ans:"Europe"},
{img:"australia.png",ans:"Australia"},
{img:"north-america.png",ans:"North America"},
{img:"south-america.png",ans:"South America"},
{img:"antarctica.png",ans:"Antarctica"}
];

/* VARIABLES */

let current = 0;
let score = 0;
let wrongAttempts = 0;
let timer = null;
let timeLeft = 60;

/* ELEMENTS */

const qimg = document.getElementById("qimg");
const optionsDiv = document.getElementById("options");
const scoreBox = document.getElementById("score");
const starsBox = document.getElementById("stars");
const timerBox = document.getElementById("timer");
const feedback = document.getElementById("feedback");

const claps = document.getElementById("claps");
const wrong = document.getElementById("wrong");

/* SHUFFLE */

function shuffle(array){
for(let i=array.length-1;i>0;i--){
const j=Math.floor(Math.random()*(i+1));
[array[i],array[j]]=[array[j],array[i]];
}
}

shuffle(questions);

/* SPLASH */

setTimeout(()=>{

document.getElementById("splash").style.display="none";
document.getElementById("game").style.display="flex";

loadQuestion();

},2000);

/* TIMER */

function startTimer(){

clearInterval(timer);

timeLeft = 60;

timerBox.innerHTML = timeLeft;

timer = setInterval(()=>{

timeLeft--;

timerBox.innerHTML = timeLeft;

if(timeLeft<=0){

clearInterval(timer);

startTimer();

}

},1000);

}

/* SPEAK */

function speak(text){

speechSynthesis.cancel();

let msg = new SpeechSynthesisUtterance(
"Look at the map and choose " + text
);

msg.rate = 0.9;

speechSynthesis.speak(msg);

}

/* LOAD QUESTION */

function loadQuestion(){

if(current >= questions.length){

endGame();
return;

}

wrongAttempts = 0;

feedback.innerHTML = "";

startTimer();

let q = questions[current];

qimg.src = "assets/" + q.img;

speak(q.ans);

let options = [
"Africa",
"Asia",
"Europe",
"Australia",
"North America",
"South America",
"Antarctica"
];

options = options.filter(x=>x!==q.ans);

shuffle(options);

options = options.slice(0,3);

options.push(q.ans);

shuffle(options);

optionsDiv.innerHTML="";

options.forEach(option=>{

let btn=document.createElement("div");

btn.className="option";

btn.innerText=option;

btn.onclick=()=>checkAnswer(btn,option,q.ans);

optionsDiv.appendChild(btn);

});

}

/* ANSWER */

function checkAnswer(btn,selected,correct){

if(selected===correct){

clearInterval(timer);

feedback.innerHTML="✅ Good Job!";

btn.classList.add("correct");

score += 10;

scoreBox.innerHTML="⭐ " + score;

if(score>=60){
starsBox.innerHTML="🌟🌟🌟";
}
else if(score>=30){
starsBox.innerHTML="🌟🌟";
}
else{
starsBox.innerHTML="🌟";
}

try{
claps.currentTime=0;
claps.play();
}catch(e){}

setTimeout(()=>{

current++;

loadQuestion();

},1200);

}
else{

wrongAttempts++;

try{
wrong.currentTime=0;
wrong.play();
}catch(e){}

btn.classList.add("shake");

setTimeout(()=>{
btn.classList.remove("shake");
},400);

startTimer();

if(wrongAttempts>=2){

document.querySelectorAll(".option")
.forEach(o=>{

if(o.innerText===correct){

o.classList.add("glow");

}

});

}

}

}

/* END */

function endGame(){

document.getElementById("game").style.display="none";
document.getElementById("final").style.display="flex";

launchConfetti();

}

/* CONFETTI */

function launchConfetti(){

for(let i=0;i<120;i++){

let c=document.createElement("div");

c.className="confetti";

c.style.left=Math.random()*100+"vw";

c.style.background=
`hsl(${Math.random()*360},100%,50%)`;

c.style.animationDuration=
(2+Math.random()*3)+"s";

document.body.appendChild(c);

setTimeout(()=>{
c.remove();
},5000);

}

}

/* PLAY AGAIN */

document.getElementById("playAgain").onclick=()=>{

current=0;
score=0;

shuffle(questions);

scoreBox.innerHTML="⭐ 0";
starsBox.innerHTML="🌟";

document.getElementById("final").style.display="none";
document.getElementById("game").style.display="flex";

loadQuestion();

};

</script>

</body>
</html>
