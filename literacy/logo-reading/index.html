<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logo Reading Game</title>
<style>
  * { box-sizing: border-box; margin:0; padding:0; }
  body, html {
    width:100%; height:100%;
    font-family: Arial, sans-serif;
    display: flex; justify-content: center; align-items: center;
    background: #fff;
  }
  .slide {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    text-align: center;
  }
  .active { display: flex; }
  h2 { margin-bottom: 20px; font-size: 22px; }
  .logos {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
    width: 90%;
  }
  .logo {
    width: 90px;
    height: 90px;
    object-fit: contain;
    cursor: pointer;
    border: 3px solid transparent;
    border-radius: 10px;
    transition: transform 0.2s, border 0.2s;
  }
  .logo:hover { transform: scale(1.1); }
  .wrong { animation: shake 0.3s; border: 3px solid red; }
  @keyframes shake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    50% { transform: translateX(5px); }
    75% { transform: translateX(-5px); }
    100% { transform: translateX(0); }
  }
  .end-slide h1 { font-size: 28px; margin-bottom: 20px; }
  button {
    padding: 10px 20px;
    font-size: 18px;
    cursor: pointer;
    border-radius: 8px;
    border: none;
    background-color: #4CAF50;
    color: white;
  }
</style>
</head>
<body>

<!-- Slide 1: Innovine logo splash -->
<div class="slide active" id="slide0">
  <img src="assets/innovine-logo.png" alt="Innovine Logo" width="200">
</div>

<!-- Game Slides -->
<div class="slide" id="slide1">
  <h2>Tap on the Google logo</h2>
  <div class="logos">
    <img src="assets/google.png" class="logo" data-correct="true">
    <img src="assets/samsung.png" class="logo" data-correct="false">
    <img src="assets/indian-railway.png" class="logo" data-correct="false">
  </div>
</div>

<div class="slide" id="slide2">
  <h2>Tap on the Samsung logo</h2>
  <div class="logos">
    <img src="assets/google.png" class="logo" data-correct="false">
    <img src="assets/samsung.png" class="logo" data-correct="true">
    <img src="assets/mcdonalds-logo.png" class="logo" data-correct="false">
  </div>
</div>

<div class="slide" id="slide3">
  <h2>Tap on the Indian Railway logo</h2>
  <div class="logos">
    <img src="assets/indian-railway.png" class="logo" data-correct="true">
    <img src="assets/nike.png" class="logo" data-correct="false">
    <img src="assets/made-in-india.png" class="logo" data-correct="false">
  </div>
</div>

<div class="slide" id="slide4">
  <h2>Tap on the National Emblem logo</h2>
  <div class="logos">
    <img src="assets/national-emblem.png" class="logo" data-correct="true">
    <img src="assets/made-in-india.png" class="logo" data-correct="false">
    <img src="assets/samsung.png" class="logo" data-correct="false">
  </div>
</div>

<div class="slide" id="slide5">
  <h2>Tap on the Made In India logo</h2>
  <div class="logos">
    <img src="assets/made-in-india.png" class="logo" data-correct="true">
    <img src="assets/google.png" class="logo" data-correct="false">
    <img src="assets/nike.png" class="logo" data-correct="false">
  </div>
</div>

<div class="slide" id="slide6">
  <h2>Tap on the McDonald's logo</h2>
  <div class="logos">
    <img src="assets/mcdonalds-logo.png" class="logo" data-correct="true">
    <img src="assets/samsung.png" class="logo" data-correct="false">
    <img src="assets/google.png" class="logo" data-correct="false">
  </div>
</div>

<div class="slide" id="slide7">
  <h2>Tap on the Nike logo</h2>
  <div class="logos">
    <img src="assets/nike.png" class="logo" data-correct="true">
    <img src="assets/google.png" class="logo" data-correct="false">
    <img src="assets/mcdonalds-logo.png" class="logo" data-correct="false">
  </div>
</div>

<!-- End Slide -->
<div class="slide end-slide" id="slideEnd">
  <h1>Good Job!</h1>
  <canvas id="confettiCanvas" style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none;"></canvas>
  <button onclick="restartGame()">Play Again</button>
</div>

<!-- Audio -->
<audio id="correctSound" src="assets/freesound_community-claps-44774.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<script>
// Game logic
let currentSlide = 0;
const slides = document.querySelectorAll('.slide');
const correctSound = document.getElementById('correctSound');
const wrongSound = document.getElementById('wrongSound');

// Splash auto-advance
setTimeout(() => showSlide(1), 2000);

function showSlide(index) {
  slides[currentSlide].classList.remove('active');
  slides[index].classList.add('active');
  currentSlide = index;
}

// Logo tap
document.querySelectorAll('.logo').forEach(logo => {
  logo.addEventListener('click', () => {
    if(logo.dataset.correct === "true") {
      correctSound.play();
      setTimeout(() => {
        if(currentSlide+1 < slides.length-1) showSlide(currentSlide+1);
        else {
          showSlide(slides.length-1); // end slide
          launchConfetti();
        }
      }, 500);
    } else {
      logo.classList.add('wrong');
      wrongSound.play();
      setTimeout(() => logo.classList.remove('wrong'), 400);
    }
  });
});

// Restart
function restartGame() {
  stopConfetti();
  showSlide(1);
}

// --- Simple confetti ---
let confettiInterval;
function launchConfetti() {
  const canvas = document.getElementById('confettiCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const confetti = [];
  for(let i=0;i<150;i++){
    confetti.push({
      x: Math.random()*canvas.width,
      y: Math.random()*canvas.height- canvas.height,
      r: Math.random()*6+4,
      d: Math.random()*10+2,
      color: `hsl(${Math.random()*360}, 100%, 50%)`,
      tilt: Math.random()*10-10,
      tiltAngleIncrement: Math.random()*0.07+0.05,
      tiltAngle:0
    });
  }
  confettiInterval = setInterval(() => {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    confetti.forEach((c, i)=>{
      c.tiltAngle += c.tiltAngleIncrement;
      c.y += (Math.cos(c.d) + 3 + c.r/2)/2;
      c.x += Math.sin(c.d);
      c.tilt = Math.sin(c.tiltAngle)*15;
      ctx.beginPath();
      ctx.lineWidth = c.r/2;
      ctx.strokeStyle = c.color;
      ctx.moveTo(c.x + c.tilt + c.r/4, c.y);
      ctx.lineTo(c.x + c.tilt, c.y + c.tilt + c.r/4);
      ctx.stroke();
    });
  }, 20);
}

function stopConfetti(){
  clearInterval(confettiInterval);
  const canvas = document.getElementById('confettiCanvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
}
</script>

</body>
</html>
