<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>

<title>Missing Uppercase Letters</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color: transparent;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family: Arial, sans-serif;
    touch-action: manipulation;
}

body{
    background:linear-gradient(to bottom,
    #8fd3ff 0%,
    #ccefff 45%,
    #a6e17a 46%,
    #6bcf57 100%);
}

/* ================= INTRO SCREEN ================= */

#introScreen{
    position:fixed;
    inset:0;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:99999;
}

#introScreen img{
    width:260px;
    max-width:80%;
    object-fit:contain;
}

/* ================= GAME ================= */

#gameContainer{
    display:none;
    width:100%;
    height:100%;
    position:relative;
    overflow:hidden;
}

/* ================= TITLE ================= */

.gameTitle{
    position:absolute;
    top:12px;
    width:100%;
    text-align:center;
    z-index:10;
    font-size:clamp(28px,5vw,52px);
    font-weight:bold;
    color:#fff700;
    text-shadow:
    3px 3px 0 #2e7d32,
    5px 5px 0 rgba(0,0,0,0.15);
    pointer-events:none;
}

/* ================= CLOUD ================= */

.cloud{
    position:absolute;
    top:90px;
    left:50%;
    transform:translateX(-50%);
    width:min(92vw,760px);
    background:white;
    border-radius:60px;
    padding:22px 20px;
    box-shadow:0 10px 20px rgba(0,0,0,0.2);
    z-index:4;
}

.cloud::before,
.cloud::after{
    content:'';
    position:absolute;
    background:white;
    border-radius:50%;
}

.cloud::before{
    width:90px;
    height:90px;
    left:40px;
    top:-35px;
}

.cloud::after{
    width:120px;
    height:120px;
    right:40px;
    top:-55px;
}

.letters{
    position:relative;
    z-index:2;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:14px;
}

.draggable{
    width:68px;
    height:68px;
    border-radius:50%;
    background:#ffeb3b;
    border:4px solid #ff9800;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:36px;
    font-weight:bold;
    color:#5d4037;
    cursor:pointer;
    user-select:none;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
    transition:transform 0.2s;
}

.draggable:active{
    transform:scale(1.15);
}

/* ================= CATERPILLAR ================= */

.caterpillarArea{
    position:absolute;
    bottom:10px;
    width:100%;
    display:flex;
    justify-content:center;
    padding:0 10px;
}

.caterpillar{
    width:min(1200px,100%);
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    row-gap:18px;
}

.segment{
    position:relative;
    margin-left:-10px;
}

.segment::before{
    content:'';
    position:absolute;
    width:40px;
    height:40px;
    background:#43a047;
    left:-16px;
    top:50%;
    transform:translateY(-50%);
    border-radius:50%;
    z-index:0;
}

/* ================= BODY CIRCLES ================= */

.circle{
    width:82px;
    height:82px;
    border-radius:50%;
    background:#7ed957;
    border:4px solid #388e3c;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    z-index:2;
    color:white;
    font-size:42px;
    font-weight:bold;
    box-shadow:
    inset 0 -7px rgba(0,0,0,0.08),
    0 5px 10px rgba(0,0,0,0.2);
}

/* ================= HEAD ================= */

.head{
    width:95px;
    height:95px;
    background:#4caf50;
}

.eye{
    position:absolute;
    width:18px;
    height:18px;
    border-radius:50%;
    background:white;
    top:22px;
}

.eye.left{
    left:18px;
}

.eye.right{
    right:18px;
}

.pupil{
    width:8px;
    height:8px;
    background:black;
    border-radius:50%;
    margin:5px;
}

.smile{
    position:absolute;
    width:34px;
    height:16px;
    border-bottom:5px solid #2e7d32;
    border-radius:0 0 30px 30px;
    bottom:18px;
}

.antenna{
    position:absolute;
    width:4px;
    height:28px;
    background:#2e7d32;
    top:-18px;
    border-radius:10px;
}

.antenna.left{
    left:24px;
    transform:rotate(-25deg);
}

.antenna.right{
    right:24px;
    transform:rotate(25deg);
}

/* ================= DROP ZONES ================= */

.drop-zone{
    background:#00c897;
    border:4px dashed #ff9800;
}

.correct{
    background:#00c853 !important;
    animation:bounce 0.4s;
}

.wrong{
    background:#ff5252 !important;
    animation:shake 0.3s;
}

/* ================= SUCCESS ================= */

#successMessage{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.7);
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:999999;
    color:white;
    text-align:center;
}

#successMessage h1{
    font-size:clamp(50px,10vw,100px);
}

#successMessage p{
    font-size:clamp(24px,5vw,44px);
}

/* ================= ANIMATIONS ================= */

@keyframes bounce{
    0%{transform:scale(0.6);}
    50%{transform:scale(1.2);}
    100%{transform:scale(1);}
}

@keyframes shake{
    0%{transform:translateX(0);}
    25%{transform:translateX(-5px);}
    50%{transform:translateX(5px);}
    75%{transform:translateX(-5px);}
    100%{transform:translateX(0);}
}

/* ================= MOBILE ================= */

@media (max-width:900px){

    .cloud{
        top:90px;
        padding:18px;
    }

    .draggable{
        width:58px;
        height:58px;
        font-size:32px;
    }

    .circle{
        width:68px;
        height:68px;
        font-size:34px;
    }

    .head{
        width:82px;
        height:82px;
    }

}

@media (max-width:600px){

    .gameTitle{
        top:8px;
        font-size:32px;
    }

    .cloud{
        top:70px;
        border-radius:40px;
        padding:14px;
    }

    .letters{
        gap:8px;
    }

    .draggable{
        width:48px;
        height:48px;
        font-size:28px;
    }

    .circle{
        width:56px;
        height:56px;
        font-size:28px;
    }

    .head{
        width:68px;
        height:68px;
    }

    .eye{
        width:14px;
        height:14px;
        top:16px;
    }

    .eye.left{
        left:12px;
    }

    .eye.right{
        right:12px;
    }

    .pupil{
        width:6px;
        height:6px;
        margin:4px;
    }

    .smile{
        width:24px;
        bottom:12px;
    }

}

</style>
</head>

<body>

<!-- ================= INTRO ================= -->

<div id="introScreen">
    <img src="./assets/innovine-logo.png" alt="Logo">
</div>

<!-- ================= GAME ================= -->

<div id="gameContainer">

    <div class="gameTitle">
        Find The Missing Letters
    </div>

    <!-- CLOUD -->

    <div class="cloud">
        <div class="letters" id="lettersContainer"></div>
    </div>

    <!-- CATERPILLAR -->

    <div class="caterpillarArea">
        <div class="caterpillar" id="caterpillar"></div>
    </div>

</div>

<!-- ================= SUCCESS ================= -->

<div id="successMessage">
    <h1>🎉 GREAT JOB! 🎉</h1>
    <p>You Completed The Caterpillar!</p>
</div>

<!-- ================= AUDIO ================= -->

<audio id="correctSound" src="./assets/correct.mp3"></audio>
<audio id="wrongSound" src="./assets/wrong.mp3"></audio>
<audio id="clapSound" src="./assets/freesound_community-claps-44774.mp3"></audio>

<script>

/* ================= INTRO ================= */

setTimeout(()=>{

    document.getElementById("introScreen").style.display = "none";
    document.getElementById("gameContainer").style.display = "block";

},4000);

/* ================= LETTER DATA ================= */

const caterpillarLetters = [
    "A","","C","","E","F","G","","I","","K","","M","","O","","Q","","","T","U","","W","","",""
];

const answers = [
    "B","D","H","J","L","N","P","R","S","V","X","Y","Z"
];

/* ================= BUILD CATERPILLAR ================= */

const caterpillar = document.getElementById("caterpillar");

let answerIndex = 0;
let completed = 0;

caterpillarLetters.forEach((letter,index)=>{

    const segment = document.createElement("div");
    segment.className = "segment";

    const circle = document.createElement("div");

    if(index === 0){

        circle.className = "circle head";

        circle.innerHTML = `
            A

            <div class="antenna left"></div>
            <div class="antenna right"></div>

            <div class="eye left">
                <div class="pupil"></div>
            </div>

            <div class="eye right">
                <div class="pupil"></div>
            </div>

            <div class="smile"></div>
        `;

    }else{

        if(letter === ""){

            circle.className = "circle drop-zone";

            const answer = answers[answerIndex];

            circle.dataset.answer = answer;

            answerIndex++;

        }else{

            circle.className = "circle";
            circle.textContent = letter;

        }

    }

    segment.appendChild(circle);
    caterpillar.appendChild(segment);

});

/* ================= CLOUD LETTERS ================= */

const cloudLetters = [
    "B","D","H","J","L","N","P","R","S","V","X","Y","Z"
];

cloudLetters.sort(()=>Math.random()-0.5);

const lettersContainer = document.getElementById("lettersContainer");

cloudLetters.forEach(letter=>{

    const div = document.createElement("div");

    div.className = "draggable";
    div.textContent = letter;
    div.dataset.letter = letter;

    div.addEventListener("click",()=>{

        selectedLetter = div;

        document.querySelectorAll(".draggable").forEach(el=>{
            el.style.transform = "scale(1)";
        });

        div.style.transform = "scale(1.15)";
    });

    lettersContainer.appendChild(div);

});

/* ================= GAME LOGIC ================= */

let selectedLetter = null;

document.querySelectorAll(".drop-zone").forEach(zone=>{

    zone.addEventListener("click",()=>{

        if(!selectedLetter) return;

        const chosen = selectedLetter.dataset.letter;
        const correct = zone.dataset.answer;

        if(chosen === correct){

            zone.textContent = chosen;

            zone.classList.add("correct");

            document.getElementById("correctSound").play();

            selectedLetter.remove();

            selectedLetter = null;

            completed++;

            if(completed === 13){

                document.getElementById("clapSound").play();

                setTimeout(()=>{

                    document.getElementById("successMessage").style.display = "flex";

                },500);

            }

        }else{

            zone.classList.add("wrong");

            document.getElementById("wrongSound").play();

            setTimeout(()=>{
                zone.classList.remove("wrong");
            },400);

        }

    });

});

/* ================= PREVENT IOS ZOOM ================= */

document.addEventListener('gesturestart', function(e){
    e.preventDefault();
});

</script>

</body>
</html>
