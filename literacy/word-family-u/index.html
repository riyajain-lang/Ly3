<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>Word Family U</title>

<style>

/* ==============================
   BASIC SETTINGS
============================== */

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html,
body{

width:100%;
height:100%;

overflow:hidden;

}

body{

font-family:
"Comic Sans MS",
"Arial Rounded MT Bold",
Arial,
sans-serif;

background:#ffffff;

touch-action:manipulation;

}


/* ==============================
   COMMON SCREEN
============================== */

.screen{

position:absolute;

top:0;
left:0;

width:100%;
height:100%;

display:none;

}

.screen.active{

display:flex;

}


/* ==============================
   SLIDE 1
   LOGO SCREEN
============================== */

#splashScreen{

background:#ffffff;

align-items:center;

justify-content:center;

}

#splashLogo{

width:250px;

max-width:65%;

height:auto;

}


/* ==============================
   GAME SCREEN
============================== */

#gameScreen{

flex-direction:column;

align-items:center;

background:

url("assets/background-word-family-u.png")

center center /

cover

no-repeat;

padding:12px;

}


/* ==============================
   TOP AREA
============================== */

.topArea{

position:relative;

width:100%;

min-height:100px;

display:flex;

align-items:center;

justify-content:center;

}


/* ==============================
   WORD FAMILY U TITLE

   SAME STYLE AS
   INSTRUCTION BOX
============================== */

.gameTitle{

background:
rgba(255,255,255,0.97);

color:#3e317e;

font-size:40px;

font-weight:bold;

padding:9px 38px;

border:

5px solid

#ffad33;

border-radius:30px;

text-align:center;

box-shadow:

0 9px 0

rgba(170,85,110,0.20);

}


/* ==============================
   QUESTION NUMBER
============================== */

.progressBox{

position:absolute;

right:25px;

top:12px;

background:#ffffff;

color:#5937a4;

border:

4px solid

#b587e8;

border-radius:28px;

padding:8px 19px;

font-size:25px;

font-weight:bold;

box-shadow:

0 5px 0

rgba(100,57,150,0.18);

}


/* ==============================
   INSTRUCTION BOX
============================== */

.instructionBox{

width:75%;

max-width:1200px;

min-height:85px;

background:

rgba(255,255,255,0.97);

border:

5px solid

#ffad33;

border-radius:34px;

display:flex;

align-items:center;

justify-content:center;

padding:10px 20px;

margin-top:5px;

box-shadow:

0 9px 0

rgba(170,85,110,0.20);

}


#instructionText{

font-size:36px;

color:#3e317e;

font-weight:bold;

text-align:center;

}


/* ==============================
   OPTIONS AREA
============================== */

#optionsArea{

width:92%;

max-width:1550px;

flex:1;

display:grid;

grid-template-columns:

repeat(4,1fr);

gap:50px;

align-items:center;

justify-items:center;

padding:25px 5px;

}


/* ==============================
   IMAGE OPTION
============================== */

.option{

position:relative;

width:100%;

max-width:290px;

height:250px;

border:

7px solid

#ffffff;

border-radius:35px;

background:

rgba(255,255,255,0.97);

display:flex;

align-items:center;

justify-content:center;

cursor:pointer;

overflow:hidden;

box-shadow:

0 12px 0

rgba(112,65,142,0.25);

transition:

transform 0.15s;

}


.option:active{

transform:

translateY(7px);

box-shadow:

0 5px 0

rgba(112,65,142,0.25);

}


.option img{

width:84%;

height:84%;

object-fit:contain;

pointer-events:none;

user-select:none;

-webkit-user-drag:none;

}


/* ==============================
   WRONG ANSWER WIGGLE
============================== */

.option.wiggle{

border-color:#ff6e76;

animation:

wiggle

0.45s ease;

}


@keyframes wiggle{

0%{

transform:

translateX(0);

}

20%{

transform:

translateX(-13px)

rotate(-2deg);

}

40%{

transform:

translateX(13px)

rotate(2deg);

}

60%{

transform:

translateX(-9px);

}

80%{

transform:

translateX(9px);

}

100%{

transform:

translateX(0);

}

}


/* ==============================
   CORRECT ANSWER GLOW
============================== */

.option.hintGlow{

border-color:#ffe028;

animation:

hintGlow

0.75s infinite alternate;

}


@keyframes hintGlow{

from{

transform:

scale(1);

box-shadow:

0 0 12px

7px

rgba(255,222,38,0.65);

}


to{

transform:

scale(1.06);

box-shadow:

0 0 30px

15px

rgba(255,222,38,1);

}

}


/* ==============================
   CORRECT IMAGE
============================== */

.option.correct{

border-color:#21c76a;

background:#eafff1;

transform:

scale(1.05);

box-shadow:

0 0 28px

12px

rgba(32,199,105,0.60);

}


/* ==============================
   GREEN TICK
============================== */

.greenTick{

position:absolute;

top:10px;

right:10px;

width:65px;

height:65px;

border-radius:50%;

background:#21c76a;

border:

5px solid

white;

color:white;

font-size:43px;

font-weight:bold;

display:flex;

align-items:center;

justify-content:center;

box-shadow:

0 4px 8px

rgba(0,0,0,0.25);

animation:

tickPop

0.4s ease;

}


@keyframes tickPop{

from{

transform:

scale(0)

rotate(-180deg);

}

to{

transform:

scale(1)

rotate(0);

}

}


/* ==============================
   FEEDBACK
============================== */

#feedback{

width:100%;

height:55px;

display:flex;

align-items:center;

justify-content:center;

font-size:34px;

font-weight:bold;

color:#149755;

text-shadow:

2px 2px 0

white;

}


/* ==============================
   FINAL SCREEN
============================== */

#endScreen{

flex-direction:column;

align-items:center;

justify-content:center;

text-align:center;

background:

url("assets/background-word-family-u.png")

center center /

cover

no-repeat;

overflow:hidden;

}


.endCard{

position:relative;

z-index:5;

width:600px;

max-width:88%;

background:

rgba(255,255,255,0.97);

border:

8px solid

#ffc539;

border-radius:40px;

padding:40px 20px;

box-shadow:

0 12px 0

rgba(160,91,111,0.22);

}


.star{

font-size:90px;

animation:

starMove

0.8s infinite alternate;

}


@keyframes starMove{

from{

transform:

translateY(0)

rotate(-6deg);

}

to{

transform:

translateY(-12px)

rotate(6deg);

}

}


.goodJob{

font-size:70px;

font-weight:bold;

color:#7141aa;

text-shadow:

4px 4px 0

#ffe350;

margin:5px;

}


.completedText{

font-size:28px;

color:#555555;

margin:

12px 0

30px;

}


#playAgainButton{

border:none;

background:#20bd67;

color:white;

font-family:inherit;

font-size:30px;

font-weight:bold;

border-radius:32px;

padding:

15px 38px;

cursor:pointer;

box-shadow:

0 8px 0

#118847;

}


#playAgainButton:active{

transform:

translateY(6px);

box-shadow:

0 2px 0

#118847;

}


/* ==============================
   CONFETTI
============================== */

#confettiCanvas{

position:absolute;

top:0;

left:0;

width:100%;

height:100%;

z-index:2;

pointer-events:none;

}


/* ==============================
   TABLET
============================== */

@media(max-width:1100px){

.gameTitle{

font-size:32px;

}

.progressBox{

font-size:20px;

right:10px;

}

#instructionText{

font-size:29px;

}

#optionsArea{

gap:20px;

}

.option{

height:210px;

}

}


/* ==============================
   MOBILE PORTRAIT
============================== */

@media(max-width:700px){

#gameScreen{

padding:7px;

}

.topArea{

min-height:72px;

}

.gameTitle{

font-size:23px;

padding:

7px 18px;

border-width:4px;

border-radius:22px;

}

.progressBox{

font-size:15px;

padding:

6px 11px;

right:3px;

top:7px;

border-width:3px;

}

.instructionBox{

width:95%;

min-height:60px;

border-width:4px;

padding:6px;

margin-top:2px;

}

#instructionText{

font-size:21px;

}

#optionsArea{

width:95%;

grid-template-columns:

repeat(2,1fr);

gap:13px;

padding:

12px 3px;

}

.option{

height:

min(24vh,180px);

min-height:110px;

border-radius:23px;

border-width:5px;

}

.greenTick{

width:45px;

height:45px;

font-size:30px;

border-width:3px;

}

#feedback{

height:38px;

font-size:24px;

}

}


/* ==============================
   SHORT LANDSCAPE DEVICES
============================== */

@media(max-height:520px){

#gameScreen{

padding:5px;

}

.topArea{

min-height:64px;

}

.gameTitle{

font-size:23px;

padding:

5px 20px;

border-width:4px;

}

.progressBox{

font-size:16px;

padding:

4px 10px;

}

.instructionBox{

min-height:48px;

padding:4px;

margin:2px;

}

#instructionText{

font-size:22px;

}

#optionsArea{

padding:5px;

gap:18px;

}

.option{

height:

min(47vh,175px);

min-height:90px;

}

#feedback{

height:27px;

font-size:20px;

}

}

</style>

</head>


<body>


<!-- ==============================
     LOGO SCREEN
============================== -->

<section
id="splashScreen"
class="screen active">

<img

id="splashLogo"

src="assets/innovine-logo.png"

alt="Innovine">

</section>



<!-- ==============================
     GAME SCREEN
============================== -->

<section
id="gameScreen"
class="screen">


<div class="topArea">


<div class="gameTitle">

Word Family U

</div>


<div
id="progressBox"
class="progressBox">

1 / 12

</div>


</div>



<div class="instructionBox">


<div id="instructionText">

Tap on the image ending with "un"

</div>


</div>



<div id="optionsArea">

</div>



<div id="feedback">

</div>


</section>



<!-- ==============================
     FINAL SCREEN
============================== -->

<section
id="endScreen"
class="screen">


<canvas
id="confettiCanvas">

</canvas>


<div class="endCard">


<div class="star">

🌟

</div>


<div class="goodJob">

Good Job!

</div>


<div class="completedText">

You completed the

<strong>

Word Family U

</strong>

game!

</div>


<button

id="playAgainButton"

type="button">

Play Again

</button>


</div>


</section>



<!-- ==============================
     AUDIO
============================== -->

<audio

id="clapsSound"

preload="auto">

<source

src="assets/claps.mp3"

type="audio/mpeg">

</audio>



<audio

id="wrongSound"

preload="auto">

<source

src="assets/wrong.mp3"

type="audio/mpeg">

</audio>



<script>


/* ==============================
   WORD FAMILIES
============================== */

var familyWords={


"un":[

"sun",

"bun",

"gun"

],


"ug":[

"mug",

"rug",

"tug"

],


"ut":[

"cut",

"hut",

"nut"

],


"ub":[

"cub",

"rub",

"tub"

]


};



/* ==============================
   12 QUESTIONS
============================== */

var questionBank=[


{

family:"un",

correct:"sun"

},


{

family:"un",

correct:"bun"

},


{

family:"un",

correct:"gun"

},



{

family:"ug",

correct:"mug"

},


{

family:"ug",

correct:"rug"

},


{

family:"ug",

correct:"tug"

},



{

family:"ut",

correct:"cut"

},


{

family:"ut",

correct:"hut"

},


{

family:"ut",

correct:"nut"

},



{

family:"ub",

correct:"cub"

},


{

family:"ub",

correct:"rub"

},


{

family:"ub",

correct:"tub"

}


];



/* ==============================
   GAME VARIABLES
============================== */

var gameQuestions=[];

var currentQuestion=0;

var wrongAttempts=0;

var answerLocked=false;

var confettiAnimation=null;



/* ==============================
   PAGE ELEMENTS
============================== */

var splashScreen=

document.getElementById(

"splashScreen"

);


var gameScreen=

document.getElementById(

"gameScreen"

);


var endScreen=

document.getElementById(

"endScreen"

);


var instructionText=

document.getElementById(

"instructionText"

);


var progressBox=

document.getElementById(

"progressBox"

);


var optionsArea=

document.getElementById(

"optionsArea"

);


var feedback=

document.getElementById(

"feedback"

);


var clapsSound=

document.getElementById(

"clapsSound"

);


var wrongSound=

document.getElementById(

"wrongSound"

);


var playAgainButton=

document.getElementById(

"playAgainButton"

);



/* ==============================
   SHUFFLE
============================== */

function shuffleArray(

originalArray

){


var array=

originalArray.slice();


var i;


for(

i=array.length-1;

i>0;

i--

){


var randomNumber=

Math.floor(

Math.random()

*

(i+1)

);


var temporary=

array[i];


array[i]=

array[randomNumber];


array[randomNumber]=

temporary;


}


return array;


}



/* ==============================
   SHOW SCREEN
============================== */

function showScreen(

selectedScreen

){


splashScreen.className=

"screen";


gameScreen.className=

"screen";


endScreen.className=

"screen";


selectedScreen.className=

"screen active";


}



/* ==============================
   PLAY AUDIO
============================== */

function playAudio(

audioElement

){


try{


audioElement.pause();


audioElement.currentTime=0;


var audioPromise=

audioElement.play();


if(

audioPromise

){


audioPromise.catch(

function(){}

);


}


}


catch(error){


}


}



/* ==============================
   PRELOAD IMAGES
============================== */

function preloadImages(){


var allImages=[

"sun",

"bun",

"gun",

"mug",

"rug",

"tug",

"cut",

"hut",

"nut",

"cub",

"rub",

"tub"

];


var i;


for(

i=0;

i<allImages.length;

i++

){


var image=

new Image();


image.src=

"assets/"

+

allImages[i]

+

".png";


}


}



/* ==============================
   START GAME
============================== */

function startGame(){


stopConfetti();


gameQuestions=

shuffleArray(

questionBank

);


currentQuestion=0;


wrongAttempts=0;


answerLocked=false;


feedback.innerHTML="";


showScreen(

gameScreen

);


showQuestion();


}



/* ==============================
   MAKE FOUR OPTIONS
============================== */

function makeOptions(

question

){


var options=[

question.correct

];


var familyNames=[

"un",

"ug",

"ut",

"ub"

];


var i;


for(

i=0;

i<familyNames.length;

i++

){


var family=

familyNames[i];


if(

family

!==

question.family

){


var choices=

familyWords[family];


var randomWord=

choices[

Math.floor(

Math.random()

*

choices.length

)

];


options.push(

randomWord

);


}


}


return shuffleArray(

options

);


}



/* ==============================
   SHOW QUESTION
============================== */

function showQuestion(){


answerLocked=false;


wrongAttempts=0;


feedback.innerHTML="";


optionsArea.innerHTML="";


var question=

gameQuestions[

currentQuestion

];


instructionText.innerHTML=

'Tap on the image ending with '

+

'<strong>"'

+

question.family

+

'"</strong>';


progressBox.innerHTML=

(currentQuestion+1)

+

" / "

+

gameQuestions.length;


var options=

makeOptions(

question

);


var i;


for(

i=0;

i<options.length;

i++

){


createOption(

options[i],

question

);


}


}



/* ==============================
   CREATE OPTION
============================== */

function createOption(

word,

question

){


var optionButton=

document.createElement(

"button"

);


optionButton.type=

"button";


optionButton.className=

"option";


optionButton.setAttribute(

"data-word",

word

);


optionButton.setAttribute(

"aria-label",

word

);



var image=

document.createElement(

"img"

);


image.src=

"assets/"

+

word

+

".png";


image.alt=

word;



optionButton.appendChild(

image

);



optionButton.onclick=

function(){


checkAnswer(

optionButton,

word,

question

);


};



optionsArea.appendChild(

optionButton

);


}



/* ==============================
   CHECK ANSWER
============================== */

function checkAnswer(

selectedButton,

selectedWord,

question

){


if(

answerLocked

){


return;


}



/* CORRECT ANSWER */

if(

selectedWord

===

question.correct

){


answerLocked=true;


removeGlow();


selectedButton.className=

"option correct";



var tick=

document.createElement(

"div"

);


tick.className=

"greenTick";


tick.innerHTML=

"✓";


selectedButton.appendChild(

tick

);



feedback.innerHTML=

"Good Job!";


playAudio(

clapsSound

);



setTimeout(

function(){


currentQuestion++;


if(

currentQuestion

<

gameQuestions.length

){


showQuestion();


}


else{


showFinalScreen();


}


},

1300

);


}



/* WRONG ANSWER */

else{


wrongAttempts++;


playAudio(

wrongSound

);



selectedButton.className=

"option";


void

selectedButton.offsetWidth;


selectedButton.className=

"option wiggle";


feedback.innerHTML=

"Try Again!";



setTimeout(

function(){


if(

selectedButton.className

===

"option wiggle"

){


selectedButton.className=

"option";


}


},

500

);



if(

wrongAttempts>=2

){


showCorrectGlow(

question.correct

);


}


}


}



/* ==============================
   CORRECT OPTION GLOW
============================== */

function showCorrectGlow(

correctWord

){


var buttons=

optionsArea.getElementsByClassName(

"option"

);


var i;


for(

i=0;

i<buttons.length;

i++

){


if(

buttons[i].getAttribute(

"data-word"

)

===

correctWord

){


buttons[i].className=

"option hintGlow";


}


}


}



/* ==============================
   REMOVE GLOW
============================== */

function removeGlow(){


var buttons=

optionsArea.getElementsByClassName(

"option"

);


var i;


for(

i=0;

i<buttons.length;

i++

){


if(

buttons[i].className.indexOf(

"hintGlow"

)

!==

-1

){


buttons[i].className=

"option";


}


}


}



/* ==============================
   FINAL SCREEN
============================== */

function showFinalScreen(){


showScreen(

endScreen

);


startConfetti();


}



/* ==============================
   PLAY AGAIN
============================== */

playAgainButton.onclick=

function(){


startGame();


};



/* ==============================
   CONFETTI
============================== */

function startConfetti(){


stopConfetti();


var canvas=

document.getElementById(

"confettiCanvas"

);


var context=

canvas.getContext(

"2d"

);


canvas.width=

window.innerWidth;


canvas.height=

window.innerHeight;



var colours=[

"#ff4d5a",

"#ffd633",

"#3fc8ff",

"#51e08b",

"#dc49f5",

"#ff9838",

"#7956ef"

];


var pieces=[];


var i;


for(

i=0;

i<130;

i++

){


pieces.push({


x:

Math.random()

*

canvas.width,


y:

Math.random()

*

canvas.height

-

canvas.height,


size:

5

+

Math.random()

*

8,


speed:

2

+

Math.random()

*

5,


sideSpeed:

-1.5

+

Math.random()

*

3,


rotation:

Math.random()

*

360,


rotationSpeed:

-5

+

Math.random()

*

10,


colour:

colours[

Math.floor(

Math.random()

*

colours.length

)

]


});


}



function drawConfetti(){


context.clearRect(

0,

0,

canvas.width,

canvas.height

);


for(

i=0;

i<pieces.length;

i++

){


var piece=

pieces[i];


piece.y+=

piece.speed;


piece.x+=

piece.sideSpeed;


piece.rotation+=

piece.rotationSpeed;



if(

piece.y

>

canvas.height+20

){


piece.y=

-20;


piece.x=

Math.random()

*

canvas.width;


}



context.save();


context.translate(

piece.x,

piece.y

);


context.rotate(

piece.rotation

*

Math.PI

/

180

);


context.fillStyle=

piece.colour;


context.fillRect(

-piece.size/2,

-piece.size/2,

piece.size,

piece.size*0.6

);


context.restore();


}


confettiAnimation=

requestAnimationFrame(

drawConfetti

);


}


drawConfetti();


}



/* ==============================
   STOP CONFETTI
============================== */

function stopConfetti(){


if(

confettiAnimation

){


cancelAnimationFrame(

confettiAnimation

);


confettiAnimation=null;


}


}



/* ==============================
   LOGO FOR TWO SECONDS
============================== */

preloadImages();


setTimeout(

function(){


startGame();


},

2000

);


</script>


</body>

</html>
